<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhoneMood — CRM</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --blue:#185FA5; --blue-light:#E6F1FB; --blue-dark:#0C447C;
  --green:#3B6D11; --green-light:#EAF3DE; --green-dark:#27500A;
  --amber:#854F0B; --amber-light:#FAEEDA; --amber-dark:#633806;
  --red:#791F1F; --red-light:#FCEBEB;
  --purple:#3C3489; --purple-light:#EEEDFE;
  --teal:#085041; --teal-light:#E1F5EE;
  --gray:#444441; --gray-light:#F1EFE8;
  --border:#E5E2D9; --border-strong:#C9C5B8;
  --bg:#FFFFFF; --bg-secondary:#F7F6F2; --bg-tertiary:#EFEDE6;
  --text:#1A1A18; --text-secondary:#6B6862;
  --radius-md:8px; --radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:13px;color:var(--text);background:var(--bg-secondary);overflow:hidden}
.app-shell{display:flex;height:100vh;width:100vw}

/* SIDEBAR */
.sidebar{width:216px;min-width:216px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo{width:32px;height:32px;border-radius:8px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;flex-shrink:0}
.sb-head .name{font-size:14px;font-weight:600}
.sb-head .loc{font-size:11px;color:var(--text-secondary)}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-group{margin-bottom:4px}
.nav-label{font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.6px;padding:10px 16px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;font-size:12.5px;color:var(--text-secondary);border-left:2px solid transparent;transition:all .12s;user-select:none}
.nav-item:hover{background:var(--bg-secondary);color:var(--text)}
.nav-item.active{color:var(--blue);border-left-color:var(--blue);background:var(--blue-light);font-weight:600}
.nav-item i{font-size:16px;width:18px;text-align:center}
.nav-item .nav-badge{margin-left:auto;font-size:10px;background:var(--red-light);color:var(--red);padding:1px 6px;border-radius:10px;font-weight:600}
.sb-foot{padding:12px;border-top:1px solid var(--border)}
.quick-btn{width:100%;justify-content:center;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-md);padding:9px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.quick-btn:hover{background:var(--blue-dark)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:12px 22px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:600}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;display:flex;align-items:center;gap:4px}
.pill-blue{background:var(--blue-light);color:var(--blue-dark)}
.pill-green{background:var(--green-light);color:var(--green-dark)}
.pill-purple{background:var(--purple-light);color:var(--purple)}

.btn{font-size:11.5px;padding:6px 13px;border:1px solid var(--border-strong);border-radius:var(--radius-md);background:transparent;cursor:pointer;color:var(--text);display:inline-flex;align-items:center;gap:5px;font-weight:500;transition:background .12s}
.btn:hover{background:var(--bg-secondary)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue-dark)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-red{background:var(--red-light);color:var(--red);border-color:#F09595}
.btn-red:hover{background:#F7C1C1}
.btn-sm{font-size:10.5px;padding:4px 9px}

.page{display:none;flex:1;overflow-y:auto}
.page.active{display:flex;flex-direction:column}

/* shared bits */
.kpi-row{display:grid;gap:10px;padding:14px 22px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.kpi{background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px 14px}
.kpi label{font-size:10.5px;color:var(--text-secondary);display:block;margin-bottom:3px;font-weight:500}
.kpi .val{font-size:19px;font-weight:600}
.kpi .sub{font-size:10.5px;color:var(--text-secondary);margin-top:1px}

.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title i{color:var(--blue);font-size:15px}

.body-pad{padding:18px 22px;flex:1;overflow-y:auto}

table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:9px 12px;color:var(--text-secondary);font-weight:600;font-size:11px;border-bottom:1px solid var(--border);background:var(--bg-secondary);position:sticky;top:0}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg-secondary)}

.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.b-blue{background:var(--blue-light);color:var(--blue-dark)}
.b-green{background:var(--green-light);color:var(--green-dark)}
.b-amber{background:var(--amber-light);color:var(--amber-dark)}
.b-red{background:var(--red-light);color:var(--red)}
.b-purple{background:var(--purple-light);color:var(--purple)}
.b-teal{background:var(--teal-light);color:var(--teal)}
.b-gray{background:var(--gray-light);color:var(--gray)}

.av{width:24px;height:24px;border-radius:50%;background:var(--blue-light);color:var(--blue-dark);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

.empty-state{text-align:center;padding:50px 20px;color:var(--text-secondary)}
.empty-state i{font-size:32px;display:block;margin:0 auto 10px;opacity:.5}

/* Tarjetas de Stock para mobile — ocultas por defecto, visibles solo bajo el media query */
.stock-cards-mobile{display:none}
.stock-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;cursor:pointer}
.stock-card:active{background:var(--bg-secondary)}
.stock-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
.stock-card-name{font-size:13.5px;font-weight:600;line-height:1.3}
.stock-card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:var(--bg-secondary);border-radius:8px;padding:8px 6px;margin-bottom:8px}
.stock-card-grid div{text-align:center}
.stock-card-grid label{font-size:9px;color:var(--text-secondary);display:block;margin-bottom:2px}
.stock-card-grid span{font-size:12px;font-weight:600}
.stock-card-bottom{display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);gap:8px}
.stock-card-bottom span{display:flex;align-items:center;gap:4px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stock-card-notas{font-size:10.5px;color:var(--amber-dark);background:var(--amber-light);border-radius:6px;padding:5px 8px;margin-top:8px}

.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:12px 18px;border-radius:var(--radius-md);font-size:12.5px;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:999;max-width:340px;line-height:1.5;display:none}
.toast.show{display:block;animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

.mobile-menu-btn{display:none;background:var(--blue-light);border:none;font-size:22px;cursor:pointer;color:var(--blue);margin-right:8px;width:38px;height:38px;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0}
.mobile-menu-btn:active{background:var(--blue);color:#fff}

@media (max-width:900px){
  .sidebar{position:fixed;left:0;top:0;height:100vh;z-index:200;transform:translateX(-100%);transition:transform .25s ease;box-shadow:2px 0 24px rgba(0,0,0,.18)}
  .sidebar.open{transform:translateX(0)}
  .mobile-menu-btn{display:flex !important}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150}
  .sidebar-overlay.show{display:block}
  .nav-item{padding:11px 16px;font-size:13.5px}
  .topbar{padding:10px 14px}
  .topbar h1{font-size:14px}
  .topbar-right{gap:5px}
  .pill{font-size:10px;padding:3px 7px}
  .body-pad,.kpi-row{padding-left:14px;padding-right:14px}
  .kpi-row{grid-template-columns:repeat(2,1fr) !important}
  .body-pad table, .card table{display:block;overflow-x:auto;white-space:nowrap}
  table{font-size:11.5px}
  th,td{padding:7px 6px}
  .dash-grid-2{grid-template-columns:1fr !important}

  /* Reparaciones: patrón lista/detalle a pantalla completa, controlado por JS */
  .rep-list-panel{width:100% !important;min-width:0 !important;border-right:none !important}

  /* Panel de control: menú lateral pasa a tabs horizontales scrolleables */
  .panel-shell{flex-direction:column}
  .panel-nav-side{width:100% !important;min-width:0 !important;border-right:none !important;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:6px 8px !important;gap:4px}
  .panel-nav-item{border-left:none !important;border-bottom:2px solid transparent;border-radius:8px}
  .panel-nav-item[style*="border-left: 2px solid var(--blue)"]{border-bottom:2px solid var(--blue) !important}

  /* Stock: tabla se oculta, tarjetas se muestran */
  .stock-table-desktop{display:none !important}
  .stock-cards-mobile{display:block !important}

  /* Formularios de dos/tres columnas con grid inline pasan a una sola columna */
  [style*="grid-template-columns:1fr 1fr 1fr"]{grid-template-columns:1fr 1fr !important}
  [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important}
  [style*="grid-template-columns: repeat(3"]{grid-template-columns:1fr 1fr !important}
}
</style>
</head>
<body>

<div id="login-screen" style="position:fixed;inset:0;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:20px;padding:20px">
  <div style="text-align:center">
    <div style="width:56px;height:56px;border-radius:14px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;margin:0 auto 14px">iM</div>
    <h1 style="font-size:20px;font-weight:600;margin-bottom:4px">iPhoneMood CRM</h1>
    <p style="font-size:13px;color:var(--text-secondary)">Iniciá sesión con tu cuenta de Google para continuar</p>
  </div>
  <button id="login-google-btn" onclick="Auth.iniciarSesionConGoogle()" style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border-strong);border-radius:10px;padding:12px 24px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.08)">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.72A5.4 5.4 0 0 1 3.69 9c0-.6.1-1.18.28-1.72V4.95H.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.05l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.95L3.97 7.28C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
    Continuar con Google

<div class="app-shell" id="app-shell" style="display:none">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="App.closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-logo">iM</div>
      <div><div class="name">iPhoneMood</div><div class="loc">Rosario · CRM</div></div>
    </div>
    <div class="sb-nav">
      <div class="nav-group">
        <div class="nav-label">Principal</div>
        <div class="nav-item active" data-page="dashboard"><i class="ti ti-layout-dashboard"></i> Panel general</div>
      </div>
      <div class="nav-group">
        <div class="nav-label">Operaciones</div>
        <div class="nav-item" data-page="ventas"><i class="ti ti-receipt"></i> Ventas</div>
        <div class="nav-item" data-page="stock"><i class="ti ti-box"></i> Stock</div>
        <div class="nav-item" data-page="reparaciones"><i class="ti ti-tool"></i> Reparaciones</div>

  <div class="main">

        <button class="mobile-menu-btn" onclick="App.toggleSidebar()"><i class="ti ti-menu-2"></i></button>
        <h1 id="page-title">Panel general</h1>
      </div>
      <div class="topbar-right">
        <span class="pill pill-blue"><i class="ti ti-currency-dollar"></i> Blue: $<span id="topbar-blue">1075</span></span>
        <span class="pill pill-green"><i class="ti ti-currency-bitcoin"></i> USDT: $<span id="topbar-usdt">1061</span></span>
        <div id="user-menu" style="position:relative">
          <button onclick="App.toggleUserMenu()" style="display:flex;align-items:center;gap:6px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer">
            <span id="user-avatar" class="av" style="width:22px;height:22px;font-size:9px"></span>
            <span id="user-name" style="font-size:11px;font-weight:600;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
            <i class="ti ti-chevron-down" style="font-size:12px;color:var(--text-secondary)"></i>
          </button>
          <div id="user-menu-dropdown" style="display:none;position:absolute;top:36px;right:0;background:var(--bg);border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:180px;z-index:100;overflow:hidden">
            <div id="user-email-full" style="padding:10px 14px;font-size:11px;color:var(--text-secondary);border-bottom:1px solid var(--border);word-break:break-all"></div>

    <div id="pages"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONEXIÓN A SUPABASE — acá vive la base de datos real
// ============================================================

const SUPABASE_URL = 'https://oqvmiozafgogfcclwseu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xdm1pb3phZmdvZ2ZjY2x3c2V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTg4MDQsImV4cCI6MjA5NzM5NDgwNH0.egzH4uyVJ0W1mj0dTJuJGIWTXXnur9B4z_f12Z8V1lQ';

const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// CARGA INICIAL — trae todos los datos reales de Supabase
// y los acomoda en el formato que ya usa el resto de la app (State)
// ============================================================
const DB = {
  personasMap: {}, // nombre -> id  (para traducir entre lo que ve el usuario y lo que guarda la base)
  personasIdToNombre: {}, // id -> nombre

  async cargarTodo() {
    const [personasRes, cajasRes, stockRes, garantiasRes, ventasRes, ventaItemsRes, ventaPagosRes,
           reparacionesRes, repRepuestosRes, repPagosRes, catGastoRes, gastosRes, cambiosRes] = await Promise.all([
      supa.from('personas').select('*'),
      supa.from('cajas').select('*'),
      supa.from('stock').select('*'),
      supa.from('garantias').select('*'),
      supa.from('ventas').select('*').order('id', { ascending: false }),
      supa.from('venta_items').select('*'),
      supa.from('venta_pagos').select('*'),
      supa.from('reparaciones').select('*'),
      supa.from('reparacion_repuestos').select('*'),
      supa.from('reparacion_pagos').select('*'),
      supa.from('categorias_gasto').select('*'),
      supa.from('gastos').select('*').order('creado_en', { ascending: false }),
      supa.from('cambios').select('*').order('creado_en', { ascending: false }),
    ]);

    // mapa de personas (id <-> nombre), lo usamos todo el tiempo para traducir
    (personasRes.data || []).forEach(p => {
      this.personasMap[p.nombre] = p.id;
      this.personasIdToNombre[p.id] = p.nombre;
    });
    State.personas = (personasRes.data || []).map(p => p.nombre);

    // cajas: armamos State.cajas[persona][bolsillo] = saldo
    State.cajas = {};
    State.personas.forEach(p => State.cajas[p] = {});
    (cajasRes.data || []).forEach(c => {
      const nombre = this.personasIdToNombre[c.persona_id];
      if (nombre) State.cajas[nombre][c.bolsillo] = Number(c.saldo);
    });

    // stock
    State.stock = (stockRes.data || []).map(s => ({
      id: s.id, cat: s.categoria, nombre: s.nombre,
      imeis: s.imeis && s.imeis.length ? [...s.imeis] : undefined,
      cantidad: s.imeis && s.imeis.length ? undefined : s.cantidad,
      costoUSD: Number(s.costo_usd), cotiz: Number(s.cotizacion), precioARS: Number(s.precio_ars),
      proveedor: s.proveedor, custodio: this.personasIdToNombre[s.custodio_id] || '', notas: s.notas || ''
    }));

    // garantías
    State.garantias = (garantiasRes.data || []).map(g => ({ id: g.id, nombre: g.nombre, dias: g.dias, color: g.color }));

    // categorías de gasto
    State.categoriasGasto = (catGastoRes.data || []).map(c => ({ id: c.id, nombre: c.nombre, color: c.color }));

    // gastos
    State.gastos = (gastosRes.data || []).map(g => ({
      id: g.id, fecha: this.fmtFecha(g.creado_en), motivo: g.motivo, cat: g.categoria_id,
      responsable: this.personasIdToNombre[g.responsable_id] || '',
      caja: `${this.personasIdToNombre[g.persona_caja_id] || ''}-${g.bolsillo}`,
      moneda: g.moneda, monto: Number(g.monto), estado: g.estado,
      _personaCajaId: g.persona_caja_id, _bolsillo: g.bolsillo
    }));

    // cambios (cueva)
    State.cambios = (cambiosRes.data || []).map(c => ({
      id: c.id, fecha: this.fmtFecha(c.creado_en), tipo: c.tipo,
      entrega: Number(c.entrega), recibe: Number(c.recibe), cotiz: Number(c.cotizacion),
      origenP: this.personasIdToNombre[c.origen_persona_id] || '', origenB: c.origen_bolsillo,
      destinoP: this.personasIdToNombre[c.destino_persona_id] || '', destinoB: c.destino_bolsillo
    }));

    // ventas con sus items y pagos anidados
    const itemsPorVenta = {}, pagosPorVenta = {};
    (ventaItemsRes.data || []).forEach(i => {
      if (!itemsPorVenta[i.venta_id]) itemsPorVenta[i.venta_id] = [];
      itemsPorVenta[i.venta_id].push({ nombre: i.nombre, precio: Number(i.precio_usd), costo: Number(i.costo_usd), stockId: i.stock_id, imei: i.imei });
    });
    (ventaPagosRes.data || []).forEach(p => {
      if (!pagosPorVenta[p.venta_id]) pagosPorVenta[p.venta_id] = [];
      const persona = this.personasIdToNombre[p.persona_id] || '';
      pagosPorVenta[p.venta_id].push({ caja: `${persona}-${p.bolsillo}`, monto: Number(p.monto), persona, bolsillo: p.bolsillo });
    });
    State.ventas = (ventasRes.data || []).map(v => ({
      id: v.id, fecha: this.fmtFecha(v.creado_en), cliente: v.cliente,
      vendedor: this.personasIdToNombre[v.vendedor_id] || '',
      items: itemsPorVenta[v.id] || [], pagos: pagosPorVenta[v.id] || [],
      estado: v.estado, tradeIn: v.trade_in_modelo ? { modelo: v.trade_in_modelo, valor: Number(v.trade_in_valor) } : null
    }));
    State.nextVentaId = State.ventas.length ? Math.max(...State.ventas.map(v => v.id)) + 1 : 1;

    // reparaciones con sus repuestos y pagos anidados
    const repuestosPorRep = {}, pagosPorRep = {};
    (repRepuestosRes.data || []).forEach(r => {
      if (!repuestosPorRep[r.reparacion_id]) repuestosPorRep[r.reparacion_id] = [];
      repuestosPorRep[r.reparacion_id].push({ nombre: r.nombre, costo: Number(r.costo_usd), fromStock: r.de_stock, stockId: r.stock_id });
    });
    (repPagosRes.data || []).forEach(p => {
      if (!pagosPorRep[p.reparacion_id]) pagosPorRep[p.reparacion_id] = [];
      const persona = this.personasIdToNombre[p.persona_id] || '';
      pagosPorRep[p.reparacion_id].push({ caja: `${persona}-${p.bolsillo}`, monto: Number(p.monto), persona, bolsillo: p.bolsillo });
    });
    State.reparaciones = (reparacionesRes.data || []).map(r => ({
      id: r.id, cliente: r.cliente, tel: r.telefono || '', equipo: r.equipo, falla: r.falla || '',
      clave: r.clave_desbloqueo || '', estado: r.estado, fechaIngreso: this.fmtFecha(r.creado_en),
      diagnostico: r.diagnostico || '', presupuestoAprobado: r.presupuesto_aprobado,
      repuestos: repuestosPorRep[r.id] || [], pagos: pagosPorRep[r.id] || [],
      costoMO: Number(r.costo_mano_obra), precioFinal: Number(r.precio_final),
      tecnico: r.tecnico || '', custodio: this.personasIdToNombre[r.custodio_id] || '',
      notas: r.notas || '', equipoDevuelto: r.equipo_devuelto
    }));
  },

  fmtFecha(iso) {
    if (!iso) return 'Hoy';
    const d = new Date(iso);
    return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit' });
  },

  personaId(nombre) { return this.personasMap[nombre]; },

  // ===== ESCRITURAS =====

  async actualizarSaldoCaja(persona, bolsillo, nuevoSaldo) {
    const pid = this.personaId(persona);
    if (!pid) return;
    await supa.from('cajas').update({ saldo: nuevoSaldo, actualizado_en: new Date().toISOString() })
      .eq('persona_id', pid).eq('bolsillo', bolsillo);
  },

  async guardarProductoStock(obj, idExistente) {
    const row = {
      categoria: obj.cat, nombre: obj.nombre, imeis: obj.imeis || [], cantidad: obj.cantidad || 0,
      costo_usd: obj.costoUSD, cotizacion: obj.cotiz, precio_ars: obj.precioARS,
      proveedor: obj.proveedor, custodio_id: this.personaId(obj.custodio) || null, notas: obj.notas || ''
    };
    if (idExistente) {
      const { error } = await supa.from('stock').update(row).eq('id', idExistente);
      return { id: idExistente, error };
    } else {
      const { data, error } = await supa.from('stock').insert(row).select().single();
      return { id: data?.id, error };
    }
  },

  async actualizarImeisStock(stockId, imeis) {
    await supa.from('stock').update({ imeis }).eq('id', stockId);
  },
  async actualizarCantidadStock(stockId, cantidad) {
    await supa.from('stock').update({ cantidad }).eq('id', stockId);
  },

  async crearVenta(draft, estado) {
    const { data: ventaRow, error } = await supa.from('ventas').insert({
      cliente: draft.cliente, vendedor_id: this.personaId(draft.vendedor) || null, estado,
      trade_in_modelo: draft.tradeIn?.modelo || null, trade_in_valor: draft.tradeIn?.valor || 0
    }).select().single();
    if (error || !ventaRow) { console.error(error); return null; }

    const itemsToInsert = draft.items.map(it => ({
      venta_id: ventaRow.id, stock_id: it.stockId || null, imei: it.imei || null,
      nombre: it.nombre, costo_usd: it.costo || 0, precio_usd: it.precio
    }));
    if (itemsToInsert.length) await supa.from('venta_items').insert(itemsToInsert);

    const pagosToInsert = draft.pagos.map(p => ({
      venta_id: ventaRow.id, persona_id: this.personaId(p.persona), bolsillo: p.bolsillo, monto: p.monto
    }));
    if (pagosToInsert.length) await supa.from('venta_pagos').insert(pagosToInsert);

    return ventaRow.id;
  },

  async anularVenta(ventaId) {
    await supa.from('ventas').delete().eq('id', ventaId); // borra en cascada items y pagos
  },

  async crearReparacion(o) {
    await supa.from('reparaciones').insert({
      id: o.id, cliente: o.cliente, telefono: o.tel, equipo: o.equipo, falla: o.falla,
      clave_desbloqueo: o.clave, estado: o.estado, diagnostico: o.diagnostico,
      presupuesto_aprobado: o.presupuestoAprobado, tecnico: o.tecnico,
      custodio_id: this.personaId(o.custodio) || null, costo_mano_obra: o.costoMO,
      precio_final: o.precioFinal, notas: o.notas, equipo_devuelto: o.equipoDevuelto
    });
  },
  async actualizarReparacion(o) {
    await supa.from('reparaciones').update({
      estado: o.estado, diagnostico: o.diagnostico, presupuesto_aprobado: o.presupuestoAprobado,
      custodio_id: this.personaId(o.custodio) || null, costo_mano_obra: o.costoMO,
      precio_final: o.precioFinal, notas: o.notas, equipo_devuelto: o.equipoDevuelto
    }).eq('id', o.id);
  },
  async agregarRepuestoReparacion(reparacionId, repuesto) {
    await supa.from('reparacion_repuestos').insert({
      reparacion_id: reparacionId, nombre: repuesto.nombre, costo_usd: repuesto.costo,
      de_stock: repuesto.fromStock, stock_id: repuesto.stockId || null
    });
  },
  async agregarPagoReparacion(reparacionId, pago) {
    await supa.from('reparacion_pagos').insert({
      reparacion_id: reparacionId, persona_id: this.personaId(pago.persona), bolsillo: pago.bolsillo, monto: pago.monto
    });
  },
  async limpiarMovimientosReparacion(reparacionId) {
    await supa.from('reparacion_pagos').delete().eq('reparacion_id', reparacionId);
    await supa.from('reparacion_repuestos').delete().eq('reparacion_id', reparacionId).eq('de_stock', true);
  },

  async crearGasto(g) {
    const { data, error } = await supa.from('gastos').insert({
      motivo: g.motivo, categoria_id: g.cat, responsable_id: this.personaId(g.responsable),
      persona_caja_id: this.personaId(g.persona), bolsillo: g.bolsillo, moneda: g.moneda,
      monto: g.monto, estado: g.estado
    }).select().single();
    return data?.id;
  },

  async crearCambio(c) {
    await supa.from('cambios').insert({
      tipo: c.tipo, entrega: c.entrega, recibe: c.recibe, cotizacion: c.cotiz,
      origen_persona_id: this.personaId(c.origenP), origen_bolsillo: c.origenB,
      destino_persona_id: this.personaId(c.destinoP), destino_bolsillo: c.destinoB
    });
  },

  async agregarPersona(nombre) {
    const { data } = await supa.from('personas').insert({ nombre }).select().single();
    if (data) {
      this.personasMap[nombre] = data.id;
      this.personasIdToNombre[data.id] = nombre;
      const bolsillos = ['ARS cash', 'ARS transferencia', 'USD cash', 'USD transferencia', 'USDT'];
      await supa.from('cajas').insert(bolsillos.map(b => ({ persona_id: data.id, bolsillo: b, saldo: 0 })));
    }
  },

  async renombrarPersona(nombreViejo, nombreNuevo) {
    const pid = this.personaId(nombreViejo);
    if (!pid) return { error: 'No se encontró la persona' };
    const { error } = await supa.from('personas').update({ nombre: nombreNuevo }).eq('id', pid);
    if (!error) {
      delete this.personasMap[nombreViejo];
      this.personasMap[nombreNuevo] = pid;
      this.personasIdToNombre[pid] = nombreNuevo;
    }
    return { error };
  },

  async borrarPersona(nombre) {
    const pid = this.personaId(nombre);
    if (!pid) return { error: 'No se encontró la persona' };
    // Las cajas se borran en cascada por la referencia de la tabla.
    // Ventas, reparaciones y gastos asociados quedan con la referencia en null (no se borran).
    const { error } = await supa.from('personas').delete().eq('id', pid);
    if (!error) {
      delete this.personasMap[nombre];
      delete this.personasIdToNombre[pid];
    }
    return { error };
  },

  async agregarGarantia(nombre, dias, color) {
    const { data } = await supa.from('garantias').insert({ nombre, dias, color }).select().single();
    return data;
  },
  async editarGarantia(id, dias) { await supa.from('garantias').update({ dias }).eq('id', id); },
  async borrarGarantia(id) { await supa.from('garantias').delete().eq('id', id); },

  async agregarCategoriaGasto(nombre, color) {
    const { data } = await supa.from('categorias_gasto').insert({ nombre, color }).select().single();
    return data;
  },
  async editarCategoriaGasto(id, cambios) { await supa.from('categorias_gasto').update(cambios).eq('id', id); },
  async borrarCategoriaGasto(id) { await supa.from('categorias_gasto').delete().eq('id', id); },
};

// ============================================================
// SINCRONIZACIÓN CON GOOGLE SHEETS — respaldo en tiempo real
// ============================================================
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwT3jI6Jf81EAmRCgA9uRmDfyvYS6kVst9QaqcB6tdaVKCeqwlAnbnk-TBoeWGMLokG/exec';

const Sheets = {
  // Envía una fila a la pestaña indicada. No bloquea ni interrumpe la app
  // si falla — el respaldo es "best effort", la fuente de verdad sigue siendo Supabase.
  async enviar(pestana, fila) {
    try {
      await fetch(SHEETS_URL, {
        method: 'POST',
        // 'no-cors' evita que el navegador bloquee la respuesta por CORS;
        // no podemos leer la respuesta, pero el envío sí llega al script.
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ pestana, fila })
      });
    } catch (err) {
      console.warn('No se pudo sincronizar con Google Sheets (no afecta el guardado real):', err);
    }
  },

  venta(v, totalUSD, costoUSD) {
    this.enviar('Ventas', [
      v.fecha || 'Hoy', v.id, v.cliente, v.vendedor || '',
      (v.items && v.items[0] ? v.items[0].nombre : ''), totalUSD, costoUSD, v.estado
    ]);
  },
  stock(p) {
    this.enviar('Stock', [
      'Hoy', p.nombre, p.cat, p.proveedor || '', p.custodio || '',
      p.costoUSD, p.cotiz ? (p.precioARS / p.cotiz).toFixed(2) : '',
      p.imeis ? p.imeis.length : (p.cantidad || 0), p.notas || ''
    ]);
  },
  reparacion(o) {
    this.enviar('Reparaciones', [
      o.fechaIngreso || 'Hoy', o.id, o.cliente, o.equipo, o.falla || '',
      o.estado, o.tecnico || '', o.costoMO, o.precioFinal
    ]);
  },
  gasto(g, categoriaNombre) {
    this.enviar('Gastos', [
      g.fecha || 'Hoy', g.motivo, categoriaNombre || '', g.responsable, g.caja, g.moneda, g.monto, g.estado
    ]);
  },
  cambio(c) {
    this.enviar('Cueva', [
      'Hoy', c.tipo, c.entrega, c.recibe, c.cotiz, c.origenP, c.origenB, c.destinoP, c.destinoB
    ]);
  },
  caja(persona, bolsillo, nuevoSaldo) {
    this.enviar('Cajas', ['Hoy', persona, bolsillo, nuevoSaldo]);
  }
};

<script>
// ============================================================
// ESTADO CENTRAL — fuente única de verdad para toda la maqueta
// En la versión real esto vive en la base de datos + Sheets.
// ============================================================

const State = {
  refBlue: 1075,
  refUsdt: 1061,

  personas: [], // se carga desde Supabase al iniciar

  // CAJAS: cada persona tiene varios "bolsillos" de saldo — se carga desde Supabase
  cajas: {},

  // STOCK — se carga desde Supabase
  stock: [],

  // VENTAS — se carga desde Supabase
  ventas: [],
  nextVentaId: 1,

  // REPARACIONES — se carga desde Supabase
  reparaciones: [],

  // GASTOS — se carga desde Supabase
  categoriasGasto: [],
  gastos: [],

  // CUEVA — operaciones de cambio — se carga desde Supabase
  cambios: [],

  // GARANTÍAS configurables — se carga desde Supabase
  garantias: [],

  // CASH FLOW — log de movimientos para el módulo de cash flow
  movimientos: [],

  // ===== HELPERS =====
  fmtARS(n) { return '$' + Math.round(n).toLocaleString('es-AR'); },
  fmtUSD(n) { return 'USD ' + Number(n).toLocaleString('es-AR', { maximumFractionDigits: 2 }); },

  getStock(p) { return p.imeis ? p.imeis.length : (p.cantidad || 0); },
  getStockStatus(p) {
    const s = this.getStock(p);
    if (s === 0) return 'out';
    if (s <= 1) return 'low';
    return 'ok';
  },

  // Mueve saldo entre bolsillos (misma o distinta persona)
  moverCaja(personaOrigen, bolsilloOrigen, montoOrigen, personaDestino, bolsilloDestino, montoDestino) {
    if (!this.cajas[personaOrigen]) this.cajas[personaOrigen] = {};
    if (!this.cajas[personaDestino]) this.cajas[personaDestino] = {};
    this.cajas[personaOrigen][bolsilloOrigen] = (this.cajas[personaOrigen][bolsilloOrigen] || 0) - montoOrigen;
    this.cajas[personaDestino][bolsilloDestino] = (this.cajas[personaDestino][bolsilloDestino] || 0) + montoDestino;
    DB.actualizarSaldoCaja(personaOrigen, bolsilloOrigen, this.cajas[personaOrigen][bolsilloOrigen]);
    DB.actualizarSaldoCaja(personaDestino, bolsilloDestino, this.cajas[personaDestino][bolsilloDestino]);
  },

  acreditarCaja(persona, bolsillo, monto) {
    if (!this.cajas[persona]) this.cajas[persona] = {};
    this.cajas[persona][bolsillo] = (this.cajas[persona][bolsillo] || 0) + monto;
    DB.actualizarSaldoCaja(persona, bolsillo, this.cajas[persona][bolsillo]);
  },
  debitarCaja(persona, bolsillo, monto) {
    if (!this.cajas[persona]) this.cajas[persona] = {};
    this.cajas[persona][bolsillo] = (this.cajas[persona][bolsillo] || 0) - monto;
    DB.actualizarSaldoCaja(persona, bolsillo, this.cajas[persona][bolsillo]);
  },

  registrarMovimiento(tipo, descripcion, montoARS, signo) {
    this.movimientos.unshift({
      fecha: 'Hoy', tipo, descripcion, montoARS, signo, id: Date.now() + Math.random()
    });
  },

  // Descuenta del stock cuando se confirma una venta. Devuelve lo removido (para poder revertir si se anula)
  descontarStock(stockId, imei) {
    const item = this.stock.find(s => s.id === stockId);
    if (!item) return null;
    if (item.imeis && imei) {
      const idx = item.imeis.indexOf(imei);
      if (idx >= 0) { item.imeis.splice(idx, 1); return { stockId, imei }; }
    } else if (item.cantidad !== undefined && item.cantidad > 0) {
      item.cantidad -= 1;
      return { stockId, imei: null };
    }
    return null;
  },
  restaurarStock(stockId, imei) {
    const item = this.stock.find(s => s.id === stockId);
    if (!item) return;
    if (item.imeis && imei) item.imeis.push(imei);
    else if (item.cantidad !== undefined) item.cantidad += 1;
  },

  // Spread de una operación de cambio, en ARS
  calcSpreadARS(op) {
    if (op.tipo === 'ars-usd') {
      const refRecibe = op.entrega / this.refBlue;
      return (op.recibe - refRecibe) * this.refBlue;
    }
    if (op.tipo === 'usd-ars') {
      return op.recibe - (op.entrega * this.refBlue);
    }
    if (op.tipo === 'usdt-ars') {
      return op.recibe - (op.entrega * this.refUsdt);
    }
    if (op.tipo === 'usd-usdt') {
      const refRecibe = op.entrega * (this.refBlue / this.refUsdt);
      return (op.recibe - refRecibe) * this.refUsdt;
    }
    return 0;
  },

  resultadoFinancieroMes() {
    return this.cambios.reduce((a, o) => a + this.calcSpreadARS(o), 0);
  },
  resultadoComercialMes() {
    return this.ventas.reduce((a, v) => {
      const totalVenta = v.items.reduce((s, i) => s + i.precio, 0);
      const totalCosto = v.items.reduce((s, i) => s + i.costo, 0);
      return a + (totalVenta - totalCosto) * this.refBlue;
    }, 0);
  },
};

function toast(msg) {
  const el = document.getElementById('toast');
  el.innerHTML = msg;
  el.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => el.classList.remove('show'), 4200);
}

</script>
<script>
const Dashboard = {
  periodo: 'mes', // hoy | semana | mes | rango

  getDiasRango() {
    const hoy = new Date();

    else if (this.periodo === 'semana') dias = 7;
    else if (this.periodo === 'mes') dias = 30;
    const arr = [];
    for (let i = dias - 1; i >= 0; i--) {
      const d = new Date(hoy);
      d.setDate(d.getDate() - i);
      arr.push(d);
    }
    return arr;
  },

  render() {
    const container = document.createElement('div');
    container.className = 'body-pad';

    const resultComercial = State.resultadoComercialMes();
    const resultFinanciero = State.resultadoFinancieroMes();
    const totalResultado = resultComercial + resultFinanciero;

    const totalVentasARS = State.ventas.reduce((a, v) => a + v.items.reduce((s, i) => s + i.precio, 0), 0) * State.refBlue;
    const repActivas = State.reparaciones.filter(r => !['entregado', 'rechazado', 'no_reparable'].includes(r.estado)).length;
    const repListas = State.reparaciones.filter(r => r.estado === 'listo').length;
    const stockCritico = State.stock.filter(s => State.getStockStatus(s) !== 'ok').length;
    const ventasAbiertas = State.ventas.filter(v => v.estado === 'abierta').length;
    const ticketPromedio = State.ventas.length ? totalVentasARS / State.ventas.length : 0;

    let totalARSenCajas = 0, totalUSDenCajas = 0, totalUSDTenCajas = 0;
    Object.values(State.cajas).forEach(c => {
      totalARSenCajas += (c['ARS cash'] || 0) + (c['ARS transferencia'] || 0);
      totalUSDenCajas += (c['USD cash'] || 0) + (c['USD transferencia'] || 0);
      totalUSDTenCajas += (c['USDT'] || 0);
    });
    const equivalenteTotalARS = totalARSenCajas + totalUSDenCajas * State.refBlue + totalUSDTenCajas * State.refUsdt;

    container.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px">
        <div style="display:flex;gap:6px;flex-wrap:wrap" id="periodo-selector"></div>
        <div id="rango-custom" style="display:none;gap:6px;align-items:center;flex-wrap:wrap">
          <input type="date" id="dash-desde" style="font-size:12px;padding:6px 9px;border:1px solid var(--border-strong);border-radius:8px">
          <span style="font-size:11px;color:var(--text-secondary)">a</span>
          <input type="date" id="dash-hasta" style="font-size:12px;padding:6px 9px;border:1px solid var(--border-strong);border-radius:8px">
          <button class="btn btn-sm btn-primary" onclick="Dashboard.aplicarRango()">Aplicar</button>
        </div>
      </div>

      <div class="kpi-row" style="grid-template-columns:repeat(4,1fr);padding:0 0 14px 0;border:none">
        <div class="kpi"><label>Ventas del período</label><div class="val">${State.fmtARS(totalVentasARS)}</div><div class="sub">${State.ventas.length} ventas · ticket prom. ${State.fmtARS(ticketPromedio)}</div></div>
        <div class="kpi"><label>Resultado comercial</label><div class="val" style="color:${resultComercial>=0?'var(--green-dark)':'var(--red)'}">${resultComercial>=0?'+':''}${State.fmtARS(resultComercial)}</div><div class="sub">margen de ventas</div></div>
        <div class="kpi"><label>Resultado financiero</label><div class="val" style="color:${resultFinanciero>=0?'var(--green-dark)':'var(--red)'}">${resultFinanciero>=0?'+':''}${State.fmtARS(resultFinanciero)}</div><div class="sub">spread cueva de cambio</div></div>
        <div class="kpi"><label>Resultado total</label><div class="val" style="color:var(--blue-dark)">${totalResultado>=0?'+':''}${State.fmtARS(totalResultado)}</div><div class="sub">comercial + financiero</div></div>
      </div>

      <div class="kpi-row" style="grid-template-columns:repeat(4,1fr);padding:0 0 14px 0;border:none">
        <div class="kpi"><label>Equivalente total en caja</label><div class="val">${State.fmtARS(equivalenteTotalARS)}</div><div class="sub">ARS + USD + USDT a cotización actual</div></div>
        <div class="kpi"><label>Ventas con saldo pendiente</label><div class="val" style="color:${ventasAbiertas?'var(--amber-dark)':'var(--green-dark)'}">${ventasAbiertas}</div><div class="sub">requieren seguimiento de cobro</div></div>
        <div class="kpi"><label>Reparaciones activas</label><div class="val">${repActivas}</div><div class="sub">${repListas} lista(s) para entregar</div></div>
        <div class="kpi"><label>Stock con alerta</label><div class="val" style="color:${stockCritico?'var(--red)':'var(--green-dark)'}">${stockCritico}</div><div class="sub">productos bajos o agotados</div></div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-chart-line"></i> Evolución de ventas — monto y beneficio</div>
        <div style="position:relative;height:240px"><canvas id="chart-evolucion"></canvas></div>
      </div>

      <div style="display:grid;grid-template-columns:1.3fr 1fr;gap:14px" class="dash-grid-2">
        <div class="card">
          <div class="card-title"><i class="ti ti-chart-bar"></i> Monto vendido vs beneficio por día</div>
          <div style="position:relative;height:220px"><canvas id="chart-monto-beneficio"></canvas></div>
        </div>
        <div class="card">
          <div class="card-title"><i class="ti ti-chart-pie"></i> Distribución de saldo por persona</div>
          <div style="position:relative;height:220px"><canvas id="chart-personas"></canvas></div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px" class="dash-grid-2">
        <div class="card">
          <div class="card-title"><i class="ti ti-wallet"></i> Saldo consolidado de cajas</div>
          <table>
            <tr><th>Persona</th><th>ARS</th><th>USD</th><th>USDT</th></tr>
            ${State.personas.map(p => {
              const c = State.cajas[p] || {};
              const ars = (c['ARS cash']||0)+(c['ARS transferencia']||0);
              const usd = (c['USD cash']||0)+(c['USD transferencia']||0);
              const usdt = c['USDT']||0;
              return `<tr><td><div style="display:flex;align-items:center;gap:6px"><div class="av">${p.substring(0,2).toUpperCase()}</div>${p}</div></td><td>${State.fmtARS(ars)}</td><td>${State.fmtUSD(usd)}</td><td>${usdt.toLocaleString('es-AR')}</td></tr>`;
            }).join('')}
            <tr style="font-weight:600"><td>Total</td><td>${State.fmtARS(totalARSenCajas)}</td><td>${State.fmtUSD(totalUSDenCajas)}</td><td>${totalUSDTenCajas.toLocaleString('es-AR')}</td></tr>
          </table>
        </div>

        <div class="card">
          <div class="card-title"><i class="ti ti-alert-triangle"></i> Alertas</div>
          <table>
            <tr><th>Tipo</th><th>Detalle</th></tr>
            ${stockCritico > 0 ? `<tr><td><span class="badge b-red">Stock</span></td><td>${stockCritico} producto(s) con stock bajo o agotado</td></tr>` : ''}
            ${repListas > 0 ? `<tr><td><span class="badge b-green">Reparación</span></td><td>${repListas} equipo(s) listo(s) para entregar</td></tr>` : ''}
            ${repActivas > 0 ? `<tr><td><span class="badge b-amber">Reparación</span></td><td>${repActivas} orden(es) en curso</td></tr>` : ''}
            ${ventasAbiertas > 0 ? `<tr><td><span class="badge b-amber">Venta</span></td><td>${ventasAbiertas} venta(s) con saldo pendiente</td></tr>` : ''}
            ${(stockCritico===0 && repListas===0 && repActivas===0 && ventasAbiertas===0) ? '<tr><td colspan="2" style="color:var(--text-secondary)">Sin alertas por el momento</td></tr>' : ''}
          </table>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px" class="dash-grid-2">
        <div class="card">
          <div class="card-title"><i class="ti ti-receipt"></i> Últimas ventas</div>
          <table>
            <tr><th>Cliente</th><th>Detalle</th><th>Total</th><th>Estado</th></tr>
            ${State.ventas.slice(0, 5).map(v => {
              const total = v.items.reduce((s, i) => s + i.precio, 0);
              return `<tr><td>${v.cliente}</td><td>${(v.items[0]?.nombre || '—').substring(0,28)}${v.items.length>1?` +${v.items.length-1}`:''}</td><td>${State.fmtUSD(total)}</td><td><span class="badge ${v.estado==='cerrada'?'b-green':'b-amber'}">${v.estado==='cerrada'?'Cerrada':'Abierta'}</span></td></tr>`;
            }).join('') || '<tr><td colspan="4" style="color:var(--text-secondary)">Todavía no hay ventas cargadas</td></tr>'}
          </table>
        </div>
        <div class="card">
          <div class="card-title"><i class="ti ti-tool"></i> Reparaciones activas</div>
          <table>
            <tr><th>Equipo</th><th>Cliente</th><th>Estado</th></tr>
            ${State.reparaciones.filter(r=>!['entregado','rechazado','no_reparable'].includes(r.estado)).slice(0,5).map(r => `
              <tr><td>${r.equipo}</td><td>${r.cliente}</td><td><span class="badge b-blue">${Reparaciones.ESTADO_LABEL[r.estado]}</span></td></tr>
            `).join('') || '<tr><td colspan="3" style="color:var(--text-secondary)">No hay reparaciones activas</td></tr>'}
          </table>
        </div>
      </div>
    `;

    setTimeout(() => {
      this.renderPeriodoSelector();
      this.renderCharts();
    }, 0);

    return container;
  },

  renderPeriodoSelector() {
    const opciones = [['hoy', 'Hoy'], ['semana', 'Esta semana'], ['mes', 'Este mes'], ['rango', 'Rango libre']];
    document.getElementById('periodo-selector').innerHTML = opciones.map(([k, l]) =>
      `<button class="btn btn-sm ${this.periodo===k?'btn-primary':''}" onclick="Dashboard.setPeriodo('${k}')">${l}</button>`
    ).join('');
    document.getElementById('rango-custom').style.display = this.periodo === 'rango' ? 'flex' : 'none';
  },

  setPeriodo(p) {
    this.periodo = p;
    if (p !== 'rango') App.goTo('dashboard');
    else this.renderPeriodoSelector();
  },

  aplicarRango() {
    this.fechaDesde = document.getElementById('dash-desde').value;
    this.fechaHasta = document.getElementById('dash-hasta').value;
    if (this.fechaDesde && this.fechaHasta) {
      const ms = new Date(this.fechaHasta) - new Date(this.fechaDesde);
      this.periodo = 'rango';
      this._rangoDias = Math.max(1, Math.round(ms / 86400000) + 1);
    }
    App.goTo('dashboard');
  },

  // Reparte las ventas reales a lo largo del rango de días elegido.
  // Estructura lista para cuando cada venta tenga timestamp completo y se pueda agrupar por fecha real.
  construirSerieDiaria() {
    const dias = this.periodo === 'rango' && this._rangoDias
      ? Array.from({ length: this._rangoDias }, (_, i) => { const d = new Date(this.fechaDesde); d.setDate(d.getDate() + i); return d; })
      : this.getDiasRango();

    const n = dias.length;
    const labels = dias.map(d => d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit' }));

    if (State.ventas.length === 0) {
      return { labels, montos: new Array(n).fill(0), beneficios: new Array(n).fill(0) };
    }

    const montosPorDia = new Array(n).fill(0);
    const beneficiosPorDia = new Array(n).fill(0);
    State.ventas.forEach((v, idx) => {
      const montoVenta = v.items.reduce((s, i) => s + i.precio, 0);
      const costoVenta = v.items.reduce((s, i) => s + (i.costo || 0), 0);
      const diaIdx = Math.max(0, n - 1 - (idx % n));
      montosPorDia[diaIdx] += montoVenta * State.refBlue;
      beneficiosPorDia[diaIdx] += (montoVenta - costoVenta) * State.refBlue;
    });

    return { labels, montos: montosPorDia, beneficios: beneficiosPorDia };
  },

  renderCharts() {
    Object.values(this.charts).forEach(c => c && c.destroy());
    this.charts = {};

    const serie = this.construirSerieDiaria();
    const ctxEvol = document.getElementById('chart-evolucion');
    if (ctxEvol) {
      this.charts.evolucion = new Chart(ctxEvol, {
        type: 'line',
        data: {
          labels: serie.labels,
          datasets: [
            { label: 'Monto vendido', data: serie.montos, borderColor: '#185FA5', backgroundColor: 'rgba(24,95,165,0.08)', fill: true, tension: 0.35, pointRadius: 2 },
            { label: 'Beneficio', data: serie.beneficios, borderColor: '#3B6D11', backgroundColor: 'rgba(59,109,17,0.08)', fill: true, tension: 0.35, pointRadius: 2 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } } },
          scales: {
            y: { ticks: { callback: v => '$' + (v / 1000).toFixed(0) + 'k', font: { size: 10 } }, grid: { color: '#EFEDE6' } },
            x: { ticks: { font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 10 }, grid: { display: false } }
          }
        }
      });
    }

    const ctxMB = document.getElementById('chart-monto-beneficio');
    if (ctxMB) {
      this.charts.montoBeneficio = new Chart(ctxMB, {
        type: 'bar',
        data: {
          labels: serie.labels,
          datasets: [
            { label: 'Monto vendido', data: serie.montos, backgroundColor: '#E6F1FB', borderColor: '#185FA5', borderWidth: 1 },
            { label: 'Beneficio', data: serie.beneficios, backgroundColor: '#EAF3DE', borderColor: '#3B6D11', borderWidth: 1 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } } },
          scales: {
            y: { ticks: { callback: v => '$' + (v / 1000).toFixed(0) + 'k', font: { size: 10 } }, grid: { color: '#EFEDE6' } },
            x: { ticks: { font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }, grid: { display: false } }
          }
        }
      });
    }

    const ctxP = document.getElementById('chart-personas');
    if (ctxP) {
      const equivPorPersona = State.personas.map(p => {
        const c = State.cajas[p] || {};
        return (c['ARS cash']||0) + (c['ARS transferencia']||0) + ((c['USD cash']||0)+(c['USD transferencia']||0))*State.refBlue + (c['USDT']||0)*State.refUsdt;
      });
      const colores = ['#185FA5', '#3B6D11', '#854F0B', '#3C3489', '#085041'];
      this.charts.personas = new Chart(ctxP, {
        type: 'doughnut',
        data: {
          labels: State.personas,
          datasets: [{ data: equivPorPersona, backgroundColor: colores.slice(0, State.personas.length), borderWidth: 2, borderColor: '#fff' }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } },
            tooltip: { callbacks: { label: ctx => `${ctx.label}: ${State.fmtARS(ctx.raw)}` } }
          }
        }
      });
    }
  }
};

</script>
<script>
const Stock = {
  currentTab: 'all',
  CAT_LABELS: { iphone:'iPhone', android:'Android', mac:'Mac', ipad:'iPad', watch:'Watch', audio:'Audio', perfumeria:'Perfumería', accesorio:'Accesorio', repuesto:'Repuesto', otro:'Otro' },
  CAT_CLASS: { iphone:'b-blue', android:'b-teal', mac:'b-blue', ipad:'b-blue', watch:'b-blue', audio:'b-purple', perfumeria:'b-green', accesorio:'b-purple', repuesto:'b-amber', otro:'b-gray' },
  CATS_IMEI: ['iphone','android','mac','ipad'],

  render() {
    const c = document.createElement('div');
    c.innerHTML = `
      <div style="padding:14px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="display:flex;gap:4px;flex-wrap:wrap" id="stock-tabs"></div>
        <button class="btn btn-primary" onclick="Stock.openDrawer('new')"><i class="ti ti-plus"></i> Agregar producto</button>
      </div>
      <div style="padding:12px 22px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap">
        <input type="text" id="stock-search" placeholder="Buscar producto..." oninput="Stock.renderTable()" style="font-size:12px;padding:6px 10px;border:1px solid var(--border-strong);border-radius:8px;flex:1;min-width:160px">
        <select id="stock-filter-prov" onchange="Stock.renderTable()" style="font-size:12px;padding:6px 10px;border:1px solid var(--border-strong);border-radius:8px">
          <option value="">Todos los proveedores</option>
          <option>Gonza</option><option>Proveedor perfumería</option><option>Proveedor accesorios</option>
        </select>
      </div>
      <div class="body-pad" style="padding-top:14px">
        <table class="stock-table-desktop"><thead><tr>
          <th>Producto</th><th>Rubro</th><th>Proveedor</th><th>Custodio</th><th>Costo USD</th><th>Precio venta USD</th><th>Margen</th><th>Stock</th><th>Estado</th><th></th>
        </tr></thead><tbody id="stock-tbody"></tbody></table>
        <div class="stock-cards-mobile" id="stock-cards"></div>
      </div>
      <div id="stock-drawer-host"></div>
    `;
    setTimeout(() => { this.renderTabs(); this.renderTable(); }, 0);
    return c;
  },

  isMobile() { return window.innerWidth <= 900; },

  renderTabs() {
    const cats = ['all', ...new Set(State.stock.map(s => s.cat))];
    document.getElementById('stock-tabs').innerHTML = cats.map(c => {
      const count = c === 'all' ? State.stock.length : State.stock.filter(s => s.cat === c).length;
      const label = c === 'all' ? 'Todos' : (this.CAT_LABELS[c] || c);
      return `<button class="btn btn-sm ${this.currentTab===c?'btn-primary':''}" onclick="Stock.setTab('${c}')">${label} (${count})</button>`;
    }).join('');
  },
  setTab(c) { this.currentTab = c; this.renderTabs(); this.renderTable(); },

  renderTable() {
    const q = (document.getElementById('stock-search')?.value || '').toLowerCase();
    const prov = document.getElementById('stock-filter-prov')?.value || '';
    let rows = State.stock.filter(s => {
      if (this.currentTab !== 'all' && s.cat !== this.currentTab) return false;
      if (q && !s.nombre.toLowerCase().includes(q)) return false;
      if (prov && s.proveedor !== prov) return false;
      return true;
    });
    const tbody = document.getElementById('stock-tbody');
    const cardsHost = document.getElementById('stock-cards');

    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state"><i class="ti ti-box"></i>Sin productos que coincidan</div></td></tr>`;
      if (cardsHost) cardsHost.innerHTML = `<div class="empty-state"><i class="ti ti-box"></i>Sin productos que coincidan</div>`;
      return;
    }

    tbody.innerHTML = rows.map(p => {
      const stock = State.getStock(p);
      const status = State.getStockStatus(p);
      const costoARS = p.costoUSD * p.cotiz;
      const margin = Math.round(((p.precioARS - costoARS) / costoARS) * 100);
      const precioUSD = p.cotiz ? (p.precioARS / p.cotiz) : 0;
      const statusBadge = status === 'ok' ? `<span class="badge b-green">OK</span>` : status === 'low' ? `<span class="badge b-amber">Bajo</span>` : `<span class="badge b-red">Sin stock</span>`;
      return `<tr>
        <td><b>${p.nombre}</b>${p.notas ? `<div style="font-size:10.5px;color:var(--text-secondary)">${p.notas}</div>` : ''}</td>
        <td><span class="badge ${this.CAT_CLASS[p.cat]||'b-gray'}">${this.CAT_LABELS[p.cat]||p.cat}</span></td>
        <td style="color:var(--text-secondary);font-size:11.5px">${p.proveedor}</td>
        <td style="font-size:11.5px">${p.custodio||'—'}</td>
        <td>USD ${p.costoUSD}</td>
        <td>${State.fmtUSD(precioUSD)}<div style="font-size:10px;color:var(--text-secondary)">${State.fmtARS(p.precioARS)}</div></td>
        <td style="color:${margin>=0?'var(--green-dark)':'var(--red)'}">${margin>=0?'+':''}${margin}%</td>
        <td>${stock}${p.imeis ? ' <span style="font-size:9px;color:var(--text-secondary)">IMEI</span>' : ''}</td>
        <td>${statusBadge}</td>
        <td><button class="btn btn-sm" onclick="Stock.openDrawer('edit',${p.id})"><i class="ti ti-edit"></i></button></td>
      </tr>`;
    }).join('');

    if (cardsHost) {
      cardsHost.innerHTML = rows.map(p => {
        const stock = State.getStock(p);
        const status = State.getStockStatus(p);
        const costoARS = p.costoUSD * p.cotiz;
        const margin = Math.round(((p.precioARS - costoARS) / costoARS) * 100);
        const precioUSD = p.cotiz ? (p.precioARS / p.cotiz) : 0;
        const statusBadge = status === 'ok' ? `<span class="badge b-green">OK</span>` : status === 'low' ? `<span class="badge b-amber">Bajo</span>` : `<span class="badge b-red">Sin stock</span>`;
        return `<div class="stock-card" onclick="Stock.openDrawer('edit',${p.id})">
          <div class="stock-card-top">
            <div style="min-width:0;flex:1">
              <div class="stock-card-name">${p.nombre}</div>
              <span class="badge ${this.CAT_CLASS[p.cat]||'b-gray'}" style="margin-top:4px">${this.CAT_LABELS[p.cat]||p.cat}</span>
            </div>
            ${statusBadge}
          </div>
          <div class="stock-card-grid">
            <div><label>Costo</label><span>USD ${p.costoUSD}</span></div>
            <div><label>Venta</label><span>${State.fmtUSD(precioUSD)}</span></div>
            <div><label>Margen</label><span style="color:${margin>=0?'var(--green-dark)':'var(--red)'}">${margin>=0?'+':''}${margin}%</span></div>
            <div><label>Stock</label><span>${stock}${p.imeis ? ' IMEI' : ''}</span></div>
          </div>
          <div class="stock-card-bottom">
            <span><i class="ti ti-truck"></i> ${p.proveedor}</span>
            <span><i class="ti ti-user"></i> ${p.custodio||'Sin asignar'}</span>
          </div>
          ${p.notas ? `<div class="stock-card-notas">${p.notas}</div>` : ''}
        </div>`;
      }).join('');
    }
  },

  openDrawer(mode, id) {
    const p = mode === 'edit' ? State.stock.find(x => x.id === id) : { cat: 'iphone', nombre: '', costoUSD: '', cotiz: State.refBlue, precioARS: '', proveedor: 'Gonza', custodio: '', notas: '', imeis: [], cantidad: 1 };
    const host = document.getElementById('stock-drawer-host');
    host.innerHTML = `
      <div class="drawer-bg" style="position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;justify-content:flex-end;z-index:100" onclick="if(event.target===this) Stock.closeDrawer()">
        <div style="width:380px;max-width:92vw;background:var(--bg);border-left:1px solid var(--border);display:flex;flex-direction:column;height:100%" onclick="event.stopPropagation()">
          <div style="padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <h3 style="font-size:14px;font-weight:600">${mode==='new'?'Agregar producto':'Editar producto'}</h3>
            <button class="btn btn-sm" onclick="Stock.closeDrawer()"><i class="ti ti-x"></i></button>
          </div>
          <div style="flex:1;overflow-y:auto;padding:16px 18px">
            <div style="margin-bottom:12px"><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:6px">Categoría</label>
              <select id="f-cat" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px" onchange="Stock.toggleFields()">
                ${Object.entries(this.CAT_LABELS).map(([k,v]) => `<option value="${k}" ${p.cat===k?'selected':''}>${v}</option>`).join('')}
              </select>
            </div>
            <div style="margin-bottom:12px"><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Nombre / modelo</label>
              <input type="text" id="f-nombre" value="${p.nombre||''}" placeholder="ej: iPhone 15 128GB Negro" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
              <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Costo USD</label><input type="number" id="f-costo" value="${p.costoUSD||''}" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px"></div>
              <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Cotización</label><input type="number" id="f-cotiz" value="${p.cotiz||State.refBlue}" oninput="Stock.updatePricePreview()" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px"></div>
            </div>
            <div style="margin-bottom:12px"><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Precio de venta (USD)</label>
              <input type="number" id="f-precio-usd" value="${p.precioARS && p.cotiz ? (p.precioARS / p.cotiz).toFixed(2) : ''}" placeholder="ej: 790" oninput="Stock.updatePricePreview()" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">
              <div style="font-size:10.5px;color:var(--text-secondary);margin-top:3px" id="precio-ars-preview">${p.precioARS ? '≈ ' + State.fmtARS(p.precioARS) + ' a la cotización indicada' : ''}</div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
              <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Proveedor</label>
                <select id="f-prov" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">
                  ${['Gonza','Proveedor perfumería','Proveedor accesorios','Otro'].map(x=>`<option ${p.proveedor===x?'selected':''}>${x}</option>`).join('')}
                </select>
              </div>
              <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Custodio</label>
                <select id="f-custodio" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">
                  <option value="">Sin asignar</option>
                  ${State.personas.map(x=>`<option ${p.custodio===x?'selected':''}>${x}</option>`).join('')}
                </select>
              </div>
            </div>
            <div id="f-qty-wrap" style="margin-bottom:12px;display:${this.CATS_IMEI.includes(p.cat)?'none':'block'}">
              <label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Cantidad en stock</label>
              <div style="display:flex;align-items:center;gap:8px">
                <button type="button" onclick="Stock.bumpQty(-1)" style="width:32px;height:32px;border:1px solid var(--border-strong);border-radius:8px;background:var(--bg-secondary);cursor:pointer;font-size:16px">−</button>
                <input type="number" id="f-cantidad" value="${p.cantidad ?? 0}" min="0" style="width:100%;text-align:center;font-size:13px;font-weight:600;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">
                <button type="button" onclick="Stock.bumpQty(1)" style="width:32px;height:32px;border:1px solid var(--border-strong);border-radius:8px;background:var(--bg-secondary);cursor:pointer;font-size:16px">+</button>
              </div>
            </div>
            <div style="margin-bottom:12px"><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Notas</label>
              <textarea id="f-notas" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px;height:50px;resize:none">${p.notas||''}</textarea>
            </div>
          </div>
          <div style="padding:13px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end">
            <button class="btn" onclick="Stock.closeDrawer()">Cancelar</button>
            <button class="btn btn-primary" onclick="Stock.save(${mode==='edit'?id:'null'})"><i class="ti ti-check"></i> Guardar</button>
          </div>
        </div>
      </div>
    `;
  },

  bumpQty(delta) {
    const inp = document.getElementById('f-cantidad');
    if (!inp) return;
    const current = parseInt(inp.value) || 0;
    inp.value = Math.max(0, current + delta);
  },

  updatePricePreview() {
    const cotiz = parseFloat(document.getElementById('f-cotiz')?.value) || 0;
    const precioUSD = parseFloat(document.getElementById('f-precio-usd')?.value) || 0;
    const el = document.getElementById('precio-ars-preview');
    if (!el) return;
    el.textContent = (cotiz && precioUSD) ? `≈ ${State.fmtARS(precioUSD * cotiz)} a la cotización indicada` : '';
  },

  toggleFields() {
    const cat = document.getElementById('f-cat').value;
    document.getElementById('f-qty-wrap').style.display = this.CATS_IMEI.includes(cat) ? 'none' : 'block';
  },

  async save(id) {
    const nombre = document.getElementById('f-nombre').value.trim();
    const costoUSD = parseFloat(document.getElementById('f-costo').value) || 0;
    const cotiz = parseFloat(document.getElementById('f-cotiz').value) || State.refBlue;
    const precioUSD = parseFloat(document.getElementById('f-precio-usd').value) || 0;
    if (!nombre || !costoUSD || !precioUSD) { toast('Completá nombre, costo y precio de venta en USD.'); return; }
    const cat = document.getElementById('f-cat').value;
    const obj = {
      cat, nombre, costoUSD, cotiz,
      precioARS: Math.round(precioUSD * cotiz),
      proveedor: document.getElementById('f-prov').value,
      custodio: document.getElementById('f-custodio').value,
      notas: document.getElementById('f-notas').value,
    };
    if (this.CATS_IMEI.includes(cat)) {
      const existing = id ? State.stock.find(x => x.id === id) : null;
      obj.imeis = existing && existing.imeis ? existing.imeis : [];
    } else {
      const qtyInput = document.getElementById('f-cantidad');
      obj.cantidad = qtyInput ? (parseInt(qtyInput.value, 10) || 0) : 0;
    }

    toast('Guardando producto...');
    const { id: newId, error } = await DB.guardarProductoStock(obj, id);
    if (error) { toast('Hubo un problema guardando el producto.'); console.error(error); return; }

    if (id) {
      const idx = State.stock.findIndex(x => x.id === id);
      State.stock[idx] = { ...State.stock[idx], ...obj };
      toast('Producto actualizado.');
    } else {
      obj.id = newId;
      State.stock.push(obj);
      toast('Producto agregado al stock.');
    }
    Sheets.stock(obj);
    this.closeDrawer();
    this.renderTabs();
    this.renderTable();
  },

  closeDrawer() { document.getElementById('stock-drawer-host').innerHTML = ''; }
};

</script>
<script>
const Ventas = {
  step: 0,
  STEPS: ['Cliente', 'Trade-In', 'Ítems', 'Pagos', 'Confirm.'],
  draft: null,
  selectedStockIds: [],
  invMode: 'manual',
  manualCat: 'iphone',

  render() {
    const c = document.createElement('div');
    c.innerHTML = `
      <div style="padding:12px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:13px;color:var(--text-secondary)">${State.ventas.length} ventas registradas</div>
        <button class="btn btn-primary" onclick="Ventas.openNew()"><i class="ti ti-plus"></i> Nueva venta</button>
      </div>
      <div class="body-pad">
        <table><thead><tr><th>#</th><th>Fecha</th><th>Cliente</th><th>Detalle</th><th>Total</th><th>Estado</th><th></th></tr></thead>
        <tbody id="ventas-tbody"></tbody></table>
      </div>
      <div id="venta-modal-host"></div>
    `;
    setTimeout(() => this.renderList(), 0);
    return c;
  },

  renderList() {
    const tbody = document.getElementById('ventas-tbody');
    if (!tbody) return;
    tbody.innerHTML = State.ventas.map(v => {
      const total = v.items.reduce((s, i) => s + i.precio, 0);
      const pagado = v.pagos.reduce((s, p) => s + p.monto, 0);
      return `<tr>
        <td>#${v.id}</td><td>${v.fecha}</td><td>${v.cliente}</td>
        <td>${v.items.map(i=>i.nombre).join(', ').substring(0,40)}</td>
        <td>${State.fmtUSD(total)}</td>
        <td><span class="badge ${v.estado==='cerrada'?'b-green':'b-amber'}">${v.estado==='cerrada'?'Cerrada':'Abierta'}</span></td>
        <td>
          <button class="btn btn-sm" onclick="Ventas.viewSale(${v.id})"><i class="ti ti-eye"></i></button>
          <button class="btn btn-sm btn-red" onclick="Ventas.anular(${v.id})"><i class="ti ti-arrow-back-up"></i></button>
        </td>
      </tr>`;
    }).join('');
  },

  openNew() {
    this.draft = { cliente: '', vendedor: '', tradeIn: null, items: [], pagos: [] };
    this.step = 0;
    this.selectedStockIds = [];
    this.invMode = 'manual';
    this.showModal();
  },

  showModal() {
    const host = document.getElementById('venta-modal-host');
    host.innerHTML = `
      <div style="position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200">
        <div style="width:600px;max-width:94vw;max-height:88vh;background:var(--bg);border-radius:14px;display:flex;flex-direction:column;overflow:hidden">
          <div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <h3 style="font-size:15px;font-weight:600">Nueva venta</h3>
            <button class="btn btn-sm" onclick="Ventas.closeModal()"><i class="ti ti-x"></i></button>
          </div>
          <div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;gap:4px" id="venta-stepper"></div>
          <div style="flex:1;overflow-y:auto;padding:18px 20px" id="venta-step-body"></div>
          <div style="padding:13px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between">
            <button class="btn" id="venta-btn-prev" onclick="Ventas.prevStep()">Anterior</button>
            <button class="btn btn-primary" id="venta-btn-next" onclick="Ventas.nextStep()">Siguiente</button>
          </div>
        </div>
      </div>
    `;
    this.renderStep();
  },
  closeModal() { document.getElementById('venta-modal-host').innerHTML = ''; },

  renderStep() {
    document.getElementById('venta-stepper').innerHTML = this.STEPS.map((s, i) => {
      const done = i < this.step, active = i === this.step;
      const color = done || active ? 'var(--blue)' : 'var(--border-strong)';
      return `<div style="flex:1;text-align:center">
        <div style="width:24px;height:24px;border-radius:50%;background:${done||active?'var(--blue)':'var(--bg-secondary)'};color:${done||active?'#fff':'var(--text-secondary)'};display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600">${done?'✓':i+1}</div>
        <div style="font-size:9.5px;color:${active?'var(--blue)':'var(--text-secondary)'};margin-top:2px;font-weight:${active?'600':'400'}">${s}</div>
      </div>`;
    }).join('');
    document.getElementById('venta-btn-prev').style.opacity = this.step === 0 ? '0.4' : '1';
    document.getElementById('venta-btn-next').textContent = this.step === 4 ? 'Confirmar venta' : 'Siguiente';

    const body = document.getElementById('venta-step-body');
    if (this.step === 0) body.innerHTML = this.stepCliente();
    else if (this.step === 1) body.innerHTML = this.stepTradeIn();
    else if (this.step === 2) body.innerHTML = this.stepItems();
    else if (this.step === 3) body.innerHTML = this.stepPagos();
    else body.innerHTML = this.stepConfirm();
  },

  stepCliente() {
    const d = this.draft;
    return `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Nombre del cliente</label>
          <input type="text" id="vf-cliente" value="${d.cliente}" placeholder="Consumidor final si se deja vacío" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px"></div>
        <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Vendedor</label>
          <select id="vf-vendedor" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">
            <option value="">Seleccionar</option>
            ${State.personas.map(p=>`<option ${d.vendedor===p?'selected':''}>${p}</option>`).join('')}
          </select></div>
      </div>`;
  },

  stepTradeIn() {
    const d = this.draft;
    const active = !!d.tradeIn;
    return `
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin-bottom:12px">
        <input type="checkbox" id="vf-ti-active" ${active?'checked':''} onchange="Ventas.toggleTI()"> El cliente entrega un producto como parte de pago
      </label>
      <div id="vf-ti-form" style="display:${active?'block':'none'}">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Modelo entregado</label>
            <input type="text" id="vf-ti-modelo" value="${d.tradeIn?.modelo||''}" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px"></div>
          <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Valor tomado (USD)</label>
            <input type="number" id="vf-ti-valor" value="${d.tradeIn?.valor||''}" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px"></div>
        </div>
        <div style="font-size:11px;color:var(--text-secondary)">Este valor se restará del total de la venta.</div>
      </div>`;
  },
  toggleTI() {
    document.getElementById('vf-ti-form').style.display = document.getElementById('vf-ti-active').checked ? 'block' : 'none';
  },

  stepItems() {
    const d = this.draft;
    const total = d.items.reduce((s, i) => s + i.precio, 0) - (d.tradeIn?.valor || 0);
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <b>Ítems agregados</b><span style="font-size:14px;font-weight:600;color:var(--blue)">${State.fmtUSD(Math.max(0,total))}</span>
      </div>
      ${d.items.map((it, idx) => `<div style="display:flex;justify-content:space-between;padding:8px 10px;background:var(--bg-secondary);border-radius:8px;margin-bottom:5px;font-size:12px">
        <span>${it.nombre} — ${State.fmtUSD(it.precio)}</span>
        <button onclick="Ventas.removeItem(${idx})" style="background:none;border:none;cursor:pointer;color:var(--text-secondary)"><i class="ti ti-x"></i></button>
      </div>`).join('')}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0">
        <button class="btn ${this.invMode==='manual'?'btn-primary':''}" onclick="Ventas.setInvMode('manual')">Carga manual</button>
        <button class="btn ${this.invMode==='inventario'?'btn-primary':''}" onclick="Ventas.setInvMode('inventario')">Desde inventario</button>
      </div>
      <div id="vf-item-form">${this.invMode === 'manual' ? this.manualItemForm() : this.inventoryForm()}</div>
    `;
  },
  setInvMode(m) { this.invMode = m; document.getElementById('venta-step-body').innerHTML = this.stepItems(); },

  manualItemForm() {
    return `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <input type="text" id="vf-m-nombre" placeholder="Nombre del producto" style="font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">
        <input type="number" id="vf-m-costo" placeholder="Costo USD" style="font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">
      </div>
      <input type="number" id="vf-m-precio" placeholder="Precio de venta (USD)" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px;margin-bottom:8px">
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="Ventas.addManualItem()"><i class="ti ti-plus"></i> Agregar ítem</button>
    `;
  },
  addManualItem() {
    const nombre = document.getElementById('vf-m-nombre').value.trim();
    const precio = parseFloat(document.getElementById('vf-m-precio').value) || 0;
    const costo = parseFloat(document.getElementById('vf-m-costo').value) || 0;
    if (!nombre || !precio) { toast('Completá nombre y precio.'); return; }
    this.draft.items.push({ nombre, precio, costo, stockId: null, imei: null });
    document.getElementById('venta-step-body').innerHTML = this.stepItems();
  },

  inventoryForm() {
    const disponibles = State.stock.filter(s => State.getStock(s) > 0);
    return `
      <div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px">${disponibles.length} productos con stock disponible</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:240px;overflow-y:auto">
        ${disponibles.map(s => {
          const sel = this.selectedStockIds.includes(s.id);
          return `<div onclick="Ventas.toggleStockSel(${s.id})" style="border:${sel?'2px solid var(--blue)':'1px solid var(--border)'};background:${sel?'var(--blue-light)':'var(--bg)'};border-radius:8px;padding:9px 11px;cursor:pointer;font-size:11.5px">
            <b style="font-size:12px">${s.nombre}</b><br>
            <span style="color:var(--text-secondary)">Costo: USD ${s.costoUSD} · Venta: ${State.fmtARS(s.precioARS)}</span>
          </div>`;
        }).join('')}
      </div>
      ${this.selectedStockIds.length ? `<button class="btn btn-green" style="width:100%;justify-content:center;margin-top:10px" onclick="Ventas.addStockItems()"><i class="ti ti-check"></i> Agregar ${this.selectedStockIds.length} seleccionado(s)</button>` : ''}
    `;
  },
  toggleStockSel(id) {
    const i = this.selectedStockIds.indexOf(id);
    if (i >= 0) this.selectedStockIds.splice(i, 1); else this.selectedStockIds.push(id);
    document.getElementById('vf-item-form').innerHTML = this.inventoryForm();
  },
  addStockItems() {
    this.selectedStockIds.forEach(id => {
      const s = State.stock.find(x => x.id === id);
      if (!s) return;
      const imei = s.imeis && s.imeis.length ? s.imeis[0] : null;
      this.draft.items.push({ nombre: s.nombre, precio: s.precioARS / State.refBlue, costo: s.costoUSD, stockId: id, imei });
    });
    this.selectedStockIds = [];
    document.getElementById('venta-step-body').innerHTML = this.stepItems();
  },
  removeItem(idx) { this.draft.items.splice(idx, 1); document.getElementById('venta-step-body').innerHTML = this.stepItems(); },

  stepPagos() {
    const d = this.draft;
    const total = Math.max(0, d.items.reduce((s, i) => s + i.precio, 0) - (d.tradeIn?.valor || 0));
    const pagado = d.pagos.reduce((s, p) => s + p.monto, 0);
    const saldo = Math.max(0, total - pagado);
    return `
      <div style="display:flex;gap:16px;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:12px">
        <div><div style="font-size:11px;color:var(--text-secondary)">Total venta</div><div style="font-size:16px;font-weight:600">${State.fmtUSD(total)}</div></div>
        <div><div style="font-size:11px;color:var(--text-secondary)">Saldo restante</div><div style="font-size:16px;font-weight:600;color:${saldo>0?'var(--red)':'var(--green-dark)'}">${State.fmtUSD(saldo)}</div></div>
      </div>
      ${d.pagos.map((p, idx) => `<div style="display:flex;justify-content:space-between;padding:7px 10px;background:var(--bg-secondary);border-radius:8px;margin-bottom:5px;font-size:12px">
        <span>${p.persona} — ${p.bolsillo} — ${State.fmtUSD(p.monto)}</span>
        <button onclick="Ventas.removePago(${idx})" style="background:none;border:none;cursor:pointer"><i class="ti ti-x"></i></button>
      </div>`).join('')}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0">
        <select id="vf-pago-persona" style="font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">
