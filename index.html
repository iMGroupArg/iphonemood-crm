<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iPhoneMood — CRM</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<link rel="stylesheet" href="src/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
</head>
<body>
<div id="login-screen" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:24px;padding:20px">
  <div style="text-align:center">
    <div style="width:72px;height:72px;border-radius:18px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:28px;color:#fff;margin:0 auto 20px;box-shadow:0 8px 32px rgba(10,132,255,.4)">iM</div>
    <h1 style="font-size:28px;font-weight:700;letter-spacing:-.6px;margin-bottom:6px">iPhoneMood CRM</h1>
    <p style="font-size:15px;color:var(--text-secondary)">Iniciá sesión con tu cuenta de Google</p>
  </div>
  <button id="login-google-btn" onclick="Auth.iniciarSesionConGoogle()" style="display:flex;align-items:center;gap:12px;background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-lg);padding:14px 28px;font-size:15px;font-weight:600;color:var(--text);cursor:pointer;font-family:var(--font);transition:background .15s">
    <svg width="20" height="20" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.72A5.4 5.4 0 0 1 3.69 9c0-.6.1-1.18.28-1.72V4.95H.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.05l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.95L3.97 7.28C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
    Continuar con Google
  </button>
  <div id="login-status" style="font-size:13px;color:var(--text-secondary);min-height:18px"></div>
</div>

<div class="app-shell" id="app-shell" style="display:none">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="App.closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-logo" style="background:#1a1a1a;padding:5px">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 245" width="26" height="26">
          <path d="M100,18 C86,4 64,7 61,22 C58,37 71,48 83,43 C76,56 60,60 48,82 C33,108 34,140 50,162 C62,180 80,190 96,190 C108,190 116,184 124,184 C132,184 140,190 154,190 C171,190 189,176 199,154 C173,141 173,105 199,93 C189,65 168,55 150,59 C140,61 132,69 124,69 C116,69 108,61 96,59 C87,57 79,48 83,35 C87,22 100,18 100,18 Z" fill="#fff"/>
          <path d="M104,4 C104,4 117,-1 128,10 C139,21 131,40 118,38 C109,36 99,20 104,4 Z" fill="#fff"/>
        </svg>
      </div>
      <div><div class="name">iPhoneMood</div><div class="loc">Rosario · CRM</div></div>
    </div>
    <div class="sb-nav">
      <div class="nav-group">
        <div class="nav-label">Principal</div>
        <div class="nav-item active" data-page="dashboard"><i class="ti ti-layout-dashboard"></i> Dashboard</div>
      </div>
      <div class="nav-group">
        <div class="nav-label">Operaciones</div>
        <div class="nav-item" data-page="ventas"><i class="ti ti-receipt"></i> Ventas <span id="badge-ventas" style="display:none;margin-left:auto;background:var(--amber);color:#000;border-radius:20px;font-size:10px;font-weight:700;padding:1px 6px;min-width:18px;align-items:center;justify-content:center"></span></div>
        <div class="nav-item" data-page="stock"><i class="ti ti-box"></i> Stock</div>
        <div class="nav-item" data-page="clientes"><i class="ti ti-address-book"></i> Clientes</div>
        <div class="nav-item" data-page="reparaciones"><i class="ti ti-tool"></i> Reparaciones <span id="badge-reparaciones" style="display:none;margin-left:auto;background:var(--green);color:#000;border-radius:20px;font-size:10px;font-weight:700;padding:1px 6px;min-width:18px;align-items:center;justify-content:center"></span></div>
        <div class="nav-item" data-page="gastos"><i class="ti ti-arrow-down-circle"></i> Gastos</div>
        <div class="nav-item" data-page="cueva"><i class="ti ti-arrows-exchange"></i> Cueva / cambio</div>
      </div>
      <div class="nav-group">
        <div class="nav-label">Finanzas</div>
        <div class="nav-item" data-page="cajas"><i class="ti ti-wallet"></i> Cajas</div>
        <div class="nav-item" data-page="cashflow"><i class="ti ti-trending-up"></i> Cash flow</div>
        <div class="nav-item" data-page="capital"><i class="ti ti-chart-pie"></i> Capital & Inversiones</div>
      </div>
      <div class="nav-group">
        <div class="nav-label">Sistema</div>
        <div class="nav-item" data-page="panel"><i class="ti ti-settings"></i> Panel de control</div>
      </div>
    </div>
    <div class="sb-foot">
      <button class="quick-btn" onclick="App.goTo('ventas');setTimeout(()=>Ventas.openNew(),50)"><i class="ti ti-plus"></i> Venta rápida</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center">
        <button class="mobile-menu-btn" onclick="App.toggleSidebar()"><span style="font-size:18px;line-height:1">☰</span></button>
        <h1 id="page-title">Panel general</h1>
      </div>
      <div class="topbar-right">
        <button class="search-btn" onclick="Search.open()" title="Buscar"><span style="font-size:16px">🔍</span></button>
        <span class="pill pill-blue"><i class="ti ti-currency-dollar"></i> Blue: $<span id="topbar-blue">1075</span></span>
        <span class="pill pill-green"><i class="ti ti-currency-bitcoin"></i> USDT: $<span id="topbar-usdt">1061</span></span>
        <div id="user-menu" style="position:relative">
          <button onclick="App.toggleUserMenu()" style="display:flex;align-items:center;gap:6px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer;font-family:var(--font)">
            <span id="user-avatar" class="av" style="width:24px;height:24px;font-size:9px"></span>
            <span id="user-name" style="font-size:12px;font-weight:600;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)"></span>
            <i class="ti ti-chevron-down" style="font-size:12px;color:var(--text-secondary)"></i>
          </button>
          <div id="user-menu-dropdown" style="display:none;position:absolute;top:38px;right:0;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);min-width:190px;z-index:300;overflow:hidden">
            <div id="user-email-full" style="padding:10px 14px;font-size:11px;color:var(--text-secondary);border-bottom:1px solid var(--border);word-break:break-all"></div>
            <div onclick="Auth.cerrarSesion()" style="padding:12px 14px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--red)"><i class="ti ti-logout"></i> Cerrar sesión</div>
          </div>
        </div>
      </div>
    </div>

    <div id="pages"></div>
  </div>
</div>

<div class="search-overlay" id="search-overlay" onclick="Search.handleOverlayClick(event)">
  <div class="search-modal" id="search-modal">
    <div class="search-input-row">
      <i class="ti ti-search"></i>
      <input type="text" id="search-input" placeholder="Buscar ventas, stock, reparaciones…" autocomplete="off" oninput="Search.onInput(this.value)">
      <button class="search-close-btn" onclick="Search.close()"><i class="ti ti-x"></i></button>
    </div>
    <div class="search-results" id="search-results"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="src/modules/app.js"></script>
</body>
</html>
