          ${State.personas.map(p=>`<option>${p}</option>`).join('')}
        </select>
        <select id="vf-pago-bolsillo" style="font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">
          <option>ARS cash</option><option>ARS transferencia</option><option>USD cash</option><option>USD transferencia</option><option>USDT</option>
        </select>
      </div>
      <div style="display:flex;gap:8px">
        <input type="number" id="vf-pago-monto" value="${saldo.toFixed(2)}" style="flex:1;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">
        <button class="btn btn-primary" onclick="Ventas.addPago()"><i class="ti ti-plus"></i> Agregar pago</button>
      </div>
    `;
  },
  addPago() {
    const persona = document.getElementById('vf-pago-persona').value;
    const bolsillo = document.getElementById('vf-pago-bolsillo').value;
    const monto = parseFloat(document.getElementById('vf-pago-monto').value) || 0;
    if (!monto) { toast('Ingresá un monto.'); return; }
    this.draft.pagos.push({ persona, bolsillo, monto });
    document.getElementById('venta-step-body').innerHTML = this.stepPagos();
  },
  removePago(idx) { this.draft.pagos.splice(idx, 1); document.getElementById('venta-step-body').innerHTML = this.stepPagos(); },

  stepConfirm() {
    const d = this.draft;
    const total = Math.max(0, d.items.reduce((s, i) => s + i.precio, 0) - (d.tradeIn?.valor || 0));
    const pagado = d.pagos.reduce((s, p) => s + p.monto, 0);
    const saldo = Math.max(0, total - pagado);
    return `
      <div style="margin-bottom:14px"><b>Cliente:</b> ${d.cliente || 'Consumidor final'} ${d.vendedor?`· Vendedor: ${d.vendedor}`:''}</div>
      <div style="margin-bottom:14px"><b>Ítems (${d.items.length})</b>
        ${d.items.map(i=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0">${i.nombre}<span>${State.fmtUSD(i.precio)}</span></div>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border);font-weight:600">Total<span>${State.fmtUSD(total)}</span></div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;color:${saldo>0?'var(--red)':'var(--green-dark)'}">Saldo<span>${State.fmtUSD(saldo)}</span></div>
      <div style="background:var(--blue-light);border-radius:8px;padding:10px 12px;margin-top:12px;font-size:12px;color:var(--blue-dark)">
        La venta se guardará como: <b>${saldo > 0 ? 'Abierta' : 'Cerrada'}</b>
      </div>
    `;
  },

  nextStep() {
    if (this.step === 1 && document.getElementById('vf-ti-active')) {
      const active = document.getElementById('vf-ti-active').checked;
      this.draft.tradeIn = active ? { modelo: document.getElementById('vf-ti-modelo').value, valor: parseFloat(document.getElementById('vf-ti-valor').value) || 0 } : null;
    }
    if (this.step === 0) {
      this.draft.cliente = document.getElementById('vf-cliente').value.trim() || 'Consumidor final';
      this.draft.vendedor = document.getElementById('vf-vendedor').value;
    }
    if (this.step === 2 && this.draft.items.length === 0) { toast('Agregá al menos un ítem.'); return; }
    if (this.step === 4) { this.confirmSale(); return; }
    this.step++;
    this.renderStep();
  },
  prevStep() { if (this.step > 0) { this.step--; this.renderStep(); } },

  async confirmSale() {
    const d = this.draft;
    const total = Math.max(0, d.items.reduce((s, i) => s + i.precio, 0) - (d.tradeIn?.valor || 0));
    const pagado = d.pagos.reduce((s, p) => s + p.monto, 0);
    const estado = pagado >= total ? 'cerrada' : 'abierta';

    toast('Guardando venta...');

    // Descontar stock de los ítems que vinieron de inventario (memoria + base de datos)
    const stockMovs = [];
    for (const it of d.items) {
      if (it.stockId) {
        const removed = State.descontarStock(it.stockId, it.imei);
        if (removed) {
          stockMovs.push(removed);
          const item = State.stock.find(s => s.id === it.stockId);
          if (item) {
            if (item.imeis) await DB.actualizarImeisStock(it.stockId, item.imeis);
            else await DB.actualizarCantidadStock(it.stockId, item.cantidad);
          }
        }
      }
    }

    // Acreditar pagos en las cajas correspondientes (memoria + base de datos)
    d.pagos.forEach(p => {
      let montoEnBolsillo = p.monto;
      if (p.bolsillo.startsWith('ARS')) montoEnBolsillo = p.monto * State.refBlue;
      State.acreditarCaja(p.persona, p.bolsillo, montoEnBolsillo);
    });

    // Guardar la venta en Supabase
    const ventaId = await DB.crearVenta(d, estado);
    if (!ventaId) { toast('Hubo un problema guardando la venta. Probá de nuevo.'); return; }

    const venta = {
      id: ventaId, fecha: 'Hoy', cliente: d.cliente, vendedor: d.vendedor,
      items: d.items, pagos: d.pagos.map(p => ({ caja: `${p.persona}-${p.bolsillo}`, monto: p.monto, persona: p.persona, bolsillo: p.bolsillo })),
      estado, tradeIn: d.tradeIn, stockMovs
    };
    State.ventas.unshift(venta);

    // Respaldo en Google Sheets (no bloquea, falla en silencio si hay un problema)
    const costoTotal = d.items.reduce((s, i) => s + (i.costo || 0), 0);
    Sheets.venta(venta, total, costoTotal);

    this.closeModal();
    this.renderList();
    toast(`Venta #${venta.id} confirmada y guardada. Stock actualizado y pagos acreditados en las cajas correspondientes.`);
  },

  viewSale(id) {
    const v = State.ventas.find(x => x.id === id);
    if (!v) return;
    const total = v.items.reduce((s, i) => s + i.precio, 0);
    const pagado = v.pagos.reduce((s, p) => s + p.monto, 0);
    const host = document.getElementById('venta-modal-host');
    host.innerHTML = `
      <div style="position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200" onclick="if(event.target===this) Ventas.closeModal()">
        <div style="width:440px;max-width:92vw;background:var(--bg);border-radius:14px;padding:20px" onclick="event.stopPropagation()">
          <div style="display:flex;justify-content:space-between;margin-bottom:12px"><h3 style="font-size:15px;font-weight:600">Venta #${v.id}</h3><span class="badge ${v.estado==='cerrada'?'b-green':'b-amber'}">${v.estado==='cerrada'?'Cerrada':'Abierta'}</span></div>
          <p style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">${v.cliente} · ${v.fecha}${v.vendedor?` · Vendedor: ${v.vendedor}`:''}</p>
          ${v.items.map(i=>`<div style="display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--border)">${i.nombre}<span>${State.fmtUSD(i.precio)}</span></div>`).join('')}
          <div style="display:flex;justify-content:space-between;padding:8px 0;font-weight:600">Total<span>${State.fmtUSD(total)}</span></div>
          <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;color:var(--text-secondary)">Pagado<span>${State.fmtUSD(pagado)}</span></div>
          <div style="text-align:right;margin-top:14px"><button class="btn" onclick="Ventas.closeModal()">Cerrar</button></div>
        </div>
      </div>
    `;
  },

  async anular(id) {
    const v = State.ventas.find(x => x.id === id);
    if (!v) return;
    if (!confirm(`¿Anular la venta #${v.id}? Esto revertirá el stock y los pagos en las cajas correspondientes.`)) return;
    // Revertir stock (memoria + base de datos)
    for (const m of (v.stockMovs || [])) {
      State.restaurarStock(m.stockId, m.imei);
      const item = State.stock.find(s => s.id === m.stockId);
      if (item) {
        if (item.imeis) await DB.actualizarImeisStock(m.stockId, item.imeis);
        else await DB.actualizarCantidadStock(m.stockId, item.cantidad);
      }
    }
    // Revertir cajas
    v.pagos.forEach(p => {
      let montoEnBolsillo = p.monto;
      if (p.bolsillo.startsWith('ARS')) montoEnBolsillo = p.monto * State.refBlue;
      State.debitarCaja(p.persona, p.bolsillo, montoEnBolsillo);
    });
    await DB.anularVenta(id);
    State.ventas = State.ventas.filter(x => x.id !== id);
    this.renderList();
    toast(`Venta #${id} anulada. Stock restaurado y pagos revertidos en las cajas de origen.`);
  }
};

</script>
<script>
const Reparaciones = {
  currentId: null,
  ESTADOS: ['ingresado','diagnosticado','en_reparacion','listo','entregado'],
  ESTADO_LABEL: { ingresado:'Ingresado', diagnosticado:'Diagnosticado', en_reparacion:'En reparación', listo:'Listo', entregado:'Entregado', rechazado:'Rechazado', no_reparable:'No reparable' },
  ESTADO_CLASS: { ingresado:'b-gray', diagnosticado:'b-purple', en_reparacion:'b-blue', listo:'b-green', entregado:'b-teal', rechazado:'b-red', no_reparable:'b-red' },

  render() {
    const c = document.createElement('div');
    c.className = 'rep-shell';
    c.style.display = 'flex';
    c.style.flex = '1';
    c.style.overflow = 'hidden';
    c.innerHTML = `
      <div class="rep-list-panel" style="width:260px;min-width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg-secondary)">
        <div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <b style="font-size:13px">Órdenes (${State.reparaciones.length})</b>
          <button class="btn btn-sm btn-primary" onclick="Reparaciones.newOrder()"><i class="ti ti-plus"></i></button>
        </div>
        <div style="padding:8px 10px;border-bottom:1px solid var(--border)"><input type="text" id="rep-search" placeholder="Buscar..." oninput="Reparaciones.renderList()" style="width:100%;font-size:12px;padding:5px 9px;border:1px solid var(--border-strong);border-radius:8px"></div>
        <div style="flex:1;overflow-y:auto" id="rep-list"></div>
      </div>
      <div class="rep-detail-panel" style="flex:1;flex-direction:column;overflow:hidden;min-width:0">
        <button class="btn btn-sm rep-back-btn" onclick="Reparaciones.backToList()" style="display:none;margin:10px 14px 0"><i class="ti ti-arrow-left"></i> Ver órdenes</button>
        <div id="rep-detail" style="flex:1;overflow-y:auto;padding:18px 20px"></div>
      </div>
    `;
    setTimeout(() => {
      if (!this.currentId && State.reparaciones.length) this.currentId = State.reparaciones[0].id;
      this.renderList();
      this.renderDetail();
      this.syncMobileView(false);
      this.bindResizeListener();
    }, 0);
    return c;
  },

  hasMovimientos(o) { return (o.pagos && o.pagos.length > 0) || (o.repuestos && o.repuestos.length > 0); },

  renderList() {
    const q = (document.getElementById('rep-search')?.value || '').toLowerCase();
    const filtered = State.reparaciones.filter(o => !q || o.cliente.toLowerCase().includes(q) || o.equipo.toLowerCase().includes(q) || o.id.toLowerCase().includes(q));
    document.getElementById('rep-list').innerHTML = filtered.map(o => {
      const flags = [];
      if (o.pagos?.length) flags.push(`<span class="badge b-green" style="font-size:9px">$ pago</span>`);
      if (o.repuestos?.length) flags.push(`<span class="badge b-amber" style="font-size:9px">repuesto</span>`);
      return `<div onclick="Reparaciones.select('${o.id}')" style="padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;${this.currentId===o.id?'background:var(--bg);border-left:2px solid var(--blue)':''}">
        <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600">${o.id} — ${o.equipo}<span style="font-size:10px;color:var(--text-secondary);font-weight:400">${o.fechaIngreso}</span></div>
        <div style="font-size:11px;color:var(--text-secondary)">${o.cliente}</div>
        <div style="margin-top:5px;display:flex;gap:4px"><span class="badge ${this.ESTADO_CLASS[o.estado]}" style="font-size:9.5px">${this.ESTADO_LABEL[o.estado]}</span>${flags.join('')}</div>
      </div>`;
    }).join('');
  },
  select(id) { this.currentId = id; this.renderList(); this.renderDetail(); this.syncMobileView(true); },

  isMobile() { return window.innerWidth <= 900; },

  syncMobileView(showDetail) {
    const listPanel = document.querySelector('.rep-list-panel');
    const detailPanel = document.querySelector('.rep-detail-panel');
    const backBtn = document.querySelector('.rep-back-btn');
    if (!listPanel || !detailPanel) return;

    if (!this.isMobile()) {
      // Desktop: siempre las dos columnas visibles, sin botón de volver
      listPanel.style.display = 'flex';
      detailPanel.style.display = 'flex';
      if (backBtn) backBtn.style.display = 'none';
      return;
    }

    // Mobile: una sola columna visible por vez
    if (showDetail) {
      listPanel.style.display = 'none';
      detailPanel.style.display = 'flex';
      if (backBtn) backBtn.style.display = 'inline-flex';
    } else {
      listPanel.style.display = 'flex';
      detailPanel.style.display = 'none';
      if (backBtn) backBtn.style.display = 'none';
    }
  },

  backToList() {
    this.syncMobileView(false);
  },

  _resizeBound: false,
  bindResizeListener() {
    if (this._resizeBound) return;
    this._resizeBound = true;
    window.addEventListener('resize', () => {
      if (document.querySelector('.rep-list-panel')) this.syncMobileView(this.isMobile() && !!this.currentId && document.querySelector('.rep-detail-panel')?.style.display === 'flex');
    });
  },

  renderDetail() {
    const o = State.reparaciones.find(x => x.id === this.currentId);
    const detail = document.getElementById('rep-detail');
    if (!o) { detail.innerHTML = `<div class="empty-state"><i class="ti ti-tool"></i>Seleccioná una orden</div>`; return; }

    const totalCosto = o.costoMO + o.repuestos.reduce((a, r) => a + r.costo, 0);
    const margen = o.precioFinal - totalCosto;
    const tieneMov = this.hasMovimientos(o);
    const isTerminal = ['rechazado', 'no_reparable'].includes(o.estado);

    let movInfo = '';
    if (isTerminal) {
      movInfo = tieneMov
        ? `<div style="background:var(--red-light);border:1px solid #F09595;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:11.5px;color:var(--red)"><b style="display:block;margin-bottom:3px">⚠ Esta orden tiene movimientos asociados</b>Usá "Cancelar orden" para revertir pagos y repuestos de stock.</div>`
        : `<div style="background:var(--green-light);border:1px solid #97C459;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:11.5px;color:var(--green-dark)"><b style="display:block;margin-bottom:3px">✓ Sin movimientos asociados</b>Equipo marcado automáticamente como devuelto al cliente.</div>`;
    }

    detail.innerHTML = `
      <div class="rep-detail-header" style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <h2 style="font-size:15px;font-weight:600;flex:1;min-width:0">${o.id} — ${o.equipo}<br><span style="font-size:12px;color:var(--text-secondary);font-weight:400">${o.cliente}</span></h2>
        <span class="badge ${this.ESTADO_CLASS[o.estado]}" style="flex-shrink:0">${this.ESTADO_LABEL[o.estado]}</span>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px">
        ${this.ESTADOS.map(s => `<span onclick="Reparaciones.setEstado('${s}')" style="font-size:11px;padding:5px 11px;border-radius:20px;border:1.5px solid ${o.estado===s?'var(--blue)':'var(--border-strong)'};background:${o.estado===s?'var(--blue-light)':'var(--bg)'};color:${o.estado===s?'var(--blue-dark)':'var(--text-secondary)'};cursor:pointer">${this.ESTADO_LABEL[s]}</span>`).join('')}
        <span onclick="Reparaciones.setEstado('rechazado')" style="font-size:11px;padding:5px 11px;border-radius:20px;border:1.5px solid #F09595;background:${o.estado==='rechazado'?'var(--red-light)':'var(--bg)'};color:${o.estado==='rechazado'?'var(--red)':'var(--text-secondary)'};cursor:pointer">Rechazado</span>
        <span onclick="Reparaciones.setEstado('no_reparable')" style="font-size:11px;padding:5px 11px;border-radius:20px;border:1.5px solid #F09595;background:${o.estado==='no_reparable'?'var(--red-light)':'var(--bg)'};color:${o.estado==='no_reparable'?'var(--red)':'var(--text-secondary)'};cursor:pointer">No reparable</span>
      </div>
      ${movInfo}
      <div style="background:var(--red-light);border:1px solid #F09595;border-radius:8px;padding:10px 12px;margin-bottom:14px;display:flex;align-items:center;gap:10px">
        <i class="ti ti-lock" style="font-size:18px;color:var(--red)"></i>
        <div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--red)">Clave de desbloqueo</div></div>
        <div style="font-family:monospace;font-size:14px;font-weight:600;background:#fff;padding:4px 10px;border-radius:6px;color:var(--red)">${o.clave||'—'}</div>
      </div>
      <div class="card"><div class="card-title"><i class="ti ti-stethoscope"></i> Diagnóstico</div>
        <p style="font-size:12.5px;background:var(--purple-light);padding:10px;border-radius:8px;color:var(--purple)">${o.diagnostico || 'Pendiente de diagnóstico'}</p>
      </div>
      <div class="card"><div class="card-title"><i class="ti ti-tool"></i> Repuestos utilizados</div>
        ${o.repuestos.length ? o.repuestos.map(r => `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span>${r.nombre} ${r.fromStock?'<span style="color:var(--text-secondary);font-size:10px">(de stock)</span>':'<span style="color:var(--text-secondary);font-size:10px">(compra externa)</span>'}</span><b>USD ${r.costo}</b></div>`).join('') : '<p style="font-size:12px;color:var(--text-secondary)">Sin repuestos cargados</p>'}
        <button class="btn btn-sm" style="margin-top:8px" onclick="Reparaciones.addRepuesto()"><i class="ti ti-plus"></i> Agregar repuesto</button>
      </div>
      <div class="card"><div class="card-title"><i class="ti ti-credit-card"></i> Pagos / señas</div>
        ${o.pagos.length ? o.pagos.map(p => `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">${p.caja}<b>${State.fmtARS(p.monto)}</b></div>`).join('') : '<p style="font-size:12px;color:var(--text-secondary)">Sin pagos registrados</p>'}
        <button class="btn btn-sm" style="margin-top:8px" onclick="Reparaciones.addPago()"><i class="ti ti-plus"></i> Registrar seña</button>
      </div>
      <div class="card"><div class="card-title"><i class="ti ti-currency-dollar"></i> Costos y precio</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div><label style="font-size:11px;color:var(--text-secondary)">Mano de obra</label><input type="number" id="rep-f-mo" value="${o.costoMO}" style="width:100%;font-size:12px;padding:6px 9px;border:1px solid var(--border-strong);border-radius:8px"></div>
          <div><label style="font-size:11px;color:var(--text-secondary)">Precio cobrado</label><input type="number" id="rep-f-precio" value="${o.precioFinal}" style="width:100%;font-size:12px;padding:6px 9px;border:1px solid var(--border-strong);border-radius:8px"></div>
        </div>
        <div style="background:var(--blue-light);border-radius:8px;padding:10px;display:flex;justify-content:space-around;text-align:center">
          <div><label style="font-size:10px;color:var(--blue-dark)">Costo</label><div style="font-weight:600;color:var(--blue-dark)">${State.fmtARS(totalCosto)}</div></div>
          <div><label style="font-size:10px;color:var(--blue-dark)">Precio</label><div style="font-weight:600;color:var(--blue-dark)">${State.fmtARS(o.precioFinal)}</div></div>
          <div><label style="font-size:10px;color:var(--blue-dark)">Margen</label><div style="font-weight:600;color:${margen>=0?'var(--green-dark)':'var(--red)'}">${margen>=0?'+':''}${State.fmtARS(margen)}</div></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
        ${isTerminal && tieneMov ? `<button class="btn btn-red" onclick="Reparaciones.cancelarConReversion()"><i class="ti ti-arrow-back-up"></i> Cancelar orden (revertir)</button>` : ''}
        ${o.estado === 'listo' ? `<button class="btn btn-green" onclick="Reparaciones.entregarYCobrar()"><i class="ti ti-check"></i> Entregar y cobrar</button>` : `<button class="btn btn-primary" onclick="Reparaciones.saveOrder()"><i class="ti ti-check"></i> Guardar cambios</button>`}
      </div>
    `;
  },

  async setEstado(estado) {
    const o = State.reparaciones.find(x => x.id === this.currentId);
    if (!o) return;
    o.estado = estado;
    if (['rechazado', 'no_reparable'].includes(estado) && !this.hasMovimientos(o)) {
      o.equipoDevuelto = true; o.custodio = '';
      toast('Equipo marcado como devuelto al cliente automáticamente (sin movimientos que revertir).');
    }
    await DB.actualizarReparacion(o);
    Sheets.reparacion(o);
    this.renderList(); this.renderDetail();
  },

  async addRepuesto() {
    const fromStockChoice = confirm('¿Es un repuesto que sale de tu stock? Aceptar = sí, de stock. Cancelar = compra externa.');
    const nombre = prompt('Nombre del repuesto:');
    if (!nombre) return;
    const costo = parseFloat(prompt('Costo en USD:', '0')) || 0;
    const o = State.reparaciones.find(x => x.id === this.currentId);
    const repuesto = { nombre, costo, fromStock: fromStockChoice };
    o.repuestos.push(repuesto);
    await DB.agregarRepuestoReparacion(o.id, repuesto);
    this.renderList(); this.renderDetail();
  },

  async addPago() {
    const monto = parseFloat(prompt('Monto de la seña (ARS):', '0')) || 0;
    if (!monto) return;
    const persona = prompt('¿Qué persona recibe el pago?', 'Valen') || 'Valen';
    const o = State.reparaciones.find(x => x.id === this.currentId);
    const pago = { caja: `${persona}-ARS cash`, monto, persona, bolsillo: 'ARS cash' };
    o.pagos.push(pago);
    State.acreditarCaja(persona, 'ARS cash', monto);
    await DB.agregarPagoReparacion(o.id, pago);
    this.renderList(); this.renderDetail();
    toast(`Seña de ${State.fmtARS(monto)} acreditada en la caja de ${persona}.`);
  },

  async cancelarConReversion() {
    const o = State.reparaciones.find(x => x.id === this.currentId);
    if (!confirm('¿Cancelar esta orden? Se revertirán los pagos en sus cajas y los repuestos de stock volverán al inventario.')) return;

    toast('Revirtiendo movimientos...');
    // Revertir pagos
    o.pagos.forEach(p => State.debitarCaja(p.persona, p.bolsillo, p.monto));
    // Revertir repuestos que salieron de stock (sumarlos de nuevo al inventario)
    for (const r of o.repuestos.filter(r => r.fromStock && r.stockId)) {
      const item = State.stock.find(s => s.id === r.stockId);
      if (item) {
        if (item.imeis) { /* repuestos no manejan IMEI individual en esta maqueta */ }
        else { item.cantidad = (item.cantidad || 0) + 1; await DB.actualizarCantidadStock(r.stockId, item.cantidad); }
      }
    }
    await DB.limpiarMovimientosReparacion(o.id);
    o.pagos = [];
    o.repuestos = o.repuestos.filter(r => !r.fromStock);
    o.equipoDevuelto = true; o.custodio = '';
    await DB.actualizarReparacion(o);
    this.renderList(); this.renderDetail();
    toast('Orden cancelada. Pagos revertidos a sus cajas de origen y repuestos de stock restaurados.');
  },

  async entregarYCobrar() {
    const o = State.reparaciones.find(x => x.id === this.currentId);
    const persona = o.custodio || prompt('¿En qué caja se acredita el cobro?', 'Valen') || 'Valen';
    State.acreditarCaja(persona, 'ARS cash', o.precioFinal);
    o.estado = 'entregado';
    await DB.actualizarReparacion(o);
    this.renderList(); this.renderDetail();
    toast(`Equipo entregado. ${State.fmtARS(o.precioFinal)} acreditado en la caja de ${persona}.`);
  },

  async saveOrder() {
    const o = State.reparaciones.find(x => x.id === this.currentId);
    o.costoMO = parseFloat(document.getElementById('rep-f-mo').value) || 0;
    o.precioFinal = parseFloat(document.getElementById('rep-f-precio').value) || 0;
    await DB.actualizarReparacion(o);
    Sheets.reparacion(o);
    this.renderDetail();
    toast('Cambios guardados.');
  },

  async newOrder() {
    const id = 'R0' + (20 + State.reparaciones.length);
    const o = { id, cliente: 'Nuevo cliente', tel: '', equipo: 'Sin especificar', falla: '', clave: '', estado: 'ingresado', fechaIngreso: 'Hoy', diagnostico: '', presupuestoAprobado: false, repuestos: [], pagos: [], costoMO: 0, precioFinal: 0, tecnico: 'Técnico ext.', custodio: '', notas: '', equipoDevuelto: false };
    await DB.crearReparacion(o);
    Sheets.reparacion(o);
    State.reparaciones.unshift(o);
    this.currentId = id;
    this.renderList(); this.renderDetail();
    this.syncMobileView(true);
  }
};

</script>
<script>
const Gastos = {
  activeCat: 'all',

  render() {
    const c = document.createElement('div');
    c.innerHTML = `
      <div class="kpi-row" style="grid-template-columns:repeat(4,1fr)">
        <div class="kpi"><label>Gastos ARS</label><div class="val" id="g-kpi-ars">—</div></div>
        <div class="kpi"><label>Gastos USD</label><div class="val" id="g-kpi-usd">—</div></div>
        <div class="kpi"><label>Pendientes</label><div class="val" id="g-kpi-pend">—</div></div>
        <div class="kpi"><label>Categoría top</label><div class="val" id="g-kpi-cat" style="font-size:13px">—</div></div>
      </div>
      <div style="padding:10px 22px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <div id="gastos-chips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        <button class="btn btn-sm" style="margin-left:auto" onclick="Gastos.manageCats()"><i class="ti ti-settings"></i> Categorías</button>
        <button class="btn btn-primary btn-sm" onclick="Gastos.openNew()"><i class="ti ti-plus"></i> Registrar gasto</button>
      </div>
      <div class="body-pad">
        <table><thead><tr><th>Fecha</th><th>Motivo</th><th>Categoría</th><th>Responsable</th><th>Caja</th><th>Monto</th><th>Estado</th></tr></thead>
        <tbody id="gastos-tbody"></tbody></table>
      </div>
      <div id="gastos-modal-host"></div>
    `;
    setTimeout(() => { this.renderChips(); this.renderKpis(); this.renderTable(); }, 0);
    return c;
  },

  catObj(id) { return State.categoriasGasto.find(c => c.id === id) || { nombre: id, color: '#888' }; },

  renderChips() {
    const html = [`<button class="btn btn-sm ${this.activeCat==='all'?'btn-primary':''}" onclick="Gastos.setCat('all')">Todos</button>`]
      .concat(State.categoriasGasto.map(c => `<button class="btn btn-sm ${this.activeCat===c.id?'btn-primary':''}" onclick="Gastos.setCat('${c.id}')" style="${this.activeCat!==c.id?`border-color:${c.color}55`:''}">${c.nombre}</button>`));
    document.getElementById('gastos-chips').innerHTML = html.join('');
  },
  setCat(c) { this.activeCat = c; this.renderChips(); this.renderTable(); },

  renderKpis() {
    const ars = State.gastos.filter(g => g.moneda === 'ARS').reduce((a, g) => a + g.monto, 0);
    const usd = State.gastos.filter(g => g.moneda === 'USD').reduce((a, g) => a + g.monto, 0);
    const pend = State.gastos.filter(g => g.estado === 'pendiente').length;
    const counts = {};
    State.gastos.forEach(g => counts[g.cat] = (counts[g.cat]||0)+1);
    const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
    document.getElementById('g-kpi-ars').textContent = State.fmtARS(ars);
    document.getElementById('g-kpi-usd').textContent = State.fmtUSD(usd);
    document.getElementById('g-kpi-pend').textContent = pend;
    document.getElementById('g-kpi-cat').textContent = top ? this.catObj(top[0]).nombre : '—';
  },

  renderTable() {
    const rows = this.activeCat === 'all' ? State.gastos : State.gastos.filter(g => g.cat === this.activeCat);
    document.getElementById('gastos-tbody').innerHTML = rows.map(g => {
      const c = this.catObj(g.cat);
      return `<tr>
        <td>${g.fecha}</td><td>${g.motivo}</td>
        <td><span class="badge" style="background:${c.color}22;color:${c.color}">${c.nombre}</span></td>
        <td>${g.responsable}</td><td style="font-size:11px;color:var(--text-secondary)">${g.caja}</td>
        <td><b>${g.moneda==='USD'?State.fmtUSD(g.monto):State.fmtARS(g.monto)}</b></td>
        <td><span class="badge ${g.estado==='pagado'?'b-green':'b-amber'}">${g.estado==='pagado'?'Pagado':'Pendiente'}</span></td>
      </tr>`;
    }).join('');
  },

  openNew() {
    const host = document.getElementById('gastos-modal-host');
    host.innerHTML = `
      <div style="position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200" onclick="if(event.target===this) Gastos.close()">
        <div style="width:380px;max-width:92vw;background:var(--bg);border-radius:14px;padding:18px" onclick="event.stopPropagation()">
          <h3 style="font-size:15px;font-weight:600;margin-bottom:14px">Registrar gasto</h3>
          <div style="margin-bottom:10px"><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Motivo</label><input type="text" id="gf-motivo" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px">
            <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Categoría</label>
              <select id="gf-cat" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">${State.categoriasGasto.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}</select></div>
            <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Responsable</label>
              <select id="gf-resp" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">${State.personas.map(p=>`<option>${p}</option>`).join('')}</select></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px">
            <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Moneda</label>
              <select id="gf-moneda" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px"><option value="ARS">ARS</option><option value="USD">USD</option></select></div>
            <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Monto</label>
              <input type="number" id="gf-monto" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px"></div>
          </div>
          <div style="margin-bottom:14px"><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Caja que paga</label>
            <select id="gf-caja-persona" style="width:48%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">${State.personas.map(p=>`<option>${p}</option>`).join('')}</select>
            <select id="gf-caja-bolsillo" style="width:48%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px;margin-left:4%"><option>ARS cash</option><option>ARS transferencia</option><option>USD cash</option><option>USD transferencia</option></select>
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn" onclick="Gastos.close()">Cancelar</button>
            <button class="btn btn-primary" onclick="Gastos.save()"><i class="ti ti-check"></i> Guardar</button>
          </div>
        </div>
      </div>
    `;
  },
  close() { document.getElementById('gastos-modal-host').innerHTML = ''; },

  async save() {
    const motivo = document.getElementById('gf-motivo').value.trim();
    const monto = parseFloat(document.getElementById('gf-monto').value) || 0;
    if (!motivo || !monto) { toast('Completá motivo y monto.'); return; }
    const persona = document.getElementById('gf-caja-persona').value;
    const bolsillo = document.getElementById('gf-caja-bolsillo').value;
    const moneda = document.getElementById('gf-moneda').value;
    const cat = document.getElementById('gf-cat').value;
    const responsable = document.getElementById('gf-resp').value;

    toast('Guardando gasto...');
    const newId = await DB.crearGasto({ motivo, cat, responsable, persona, bolsillo, moneda, monto, estado: 'pagado' });

    State.gastos.unshift({
      id: newId || Date.now(), fecha: 'Hoy', motivo, cat,
      responsable, caja: `${persona}-${bolsillo}`,
      moneda, monto, estado: 'pagado'
    });
    State.debitarCaja(persona, bolsillo, monto);
    Sheets.gasto({ fecha: 'Hoy', motivo, responsable, caja: `${persona}-${bolsillo}`, moneda, monto, estado: 'pagado' }, this.catObj(cat).nombre);
    this.close(); this.renderChips(); this.renderKpis(); this.renderTable();
    toast('Gasto registrado y debitado de la caja correspondiente.');
  },

  manageCats() {
    const host = document.getElementById('gastos-modal-host');
    host.innerHTML = `
      <div style="position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200" onclick="if(event.target===this) Gastos.close()">
        <div style="width:340px;max-width:92vw;background:var(--bg);border-radius:14px;padding:18px" onclick="event.stopPropagation()">
          <h3 style="font-size:15px;font-weight:600;margin-bottom:14px">Editar categorías</h3>
          <div id="cat-manage-list"></div>
          <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" onclick="Gastos.addCat()"><i class="ti ti-plus"></i> Nueva categoría</button>
          <div style="text-align:right;margin-top:14px"><button class="btn" onclick="Gastos.close();Gastos.renderChips();Gastos.renderTable()">Listo</button></div>
        </div>
      </div>
    `;
    this.renderCatList();
  },
  renderCatList() {
    document.getElementById('cat-manage-list').innerHTML = State.categoriasGasto.map((c, i) => `
      <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
        <input type="color" value="${c.color}" onchange="Gastos.updateCatColor(${i}, this.value)">
        <input type="text" value="${c.nombre}" onchange="Gastos.updateCatNombre(${i}, this.value)" style="flex:1;font-size:12px;padding:5px 8px;border:1px solid var(--border-strong);border-radius:8px">
        <button onclick="Gastos.delCat(${i})" style="background:none;border:none;cursor:pointer;color:var(--red)"><i class="ti ti-trash"></i></button>
      </div>`).join('');
  },
  async updateCatColor(i, color) {
    State.categoriasGasto[i].color = color;
    await DB.editarCategoriaGasto(State.categoriasGasto[i].id, { color });
  },
  async updateCatNombre(i, nombre) {
    State.categoriasGasto[i].nombre = nombre;
    await DB.editarCategoriaGasto(State.categoriasGasto[i].id, { nombre });
  },
  async addCat() {
    const nombre = prompt('Nombre de la categoría:');
    if (!nombre) return;
    const nueva = await DB.agregarCategoriaGasto(nombre, '#185FA5');
    State.categoriasGasto.push({ id: nueva?.id || ('cat-' + Date.now()), nombre, color: '#185FA5' });
    this.renderCatList();
  },
  async delCat(i) {
    if (!confirm('¿Eliminar esta categoría?')) return;
    await DB.borrarCategoriaGasto(State.categoriasGasto[i].id);
    State.categoriasGasto.splice(i, 1);
    this.renderCatList();
  }
};

</script>
<script>
const Cueva = {
  opType: 'ars-usd',
  OP_TYPES: [
    { id: 'ars-usd', label: 'ARS → USD', monedaO: 'ARS', monedaD: 'USD' },
    { id: 'usd-usdt', label: 'USD → USDT', monedaO: 'USD', monedaD: 'USDT' },
    { id: 'usdt-ars', label: 'USDT → ARS', monedaO: 'USDT', monedaD: 'ARS' },
    { id: 'usd-ars', label: 'USD → ARS', monedaO: 'USD', monedaD: 'ARS' },
  ],
  BOLSILLOS: { ARS: ['ARS cash', 'ARS transferencia'], USD: ['USD cash', 'USD transferencia'], USDT: ['USDT'] },

  render() {
    const c = document.createElement('div');
    c.innerHTML = `
      <div style="padding:10px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:12px;color:var(--text-secondary)">${State.cambios.length} operaciones registradas</div>
        <button class="btn btn-primary" onclick="Cueva.openNew()"><i class="ti ti-plus"></i> Nueva operación</button>
      </div>
      <div style="background:var(--purple-light);padding:10px 22px;font-size:12px;color:var(--purple);display:flex;gap:16px;align-items:center;flex-wrap:wrap">
        <i class="ti ti-info-circle"></i>
        <div><b id="cueva-resultado-financiero">—</b> resultado financiero del mes (spread de cambios — separado de las ventas)</div>
      </div>
      <div class="body-pad">
        <table><thead><tr><th>Fecha</th><th>Operación</th><th>Sale (origen)</th><th>Entra (destino)</th><th>Cotización</th><th>Spread</th></tr></thead>
        <tbody id="cueva-tbody"></tbody></table>
      </div>
      <div id="cueva-modal-host"></div>
    `;
    setTimeout(() => this.renderTable(), 0);
    return c;
  },

  typeObj(id) { return this.OP_TYPES.find(t => t.id === id); },
  fmtByMoneda(v, m) { return m === 'ARS' ? State.fmtARS(v) : m === 'USDT' ? v.toLocaleString('es-AR') + ' USDT' : State.fmtUSD(v); },

  renderTable() {
    const spreadTotal = State.resultadoFinancieroMes();
    document.getElementById('cueva-resultado-financiero').textContent = (spreadTotal>=0?'+':'') + State.fmtARS(spreadTotal);
    document.getElementById('cueva-tbody').innerHTML = State.cambios.map(o => {
      const t = this.typeObj(o.tipo);
      const spread = State.calcSpreadARS(o);
      return `<tr>
        <td>${o.fecha}</td><td><span class="badge b-purple">${t.label}</span></td>
        <td>${o.origenP} (${o.origenB})<br><b>${this.fmtByMoneda(o.entrega, t.monedaO)}</b></td>
        <td>${o.destinoP} (${o.destinoB})<br><b>${this.fmtByMoneda(o.recibe, t.monedaD)}</b></td>
        <td>$${o.cotiz.toLocaleString('es-AR')}</td>
        <td style="color:${spread>=0?'var(--green-dark)':'var(--red)'};font-weight:600">${spread>=0?'+':''}${State.fmtARS(spread)}</td>
      </tr>`;
    }).join('');
  },

  openNew() {
    const host = document.getElementById('cueva-modal-host');
    host.innerHTML = `
      <div style="position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200" onclick="if(event.target===this) Cueva.close()">
        <div style="width:400px;max-width:92vw;max-height:88vh;overflow-y:auto;background:var(--bg);border-radius:14px;padding:18px" onclick="event.stopPropagation()">
          <h3 style="font-size:15px;font-weight:600;margin-bottom:14px">Nueva operación de cambio</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px" id="cueva-type-grid"></div>

          <div style="background:var(--red-light);border-radius:8px;padding:10px 12px;margin-bottom:8px">
            <b style="font-size:11px;color:var(--red)">Sale de (origen)</b>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px">
              <select id="cf-origen-p" style="font-size:12px;padding:6px 8px;border:1px solid var(--border-strong);border-radius:8px">${State.personas.map(p=>`<option>${p}</option>`).join('')}</select>
              <select id="cf-origen-b" style="font-size:12px;padding:6px 8px;border:1px solid var(--border-strong);border-radius:8px"></select>
            </div>
            <input type="number" id="cf-entrega" placeholder="Monto que sale" oninput="Cueva.calcPreview()" style="width:100%;font-size:12px;padding:7px 9px;border:1px solid var(--border-strong);border-radius:8px;margin-top:6px">
          </div>

          <div style="text-align:center;font-size:11px;color:var(--text-secondary);margin:4px 0">cotización <input type="number" id="cf-cotiz" value="1075" oninput="Cueva.calcPreview()" style="width:65px;text-align:center;border:1px solid var(--border-strong);border-radius:6px;padding:3px"></div>

          <div style="background:var(--green-light);border-radius:8px;padding:10px 12px;margin-bottom:8px">
            <b style="font-size:11px;color:var(--green-dark)">Entra a (destino)</b>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px">
              <select id="cf-destino-p" style="font-size:12px;padding:6px 8px;border:1px solid var(--border-strong);border-radius:8px">${State.personas.map(p=>`<option>${p}</option>`).join('')}</select>
              <select id="cf-destino-b" style="font-size:12px;padding:6px 8px;border:1px solid var(--border-strong);border-radius:8px"></select>
            </div>
            <input type="number" id="cf-recibe" readonly placeholder="Monto que entra (calculado)" style="width:100%;font-size:12px;padding:7px 9px;border:1px solid var(--border-strong);border-radius:8px;margin-top:6px;opacity:.8">
          </div>

          <div id="cueva-preview" style="display:none;background:var(--purple-light);border-radius:8px;padding:10px 12px;margin-bottom:12px">
            <p style="font-size:11px;color:var(--purple)">Spread vs. referencia (va al resultado financiero)</p>
            <div id="cueva-preview-val" style="font-size:16px;font-weight:600"></div>
          </div>

          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn" onclick="Cueva.close()">Cancelar</button>
            <button class="btn btn-primary" onclick="Cueva.save()"><i class="ti ti-check"></i> Guardar</button>
          </div>
        </div>
      </div>
    `;
    this.renderTypeGrid();
  },
  close() { document.getElementById('cueva-modal-host').innerHTML = ''; },

  renderTypeGrid() {
    document.getElementById('cueva-type-grid').innerHTML = this.OP_TYPES.map(t =>
      `<button class="btn btn-sm ${this.opType===t.id?'btn-primary':''}" onclick="Cueva.setType('${t.id}')">${t.label}</button>`
    ).join('');
    this.updateBolsillos();
  },
  updateBolsillos() {
    const t = this.typeObj(this.opType);
    document.getElementById('cf-origen-b').innerHTML = this.BOLSILLOS[t.monedaO].map(b => `<option>${b}</option>`).join('');
    document.getElementById('cf-destino-b').innerHTML = this.BOLSILLOS[t.monedaD].map(b => `<option>${b}</option>`).join('');
    document.getElementById('cf-cotiz').value = t.id === 'usd-usdt' ? State.refUsdt : State.refBlue;
  },
  setType(id) { this.opType = id; this.renderTypeGrid(); this.calcPreview(); },

  calcPreview() {
    const entrega = parseFloat(document.getElementById('cf-entrega').value) || 0;
    const cotiz = parseFloat(document.getElementById('cf-cotiz').value) || 0;
    let recibe = 0;
    if (this.opType === 'ars-usd') recibe = cotiz ? entrega / cotiz : 0;
    if (this.opType === 'usd-ars') recibe = entrega * cotiz;
    if (this.opType === 'usdt-ars') recibe = entrega * cotiz;
    if (this.opType === 'usd-usdt') recibe = entrega;
    document.getElementById('cf-recibe').value = recibe.toFixed(2);
    const spread = State.calcSpreadARS({ tipo: this.opType, entrega, recibe, cotiz });
    const prev = document.getElementById('cueva-preview');
    if (entrega > 0) {
      prev.style.display = 'block';
      document.getElementById('cueva-preview-val').textContent = (spread>=0?'+':'') + State.fmtARS(spread);
      document.getElementById('cueva-preview-val').style.color = spread >= 0 ? 'var(--green-dark)' : 'var(--red)';
    } else prev.style.display = 'none';
  },

  async save() {
    const entrega = parseFloat(document.getElementById('cf-entrega').value) || 0;
    const recibe = parseFloat(document.getElementById('cf-recibe').value) || 0;
    const cotiz = parseFloat(document.getElementById('cf-cotiz').value) || 0;
    if (!entrega || !recibe) { toast('Completá los montos.'); return; }
    const origenP = document.getElementById('cf-origen-p').value, origenB = document.getElementById('cf-origen-b').value;
    const destinoP = document.getElementById('cf-destino-p').value, destinoB = document.getElementById('cf-destino-b').value;

    toast('Guardando operación...');

    // Mover la plata de verdad entre cajas (memoria + base de datos)
    State.debitarCaja(origenP, origenB, entrega);
    State.acreditarCaja(destinoP, destinoB, recibe);

    const nuevoOp = { tipo: this.opType, entrega, recibe, cotiz, origenP, origenB, destinoP, destinoB };
    await DB.crearCambio(nuevoOp);
    Sheets.cambio(nuevoOp);

    State.cambios.unshift({ id: Date.now(), fecha: 'Hoy', ...nuevoOp });
    this.close();
    this.renderTable();
    toast(`Operación guardada. Se debitó de la caja de ${origenP} y se acreditó en la de ${destinoP}. El spread quedó reflejado en el resultado financiero del mes.`);
  }
};

</script>
<script>
const Cajas = {
  render() {
    const c = document.createElement('div');
    c.className = 'body-pad';
    let totalARS = 0, totalUSD = 0, totalUSDT = 0;
    Object.values(State.cajas).forEach(caja => {
      totalARS += (caja['ARS cash']||0) + (caja['ARS transferencia']||0);
      totalUSD += (caja['USD cash']||0) + (caja['USD transferencia']||0);
      totalUSDT += caja['USDT']||0;
    });

    c.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px" class="dash-grid-2">
        ${State.personas.map(p => {
          const caja = State.cajas[p] || {};
          const arsEquiv = (caja['ARS cash']||0) + (caja['ARS transferencia']||0) + ((caja['USD cash']||0)+(caja['USD transferencia']||0))*State.refBlue + (caja['USDT']||0)*State.refUsdt;
          return `<div class="card">
            <div class="card-title"><div class="av">${p.substring(0,2).toUpperCase()}</div> ${p}</div>
            ${['ARS cash','ARS transferencia','USD cash','USD transferencia','USDT'].map(b => `
              <div onclick="Cajas.editarSaldo('${p}','${b}')" style="display:flex;justify-content:space-between;padding:8px 4px;border-bottom:1px solid var(--border);font-size:12.5px;cursor:pointer;border-radius:6px" onmouseover="this.style.background='var(--bg-secondary)'" onmouseout="this.style.background='transparent'">
                <span style="color:var(--text-secondary)">${b}</span><b>${b==='USDT' ? (caja[b]||0).toLocaleString('es-AR')+' USDT' : b.startsWith('ARS') ? State.fmtARS(caja[b]||0) : State.fmtUSD(caja[b]||0)}</b>
              </div>`).join('')}
            <div style="display:flex;justify-content:space-between;padding-top:8px;font-weight:600">Total ARS equiv.<span style="color:var(--blue)">${State.fmtARS(arsEquiv)}</span></div>
          </div>`;
        }).join('')}
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-sum"></i> Consolidado total</div>
        <div style="display:flex;gap:24px;flex-wrap:wrap">
          <div><label style="font-size:11px;color:var(--text-secondary)">ARS total</label><div style="font-size:19px;font-weight:600">${State.fmtARS(totalARS)}</div></div>
          <div><label style="font-size:11px;color:var(--text-secondary)">USD total</label><div style="font-size:19px;font-weight:600">${State.fmtUSD(totalUSD)}</div></div>
          <div><label style="font-size:11px;color:var(--text-secondary)">USDT total</label><div style="font-size:19px;font-weight:600">${totalUSDT.toLocaleString('es-AR')}</div></div>
          <div style="margin-left:auto;text-align:right"><label style="font-size:11px;color:var(--text-secondary)">Equivalente ARS (blue)</label><div style="font-size:19px;font-weight:600;color:var(--blue)">${State.fmtARS(totalARS + totalUSD*State.refBlue + totalUSDT*State.refUsdt)}</div></div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text-secondary);margin-top:10px"><i class="ti ti-info-circle"></i> Tocá cualquier saldo para ajustarlo manualmente. Para administrar personas (renombrar o eliminar), andá a Panel de control → Cajas y personas.</div>
    `;
    return c;
  },

  async editarSaldo(persona, bolsillo) {
    const actual = (State.cajas[persona] && State.cajas[persona][bolsillo]) || 0;
    const nuevoStr = prompt(`Ajustar saldo de ${persona} — ${bolsillo}:`, actual);
    if (nuevoStr === null) return;
    const nuevo = parseFloat(nuevoStr);
    if (isNaN(nuevo)) { alert('Ingresá un número válido.'); return; }
    State.cajas[persona][bolsillo] = nuevo;
    await DB.actualizarSaldoCaja(persona, bolsillo, nuevo);
    Sheets.caja(persona, bolsillo, nuevo);
    App.goTo('cajas');
    toast(`Saldo de ${persona} — ${bolsillo} ajustado a ${nuevo.toLocaleString('es-AR')}.`);
  }
};

</script>
<script>

    c.className = 'body-pad';

        <div class="kpi"><label>Egresos (gastos)</label><div class="val" style="color:var(--red)">${State.fmtARS(gastosEgresos)}</div></div>

        <div class="kpi"><label>Resultado financiero</label><div class="val" style="color:var(--purple)">${resultFinanciero>=0?'+':''}${State.fmtARS(resultFinanciero)}</div></div>

      <div class="card">
        <div class="card-title"><i class="ti ti-list"></i> Movimientos del período</div>
        <table><thead><tr><th>Fecha</th><th>Concepto</th><th>Tipo</th><th>Monto</th></tr></thead>
        <tbody>
          ${State.ventas.map(v => `<tr><td>${v.fecha}</td><td>Venta #${v.id} — ${v.cliente}</td><td><span class="badge b-blue">Venta</span></td><td style="color:var(--green-dark)">+${State.fmtUSD(v.items.reduce((s,i)=>s+i.precio,0))}</td></tr>`).join('')}
          ${State.gastos.map(g => `<tr><td>${g.fecha}</td><td>${g.motivo}</td><td><span class="badge b-amber">Gasto</span></td><td style="color:var(--red)">-${g.moneda==='USD'?State.fmtUSD(g.monto):State.fmtARS(g.monto)}</td></tr>`).join('')}
          ${State.cambios.map(c => `<tr><td>${c.fecha}</td><td>Cambio ${Cueva.typeObj(c.tipo).label}</td><td><span class="badge b-purple">Cambio</span></td><td style="color:${State.calcSpreadARS(c)>=0?'var(--green-dark)':'var(--red)'}">${State.calcSpreadARS(c)>=0?'+':''}${State.fmtARS(State.calcSpreadARS(c))} (spread)</td></tr>`).join('')}
        </tbody></table>
      </div>
    `;
    return c;
  }
};

</script>
<script>
const Panel = {
  activeTab: 'garantias',

  render() {
    const c = document.createElement('div');
    c.className = 'panel-shell';
    c.style.display = 'flex';
    c.style.flex = '1';
    c.style.overflow = 'hidden';
    c.innerHTML = `
      <div class="panel-nav-side" style="width:200px;min-width:200px;border-right:1px solid var(--border);background:var(--bg-secondary);padding:8px 0" id="panel-nav"></div>
      <div style="flex:1;overflow-y:auto;padding:18px 22px;min-width:0" id="panel-body"></div>
    `;
    setTimeout(() => { this.renderNav(); this.renderBody(); }, 0);
    return c;
  },

  renderNav() {
    const items = [
      ['garantias', 'ti ti-shield', 'Garantías'],
      ['personas', 'ti ti-users', 'Cajas y personas'],
      ['usuarios', 'ti ti-lock', 'Usuarios y accesos'],
      ['negocio', 'ti ti-building-store', 'Datos del negocio'],
    ];
    document.getElementById('panel-nav').innerHTML = items.map(([k, ic, l]) =>
      `<div class="panel-nav-item" onclick="Panel.setTab('${k}')" style="display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;font-size:12.5px;white-space:nowrap;color:${this.activeTab===k?'var(--blue)':'var(--text-secondary)'};border-left:2px solid ${this.activeTab===k?'var(--blue)':'transparent'};background:${this.activeTab===k?'var(--bg)':'transparent'};font-weight:${this.activeTab===k?'600':'400'}"><i class="${ic}"></i> ${l}</div>`
    ).join('');
  },
  setTab(t) { this.activeTab = t; this.renderNav(); this.renderBody(); },

  renderBody() {
    const body = document.getElementById('panel-body');
    if (this.activeTab === 'garantias') body.innerHTML = this.garantiasView();
    else if (this.activeTab === 'personas') body.innerHTML = this.personasView();
    else if (this.activeTab === 'usuarios') { body.innerHTML = this.usuariosView(); this.cargarUsuarios(); }
    else body.innerHTML = this.negocioView();
  },

  garantiasView() {
    return `
      <h3 style="font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px">Categorías de garantía</h3>
      <div id="garantias-list">${State.garantias.map(g => `
        <div style="display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px">
          <span style="width:12px;height:12px;border-radius:50%;background:${g.color}"></span>
          <div style="flex:1"><b style="font-size:13px">${g.nombre}</b></div>
          <div style="font-size:18px;font-weight:600;color:var(--blue)">${g.dias}<span style="font-size:10px;color:var(--text-secondary);display:block;font-weight:400">días</span></div>
          <button class="btn btn-sm" onclick="Panel.editGarantia(${g.id})"><i class="ti ti-edit"></i></button>
          <button class="btn btn-sm" onclick="Panel.delGarantia(${g.id})" style="color:var(--red)"><i class="ti ti-trash"></i></button>
        </div>`).join('')}</div>
      <button class="btn btn-primary" onclick="Panel.addGarantia()"><i class="ti ti-plus"></i> Nueva categoría</button>
    `;
  },
  async addGarantia() {
    const nombre = prompt('Nombre de la categoría:'); if (!nombre) return;
    const dias = parseInt(prompt('Días de garantía:', '30')); if (!dias) return;
    const nueva = await DB.agregarGarantia(nombre, dias, '#185FA5');
    State.garantias.push({ id: nueva?.id || Date.now(), nombre, dias, color: '#185FA5' });
    this.renderBody();
  },
  async editGarantia(id) {
    const g = State.garantias.find(x => x.id === id);
    const dias = parseInt(prompt(`Días de garantía para "${g.nombre}":`, g.dias));
    if (dias) { g.dias = dias; await DB.editarGarantia(id, dias); this.renderBody(); }
  },
  async delGarantia(id) {
    if (!confirm('¿Eliminar esta categoría?')) return;
    await DB.borrarGarantia(id);
    State.garantias = State.garantias.filter(x => x.id !== id);
    this.renderBody();
  },

  personasView() {
    return `
      <h3 style="font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px">Personas y sus cajas</h3>
      ${State.personas.map(p => {
        const saldoTotal = this.saldoTotalPersona(p);
        return `
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
            <div>
              <b style="font-size:13px">${p}</b>
              <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">Equivalente en caja: ${State.fmtARS(saldoTotal)}</div>
            </div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-sm" onclick="Panel.renombrarPersona('${p}')"><i class="ti ti-edit"></i> Renombrar</button>
              <button class="btn btn-sm" style="color:var(--red)" onclick="Panel.eliminarPersona('${p}')"><i class="ti ti-trash"></i> Eliminar</button>
            </div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px">
            ${Object.entries(State.cajas[p] || {}).map(([b, saldo]) => `
              <span class="badge b-blue" style="cursor:pointer" onclick="Panel.editarSaldoCaja('${p}','${b}')" title="Tocar para editar el saldo">${b}: ${b==='USDT' ? saldo.toLocaleString('es-AR') : (b.startsWith('ARS')?State.fmtARS(saldo):State.fmtUSD(saldo))}</span>
            `).join('')}
          </div>
        </div>`;
      }).join('')}
      <button class="btn btn-primary" onclick="Panel.addPersona()"><i class="ti ti-plus"></i> Agregar persona</button>
    `;
  },

  saldoTotalPersona(p) {
    const c = State.cajas[p] || {};
    return (c['ARS cash']||0) + (c['ARS transferencia']||0) + ((c['USD cash']||0)+(c['USD transferencia']||0))*State.refBlue + (c['USDT']||0)*State.refUsdt;
  },

  async renombrarPersona(nombreViejo) {
    const nombreNuevo = prompt(`Nuevo nombre para "${nombreViejo}":`, nombreViejo);
    if (!nombreNuevo || nombreNuevo.trim() === '' || nombreNuevo === nombreViejo) return;
    if (State.personas.includes(nombreNuevo)) { alert('Ya existe una persona con ese nombre.'); return; }

    const { error } = await DB.renombrarPersona(nombreViejo, nombreNuevo);
    if (error) { alert('Hubo un problema renombrando. Probá de nuevo.'); console.error(error); return; }

    // Actualizar en memoria: lista de personas y el objeto de cajas
    State.personas = State.personas.map(p => p === nombreViejo ? nombreNuevo : p);
    State.cajas[nombreNuevo] = State.cajas[nombreViejo];
    delete State.cajas[nombreViejo];

    this.renderBody();
    toast(`"${nombreViejo}" ahora se llama "${nombreNuevo}". Las cajas y el historial quedaron asociados al nuevo nombre.`);
  },

  async eliminarPersona(nombre) {
    const saldo = this.saldoTotalPersona(nombre);
    if (saldo !== 0) {
      alert(`No se puede eliminar a "${nombre}" porque todavía tiene saldo en sus cajas (equivalente a ${State.fmtARS(saldo)}). Mové ese saldo a otra persona antes de eliminarla, usando el módulo de Cueva / cambio o ajustando el saldo manualmente.`);
      return;
    }
    if (!confirm(`¿Eliminar a "${nombre}"? Sus cajas (en $0) se van a borrar. Las ventas, reparaciones y gastos donde haya participado se conservan en el historial, solo se desvincula su nombre de la persona.`)) return;

    const { error } = await DB.borrarPersona(nombre);
    if (error) { alert('Hubo un problema eliminando. Probá de nuevo.'); console.error(error); return; }

    State.personas = State.personas.filter(p => p !== nombre);
    delete State.cajas[nombre];
    this.renderBody();
  },

  async editarSaldoCaja(persona, bolsillo) {
    const actual = (State.cajas[persona] && State.cajas[persona][bolsillo]) || 0;
    const nuevoStr = prompt(`Ajustar saldo de ${persona} — ${bolsillo}:`, actual);
    if (nuevoStr === null) return;
    const nuevo = parseFloat(nuevoStr);
    if (isNaN(nuevo)) { alert('Ingresá un número válido.'); return; }
    State.cajas[persona][bolsillo] = nuevo;
    await DB.actualizarSaldoCaja(persona, bolsillo, nuevo);
    Sheets.caja(persona, bolsillo, nuevo);
    this.renderBody();
    toast(`Saldo de ${persona} — ${bolsillo} ajustado a ${nuevo.toLocaleString('es-AR')}.`);
  },
  async addPersona() {
    const nombre = prompt('Nombre de la nueva persona:'); if (!nombre) return;
    await DB.agregarPersona(nombre);
    State.personas.push(nombre);
    State.cajas[nombre] = { 'ARS cash': 0, 'ARS transferencia': 0, 'USD cash': 0, 'USD transferencia': 0, 'USDT': 0 };
    this.renderBody();
  },

  negocioView() {
    return `
      <h3 style="font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px">Datos del negocio</h3>
      <div class="card">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600">Nombre</label><input type="text" value="iPhoneMood" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px;margin-top:4px"></div>
          <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600">Email</label><input type="text" value="iphonemood.ar@gmail.com" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px;margin-top:4px"></div>
        </div>
        <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600">Dirección</label><input type="text" value="Julio Argentino Roca 700, Granadero Baigorria, Santa Fe" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px;margin-top:4px"></div>
      </div>
    `;
  },

  usuariosView() {
    return `
      <h3 style="font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px">Usuarios y accesos</h3>
      <div style="background:var(--blue-light);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:11.5px;color:var(--blue-dark)">
        <i class="ti ti-info-circle"></i> Solo las cuentas de Gmail listadas acá pueden iniciar sesión en la app. Si alguien intenta entrar con un email que no está en esta lista, va a ver un mensaje de acceso denegado.
      </div>
      <div id="usuarios-list" style="margin-bottom:14px"><div class="empty-state"><i class="ti ti-loader-2"></i>Cargando usuarios...</div></div>
      <div class="card">
        <div class="card-title" style="margin-bottom:10px"><i class="ti ti-user-plus"></i> Agregar acceso</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600">Email de Gmail</label><input type="email" id="new-user-email" placeholder="persona@gmail.com" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px;margin-top:4px"></div>
          <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600">Nombre (opcional)</label><input type="text" id="new-user-nombre" placeholder="ej: Valen" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px;margin-top:4px"></div>
        </div>
        <button class="btn btn-primary" onclick="Panel.agregarUsuario()"><i class="ti ti-plus"></i> Dar acceso</button>
      </div>
    `;
  },

  async cargarUsuarios() {
    const usuarios = await Auth.listarUsuariosAutorizados();
    const host = document.getElementById('usuarios-list');
    if (!host) return;
    if (!usuarios.length) { host.innerHTML = `<div class="empty-state"><i class="ti ti-user-off"></i>Todavía no hay usuarios autorizados cargados</div>`; return; }
    host.innerHTML = usuarios.map(u => `
      <div style="display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px">
        <div class="av">${(u.nombre || u.email).substring(0,2).toUpperCase()}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12.5px;font-weight:600">${u.nombre || '(sin nombre)'}</div>
          <div style="font-size:11px;color:var(--text-secondary);word-break:break-all">${u.email}</div>
        </div>
        <span class="badge ${u.activo ? 'b-green' : 'b-gray'}" style="cursor:pointer" onclick="Panel.toggleUsuario('${u.id}', ${!u.activo})">${u.activo ? 'Activo' : 'Inactivo'}</span>
        <button class="btn btn-sm" style="color:var(--red)" onclick="Panel.quitarUsuario('${u.id}','${u.email}')"><i class="ti ti-trash"></i></button>
      </div>
    `).join('');
  },

  async agregarUsuario() {
    const emailInput = document.getElementById('new-user-email');
    const nombreInput = document.getElementById('new-user-nombre');
    const email = emailInput.value.trim().toLowerCase();
    const nombre = nombreInput.value.trim();
    if (!email || !email.includes('@')) { alert('Ingresá un email válido.'); return; }

    const { error } = await Auth.agregarUsuarioAutorizado(email, nombre);
    if (error) {
      if (error.code === '23505') alert('Ese email ya tiene acceso autorizado.');
      else { alert('Hubo un problema agregando el usuario.'); console.error(error); }
      return;
    }
    emailInput.value = '';
    nombreInput.value = '';
    this.cargarUsuarios();
    toast(`${email} ya puede iniciar sesión en la app con su cuenta de Google.`);
  },

  async toggleUsuario(id, nuevoEstado) {
    await Auth.toggleUsuarioActivo(id, nuevoEstado);
    this.cargarUsuarios();
  },

  async quitarUsuario(id, email) {
    if (!confirm(`¿Quitar el acceso de ${email}? Esa persona ya no va a poder iniciar sesión.`)) return;
    await Auth.quitarUsuarioAutorizado(id);
    this.cargarUsuarios();
  }
};

</script>
<script>
const App = {
  PAGES: {
    dashboard: { title: 'Panel general', module: Dashboard },
    ventas: { title: 'Ventas', module: Ventas },
    stock: { title: 'Stock', module: Stock },
    reparaciones: { title: 'Reparaciones', module: Reparaciones },
    gastos: { title: 'Gastos', module: Gastos },
    cueva: { title: 'Cueva / cambio de divisas', module: Cueva },
    cajas: { title: 'Cajas', module: Cajas },
    cashflow: { title: 'Cash flow', module: CashFlow },
    panel: { title: 'Panel de control', module: Panel },
  },

  async init() {
    const session = await Auth.obtenerSesionActual();
    if (!session) {
      this.mostrarLogin();
      return;
    }
    await this.validarYArrancar(session);

    // Si el login redirige y vuelve a esta misma página, Supabase dispara este evento
    Auth.escucharCambiosDeSesion(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        await this.validarYArrancar(session);
      }
      if (event === 'SIGNED_OUT') {
        window.location.reload();
      }
    });
  },

  mostrarLogin(mensaje) {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-shell').style.display = 'none';
    if (mensaje) document.getElementById('login-status').textContent = mensaje;
  },

  async validarYArrancar(session) {
    const email = session.user.email;
    const statusEl = document.getElementById('login-status');
    if (statusEl) statusEl.textContent = 'Verificando acceso...';

    const autorizado = await Auth.emailEstaAutorizado(email);
    if (!autorizado) {
      this.mostrarLogin(`El usuario ${email} no tiene acceso autorizado a iPhoneMood. Pedile al administrador que lo agregue desde el Panel de control.`);
      document.getElementById('login-google-btn').innerHTML = `<i class="ti ti-logout"></i> Probar con otra cuenta`;
      document.getElementById('login-google-btn').onclick = () => Auth.cerrarSesion();
      return;
    }

    Auth.usuario = {
      email,
      nombre: autorizado.nombre || session.user.user_metadata?.full_name || email.split('@')[0],
      avatarUrl: session.user.user_metadata?.avatar_url || ''
    };

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-shell').style.display = 'flex';
    document.getElementById('user-avatar').textContent = Auth.usuario.nombre.substring(0, 2).toUpperCase();
    document.getElementById('user-name').textContent = Auth.usuario.nombre;
    document.getElementById('user-email-full').textContent = Auth.usuario.email;

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => this.goTo(item.dataset.page));
    });

    const container = document.getElementById('pages');
    container.innerHTML = `<div class="empty-state" style="margin:auto"><i class="ti ti-loader-2" style="font-size:32px"></i><div style="margin-top:8px">Cargando datos desde la base...</div></div>`;
    container.style.display = 'flex';
    container.style.alignItems = 'center';
    container.style.justifyContent = 'center';
    container.style.flex = '1';

    try {
      await DB.cargarTodo();
    } catch (err) {
      console.error('Error cargando datos de Supabase', err);
      container.innerHTML = `<div class="empty-state" style="margin:auto"><i class="ti ti-alert-triangle"></i>No se pudo conectar con la base de datos. Revisá tu conexión a internet y recargá la página.</div>`;
      return;
    }

    document.getElementById('topbar-blue').textContent = State.refBlue;
    document.getElementById('topbar-usdt').textContent = State.refUsdt;
    this.goTo('dashboard');
  },

  toggleUserMenu() {
    const dd = document.getElementById('user-menu-dropdown');
    dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
  },

  toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('show');
  },
  closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('show');
  },

  goTo(pageKey) {
    const page = this.PAGES[pageKey];
    if (!page) return;
    document.getElementById('page-title').textContent = page.title;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === pageKey));
    const container = document.getElementById('pages');
    container.innerHTML = '';
    container.className = '';
    const pageEl = document.createElement('div');
    pageEl.style.flex = '1';
    pageEl.style.display = 'flex';
    pageEl.style.flexDirection = 'column';
    pageEl.style.overflow = 'hidden';
    pageEl.appendChild(page.module.render());
    container.appendChild(pageEl);
    container.style.display = 'flex';
    container.style.flex = '1';
    container.style.flexDirection = 'column';
    container.style.overflow = 'hidden';
    this.closeSidebar();
    document.getElementById('user-menu-dropdown').style.display = 'none';
  }
};

document.addEventListener('click', (e) => {
  const menu = document.getElementById('user-menu');
  const dd = document.getElementById('user-menu-dropdown');
  if (menu && dd && !menu.contains(e.target)) dd.style.display = 'none';
});

document.addEventListener('DOMContentLoaded', () => App.init());

</script>
</body>
</html>
