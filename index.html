  toggleTarjetaWrap() {
    const bolsillo = document.getElementById('vf-pago-bolsillo')?.value || '';
    const wrap = document.getElementById('vf-tarjeta-check-wrap');
    if (!wrap) return;
    const esTransferencia = bolsillo.includes('transferencia');
    wrap.style.display = esTransferencia ? 'flex' : 'none';
    if (!esTransferencia) {
      const chk = document.getElementById('vf-es-tarjeta');
      if (chk) chk.checked = false;
      this.toggleDiferencialWrap();
    }
  },
  toggleDiferencialWrap() {
    const chk = document.getElementById('vf-es-tarjeta');
    const wrap = document.getElementById('vf-diferencial-wrap');
    if (wrap) wrap.style.display = chk?.checked ? 'block' : 'none';
    if (chk?.checked) this.actualizarDiferencialPreview();
  },
  // Calcula: Neto ARS = Monto posnet − (Monto posnet × coeficiente) → Precio venta real USD = Neto ARS / Cotización
  calcularVentaTarjeta() {
    const total = Math.max(0, this.draft.items.reduce((s, i) => s + i.precio, 0) - (this.draft.tradeIn?.valor || 0));
    const montoPosnet = parseFloat(document.getElementById('vf-monto-posnet')?.value) || 0;
    const coef = parseFloat(document.getElementById('vf-coef-comision')?.value) || 0;
    const cotiz = parseFloat(document.getElementById('vf-cotiz-tarjeta')?.value) || State.refBlue;
    const netoArs = montoPosnet - (montoPosnet * coef);
    const precioVentaRealUSD = cotiz ? netoArs / cotiz : 0;
    const diferencialUSD = precioVentaRealUSD - total;
    return { total, montoPosnet, coef, cotiz, netoArs, precioVentaRealUSD, diferencialUSD };
  },
  actualizarDiferencialPreview() {
    const { total, montoPosnet, netoArs, precioVentaRealUSD, diferencialUSD } = this.calcularVentaTarjeta();
    const preview = document.getElementById('vf-diferencial-preview');
    if (!preview) return;
    if (!montoPosnet) {
      preview.innerHTML = `<span style="font-size:10.5px;color:var(--purple)">Completá el monto del posnet para calcular el precio de venta real.</span>`;
      return;
    }
    const filas = `
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--purple);padding:2px 0"><span>Neto después de comisión</span><b>$${netoArs.toLocaleString('es-AR', {maximumFractionDigits:0})}</b></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--purple);padding:2px 0"><span>Precio de venta real</span><b>${State.fmtUSD(precioVentaRealUSD)}</b></div>
    `;
    if (diferencialUSD > 0.005) {
      preview.innerHTML = filas + `<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--green-dark);font-weight:600;padding-top:4px">Diferencial ganado<span>+${State.fmtUSD(diferencialUSD)}</span></div>`;
    } else if (diferencialUSD < -0.005) {
      preview.innerHTML = filas + `<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--red);font-weight:600;padding-top:4px"><span><i class="ti ti-alert-triangle"></i> Falta cubrir</span><span>${State.fmtUSD(diferencialUSD)}</span></div>`;
    } else {
      preview.innerHTML = filas + `<div style="font-size:11px;color:var(--purple);padding-top:4px">Cubre exacto el precio de lista, sin diferencial.</div>`;
    }
  },
  addPago() {
    const persona = document.getElementById('vf-pago-persona').value;
    const bolsillo = document.getElementById('vf-pago-bolsillo').value;
    const esTarjeta = document.getElementById('vf-es-tarjeta')?.checked || false;
    let monto = parseFloat(document.getElementById('vf-pago-monto').value) || 0;
    let diferencialArs = 0;
    let cotizacionDiferencial = null;

    if (esTarjeta) {
      const { montoPosnet, netoArs, precioVentaRealUSD, diferencialUSD, cotiz } = this.calcularVentaTarjeta();
      if (!montoPosnet) { toast('Ingresá el monto cargado en el posnet.'); return; }
      monto = precioVentaRealUSD; // lo que efectivamente cubre del precio de la venta
      diferencialArs = diferencialUSD > 0 ? diferencialUSD * cotiz : 0;
      cotizacionDiferencial = cotiz;
    }

    if (!monto) { toast('Ingresá un monto.'); return; }
    this.draft.pagos.push({ persona, bolsillo, monto, esTarjeta, diferencialArs, cotizacionDiferencial });
    document.getElementById('venta-step-body').innerHTML = this.stepPagos();
    this.guardarBorrador();
  },
  removePago(idx) { this.draft.pagos.splice(idx, 1); document.getElementById('venta-step-body').innerHTML = this.stepPagos(); this.guardarBorrador(); },

    const saldo = Math.max(0, total - pagado);
    const pagosTarjeta = d.pagos.filter(p => p.esTarjeta);

    return `

        ${d.items.map(i=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0">${i.nombre}<span>${State.fmtUSD(i.precio)}</span></div>`).join('')}
      </div>
      <div style="margin-bottom:14px"><b>Pagos (${d.pagos.length})</b>
        ${d.pagos.map(p=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0">${p.persona} — ${p.bolsillo}${p.esTarjeta?' <span class="badge b-purple" style="font-size:9px">Tarjeta</span>':''}<span>${State.fmtUSD(p.monto)}</span></div>`).join('')}
      </div>
      ${pagosTarjeta.length ? `
      <div style="background:var(--purple-light);border-radius:8px;padding:10px 12px;margin-bottom:14px">
        <div style="font-size:11px;color:var(--purple);font-weight:600;margin-bottom:6px"><i class="ti ti-credit-card"></i> Detalle del cálculo de tarjeta</div>
        ${pagosTarjeta.map(p => {
          const cotiz = p.cotizacionDiferencial || State.refBlue;
          const precioVentaRealUSD = p.monto;
          return `
            <div style="font-size:11px;color:var(--purple);padding:2px 0;display:flex;justify-content:space-between"><span>Cotización usada</span><b>$${cotiz.toLocaleString('es-AR')}</b></div>
            <div style="font-size:11px;color:var(--purple);padding:2px 0;display:flex;justify-content:space-between"><span>Precio de venta real</span><b>${State.fmtUSD(precioVentaRealUSD)}</b></div>
            <div style="font-size:12px;color:var(--green-dark);font-weight:600;padding-top:4px;display:flex;justify-content:space-between"><span>Diferencial ganado</span><span>+$${(p.diferencialArs||0).toLocaleString('es-AR')} (${State.fmtUSD((p.diferencialArs||0)/cotiz)})</span></div>
          `;
        }).join('<div style="height:1px;background:#fff;margin:6px 0"></div>')}
      </div>` : ''}
      <div style="margin-bottom:12px">
        <label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Comisión del vendedor (USD) <span style="font-weight:400">— opcional</span></label>
        <input type="number" id="vf-comision-vendedor" value="${d.comisionVendedor||''}" placeholder="0" oninput="Ventas.draft.comisionVendedor=parseFloat(this.value)||0" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">
      </div>
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border);font-weight:600">Total<span>${State.fmtUSD(total)}</span></div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;color:${saldo>0?'var(--red)':'var(--green-dark)'}">Saldo<span>${State.fmtUSD(saldo)}</span></div>
      ${totalDiferencialArs > 0 ? `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;color:var(--purple)">Diferencial de tarjeta<span>+$${totalDiferencialArs.toLocaleString('es-AR')}</span></div>` : ''}
      <div style="background:var(--blue-light);border-radius:8px;padding:10px 12px;margin-top:12px;font-size:12px;color:var(--blue-dark)">
        La venta se guardará como: <b>${saldo > 0 ? 'Abierta' : 'Cerrada'}</b>
      </div>
    `;
  },

  nextStep() {
    try {
      if (this.step === 1 && document.getElementById('vf-ti-active')) {
        const active = document.getElementById('vf-ti-active').checked;
        this.draft.tradeIn = active ? { modelo: document.getElementById('vf-ti-modelo').value, valor: parseFloat(document.getElementById('vf-ti-valor').value) || 0 } : null;
      }
      if (this.step === 0) {
        this.draft.cliente = document.getElementById('vf-cliente').value.trim() || 'Consumidor final';
        this.draft.clienteTel = document.getElementById('vf-cliente-tel')?.value.trim() || '';
        this.draft.clienteDni = document.getElementById('vf-cliente-dni')?.value.trim() || '';
        this.draft.tipoVenta = document.getElementById('vf-tipo-venta')?.value || 'minorista';
        this.draft.vendedor = document.getElementById('vf-vendedor').value;
      }
      if (this.step === 2 && this.draft.items.length === 0) { toast('Agregá al menos un ítem.'); return; }
      if (this.step === 4) { this.confirmSale(); return; }
      this.step++;
      this.renderStep();
      this.guardarBorrador();
    } catch (err) {
      console.error('Error al avanzar de paso en el formulario de venta:', err);
      toast('Hubo un problema al avanzar. Revisá la consola (F12) para más detalle, o avisame el error.');
    }
  },
  prevStep() { if (this.step > 0) { this.step--; this.renderStep(); } },

  async confirmSale() {
    const d = this.draft;
    const total = Math.max(0, d.items.reduce((s, i) => s + i.precio, 0) - (d.tradeIn?.valor || 0));
    const pagado = d.pagos.reduce((s, p) => s + Ventas.montoSinDiferencial(p), 0);
    const estado = pagado >= total ? 'cerrada' : 'abierta';

    toast('Guardando venta...');

    // Descontar stock de los ítems que vinieron de inventario (memoria + base de datos)
    const stockMovs = [];
    for (const it of d.items) {
      if (it.stockId) {
        const removed = State.descontarStock(it.stockId, it.imei);
        if (removed) {
          stockMovs.push(removed);
          const item = State.stock.find(s => s.id === it.stockId);
          if (item) {
            if (item.imeis) await DB.actualizarImeisStock(it.stockId, item.imeis);
            else await DB.actualizarCantidadStock(it.stockId, item.cantidad);
          }
        }
      }
    }

    // Acreditar pagos en las cajas correspondientes (memoria + base de datos)
    d.pagos.forEach(p => {
      let montoEnBolsillo = p.monto;
      if (p.bolsillo.startsWith('ARS')) montoEnBolsillo = p.monto * State.refBlue;
      State.acreditarCaja(p.persona, p.bolsillo, montoEnBolsillo);
    });

    // Guardar la venta en Supabase
    const ventaId = await DB.crearVenta(d, estado);
    if (!ventaId) { toast('Hubo un problema guardando la venta. Probá de nuevo.'); return; }

    const venta = {
      id: ventaId, fecha: 'Hoy', cliente: d.cliente, vendedor: d.vendedor,
      items: d.items, pagos: d.pagos.map(p => ({ caja: `${p.persona}-${p.bolsillo}`, monto: p.monto, persona: p.persona, bolsillo: p.bolsillo, esTarjeta: !!p.esTarjeta, diferencialArs: p.diferencialArs || 0, cotizacionDiferencial: p.cotizacionDiferencial || null })),
      estado, tradeIn: d.tradeIn, stockMovs
    };
    State.ventas.unshift(venta);

    // Respaldo en Google Sheets (no bloquea, falla en silencio si hay un problema)

    const input = document.getElementById('venta-nota-input');

    await DB.agregarNotaVenta(ventaId, input.value.trim());

    </div>

    <div class="firma-section">
      <div class="firma-box">Firma</div>
      <div class="firma-box">Aclaración</div>
      <div class="firma-box">DNI</div>
    </div>

    <div class="footer">
      DOCUMENTO NO VÁLIDO COMO FACTURA<br>
      Documento generado el ${new Date().toLocaleDateString('es-AR')} a las ${new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}<br>
      Recibo N° ${v.id} | IPhoneMood
    </div>
    </body></html>`;
    this._abrirVentanaPDF(html, `Recibo_${v.id}`);
  },

  generarDetallePDF(id) {
    const v = State.ventas.find(x => x.id === id);
    if (!v) return;
    const total = v.items.reduce((s, i) => s + i.precio, 0);
    const pagado = v.pagos.reduce((s, p) => s + p.monto, 0);
    const saldo = pagado - total;
    const profitTotal = v.items.reduce((s,i)=>s+(i.precio-(i.costo||0)),0);
    const dispositivosCats = ['iphone','android','mac','ipad','watch'];
    const itemsDisp = v.items.filter(i => { const p = State.stock.find(s => s.id === i.stockId); return p ? dispositivosCats.includes(p.cat) : false; });
    const itemsAcc = v.items.filter(i => { const p = State.stock.find(s => s.id === i.stockId); return !p || !dispositivosCats.includes(p.cat); });

    const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Venta #${v.id}</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: Arial, sans-serif; font-size: 12px; color: #1a1a1a; padding: 20px; }
      .header { margin-bottom: 16px; }
      .header h1 { font-size: 22px; margin-bottom: 2px; }
      .header .sub { font-size: 11px; color: #666; }
      .section { margin-bottom: 16px; }
      .section h3 { font-size: 13px; border-bottom: 1px solid #ccc; padding-bottom: 4px; margin-bottom: 8px; }
      .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 20px; margin-bottom: 12px; }
      .info-grid div { font-size: 11px; }
      .info-grid span { color: #666; display: block; }
      table { width: 100%; border-collapse: collapse; margin-bottom: 10px; font-size: 11px; }
      th { background: #1a1a1a; color: #fff; padding: 5px 7px; text-align: left; }
      td { padding: 5px 7px; border-bottom: 1px solid #e0e0e0; vertical-align: top; }
      .resumen { text-align: right; border-top: 1px solid #ccc; padding-top: 8px; }
      .resumen div { margin-bottom: 2px; }
      .footer { text-align: center; font-size: 9px; color: #aaa; margin-top: 20px; border-top: 1px solid #e0e0e0; padding-top: 8px; }
      @media print { body { padding: 10px; } }
    </style></head><body>
    <div class="header">
      <div style="font-size:16px;font-weight:bold">IPhoneMood</div>
      <h1>DETALLE DE VENTA</h1>
      <div class="sub">Venta #${v.id} · Fecha: ${v.fecha} · Estado: ${v.estado==='cerrada'?'Cerrada':'Abierta'}</div>
    </div>

    <div class="section">
      <h3>INFORMACIÓN DEL CLIENTE</h3>
      <div class="info-grid">
        <div><span>Cliente</span>${v.cliente}</div>
        ${v.clienteTel?`<div><span>Teléfono</span>${v.clienteTel}</div>`:''}
        ${v.clienteDni?`<div><span>DNI</span>${v.clienteDni}</div>`:''}
        <div><span>Vendedor</span>${v.vendedor||'—'}</div>
      </div>
    </div>

    ${itemsDisp.length ? `
    <div class="section">
      <h3>DISPOSITIVOS VENDIDOS</h3>
      <table><thead><tr><th>Dispositivo</th><th>Condición</th><th>Identificador</th><th>Garantía</th><th>P.Compra</th><th>P.Venta</th><th>Profit</th><th>Comisión</th></tr></thead>
      <tbody>${itemsDisp.map(i=>{
        const p=State.stock.find(s=>s.id===i.stockId);
        const dias=i.garantiaFin?Math.max(0,Math.round((new Date(i.garantiaFin)-new Date())/86400000)):null;
        const profit=i.precio-(i.costo||0);
        return `<tr><td><b>${i.nombre}</b>${p?.notas?`<br><small style="color:#666;font-style:italic">${p.notas}</small>`:''}</td><td>${p?.estadoProducto||'Usado'}</td><td style="font-family:monospace;font-size:10px">${i.imei||'—'}</td><td>${dias!==null?`${dias} días restantes`:'—'}</td><td>$${(i.costo||0).toFixed(2)}</td><td>$${i.precio}</td><td style="color:${profit>=0?'green':'red'}">${profit>=0?'+':''}$${profit.toFixed(2)}</td><td>$${(v.comisionVendedor||0).toFixed(2)}</td></tr>`;
      }).join('')}</tbody></table>
    </div>` : ''}

    ${itemsAcc.length ? `
    <div class="section">
      <h3>ACCESORIOS VENDIDOS</h3>
      <table><thead><tr><th>Accesorio</th><th>SKU</th><th>Cant.</th><th>P.Compra</th><th>P.Venta</th><th>Profit</th><th>Comisión</th></tr></thead>
      <tbody>${itemsAcc.map(i=>{
        const p=State.stock.find(s=>s.id===i.stockId);
        const profit=i.precio-(i.costo||0);
        return `<tr><td>${i.nombre}</td><td style="font-size:10px">${p?.storage||p?.notas||'N/A'}</td><td>1</td><td>$${(i.costo||0).toFixed(2)}</td><td>$${i.precio}</td><td style="color:${profit>=0?'green':'red'}">${profit>=0?'+':''}$${profit.toFixed(2)}</td><td>$0</td></tr>`;
      }).join('')}</tbody></table>
    </div>` : ''}

    <div class="section">
      <h3>PAGOS REGISTRADOS</h3>
      <table><thead><tr><th>Fecha</th><th>Método</th><th>Monto</th></tr></thead>
      <tbody>${v.pagos.map(p=>`<tr><td>${v.fecha}</td><td>${p.bolsillo}${p.esTarjeta?' (Tarjeta)':''}</td><td>${p.bolsillo?.startsWith('ARS')?`$ ${(p.monto*(p.cotizacionDiferencial||State.refBlue)).toLocaleString('es-AR')} ARS (USD ${p.monto} @ $${(p.cotizacionDiferencial||State.refBlue).toLocaleString('es-AR')})`:State.fmtUSD(p.monto)}</td></tr>`).join('')}</tbody>
      </table>
    </div>

    <div class="resumen">
      <div>Total Venta: <b>$${total.toFixed(2)} USD</b></div>
      <div style="color:${profitTotal>=0?'green':'red'}">Profit Total: ${profitTotal>=0?'+':''}$${profitTotal.toFixed(2)} USD</div>
      <div>Total Pagado: <b>$${pagado.toFixed(2)} USD</b></div>
      <div>Saldo: <b>$${saldo.toFixed(2)} USD</b></div>
      <div style="font-weight:bold;margin-top:4px">Ganancia Neta: ${profitTotal>=0?'+':''}$${profitTotal.toFixed(2)} USD</div>
    </div>

    <div class="footer">
      Generado el ${new Date().toLocaleDateString('es-AR')} a las ${new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}
    </div>
    </body></html>`;
    this._abrirVentanaPDF(html, `Venta_${v.id}`);
  },

  async anular(id) {
    const v = State.ventas.find(x => x.id === id);
    if (!v) return;
    if (!confirm(`¿Anular la venta #${v.id}? Esto revertirá el stock y los pagos en las cajas correspondientes.`)) return;
    // Revertir stock (memoria + base de datos)
    for (const m of (v.stockMovs || [])) {
      State.restaurarStock(m.stockId, m.imei);
      const item = State.stock.find(s => s.id === m.stockId);
      if (item) {
        if (item.imeis) await DB.actualizarImeisStock(m.stockId, item.imeis);
        else await DB.actualizarCantidadStock(m.stockId, item.cantidad);
      }
    }
    // Revertir cajas
    v.pagos.forEach(p => {
      let montoEnBolsillo = p.monto;
      if (p.bolsillo.startsWith('ARS')) montoEnBolsillo = p.monto * State.refBlue;
      State.debitarCaja(p.persona, p.bolsillo, montoEnBolsillo);
    });
    await DB.anularVenta(id);
    State.ventas = State.ventas.filter(x => x.id !== id);
    this.closeModal();
    this.renderList();
    toast(`Venta #${id} anulada. Stock restaurado y pagos revertidos en las cajas de origen.`);
  }
};

</script>
<script>
const Reparaciones = {
  currentId: null,
  ESTADOS: ['ingresado','diagnosticado','en_reparacion','listo','entregado'],
  ESTADO_LABEL: { ingresado:'Ingresado', diagnosticado:'Diagnosticado', en_reparacion:'En reparación', listo:'Listo', entregado:'Entregado', rechazado:'Rechazado', no_reparable:'No reparable' },
  ESTADO_CLASS: { ingresado:'b-gray', diagnosticado:'b-purple', en_reparacion:'b-blue', listo:'b-green', entregado:'b-teal', rechazado:'b-red', no_reparable:'b-red' },

  render() {
    const c = document.createElement('div');
    c.className = 'rep-shell';
    c.style.display = 'flex';
    c.style.flex = '1';
    c.style.overflow = 'hidden';
    c.innerHTML = `
      <div class="rep-list-panel" style="width:260px;min-width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg-secondary)">
        <div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <b style="font-size:13px">Órdenes (${State.reparaciones.length})</b>
          <button class="btn btn-sm btn-primary" onclick="Reparaciones.newOrder()"><i class="ti ti-plus"></i></button>
        </div>
        <div style="padding:8px 10px;border-bottom:1px solid var(--border)"><input type="text" id="rep-search" placeholder="Buscar..." oninput="Reparaciones.renderList()" style="width:100%;font-size:12px;padding:5px 9px;border:1px solid var(--border-strong);border-radius:8px"></div>
        <div style="flex:1;overflow-y:auto" id="rep-list"></div>
      </div>
      <div class="rep-detail-panel" style="flex:1;flex-direction:column;overflow:hidden;min-width:0">
        <button class="btn btn-sm rep-back-btn" onclick="Reparaciones.backToList()" style="display:none;margin:10px 14px 0"><i class="ti ti-arrow-left"></i> Ver órdenes</button>
        <div id="rep-detail" style="flex:1;overflow-y:auto;padding:18px 20px"></div>
      </div>
    `;
    setTimeout(() => {
      if (!this.currentId && State.reparaciones.length) this.currentId = State.reparaciones[0].id;
      this.renderList();
      this.renderDetail();
      this.syncMobileView(false);
      this.bindResizeListener();
    }, 0);
    return c;
  },

  hasMovimientos(o) { return (o.pagos && o.pagos.length > 0) || (o.repuestos && o.repuestos.length > 0); },

  renderList() {
    const q = (document.getElementById('rep-search')?.value || '').toLowerCase();
    const filtered = State.reparaciones.filter(o => !q || o.cliente.toLowerCase().includes(q) || o.equipo.toLowerCase().includes(q) || o.id.toLowerCase().includes(q));
    document.getElementById('rep-list').innerHTML = filtered.map(o => {
      const flags = [];
      if (o.pagos?.length) flags.push(`<span class="badge b-green" style="font-size:9px">$ pago</span>`);
      if (o.repuestos?.length) flags.push(`<span class="badge b-amber" style="font-size:9px">repuesto</span>`);
      return `<div onclick="Reparaciones.select('${o.id}')" style="padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;${this.currentId===o.id?'background:var(--bg);border-left:2px solid var(--blue)':''}">
        <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600">${o.id} — ${o.equipo}<span style="font-size:10px;color:var(--text-secondary);font-weight:400">${o.fechaIngreso}</span></div>
        <div style="font-size:11px;color:var(--text-secondary)">${o.cliente}</div>
        <div style="margin-top:5px;display:flex;gap:4px"><span class="badge ${this.ESTADO_CLASS[o.estado]}" style="font-size:9.5px">${this.ESTADO_LABEL[o.estado]}</span>${flags.join('')}</div>
      </div>`;
    }).join('');
  },
  select(id) { this.currentId = id; this.renderList(); this.renderDetail(); this.syncMobileView(true); },

  isMobile() { return window.innerWidth <= 900; },

  syncMobileView(showDetail) {
    const listPanel = document.querySelector('.rep-list-panel');
    const detailPanel = document.querySelector('.rep-detail-panel');
    const backBtn = document.querySelector('.rep-back-btn');
    if (!listPanel || !detailPanel) return;

    if (!this.isMobile()) {
      // Desktop: siempre las dos columnas visibles, sin botón de volver
      listPanel.style.display = 'flex';
      detailPanel.style.display = 'flex';
      if (backBtn) backBtn.style.display = 'none';
      return;
    }

    // Mobile: una sola columna visible por vez
    if (showDetail) {
      listPanel.style.display = 'none';
      detailPanel.style.display = 'flex';
      if (backBtn) backBtn.style.display = 'inline-flex';
    } else {
      listPanel.style.display = 'flex';
      detailPanel.style.display = 'none';
      if (backBtn) backBtn.style.display = 'none';
    }
  },

  backToList() {
    this.syncMobileView(false);
  },

  _resizeBound: false,
  bindResizeListener() {
    if (this._resizeBound) return;
    this._resizeBound = true;
    window.addEventListener('resize', () => {
      if (document.querySelector('.rep-list-panel')) this.syncMobileView(this.isMobile() && !!this.currentId && document.querySelector('.rep-detail-panel')?.style.display === 'flex');
    });
  },

  renderDetail() {
    const o = State.reparaciones.find(x => x.id === this.currentId);
    const detail = document.getElementById('rep-detail');
    if (!o) { detail.innerHTML = `<div class="empty-state"><i class="ti ti-tool"></i>Seleccioná una orden</div>`; return; }

    const totalCosto = o.costoMO + o.repuestos.reduce((a, r) => a + r.costo, 0);
    const margen = o.precioFinal - totalCosto;
    const tieneMov = this.hasMovimientos(o);
    const isTerminal = ['rechazado', 'no_reparable'].includes(o.estado);

    let movInfo = '';
    if (isTerminal) {
      movInfo = tieneMov
        ? `<div style="background:var(--red-light);border:1px solid #F09595;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:11.5px;color:var(--red)"><b style="display:block;margin-bottom:3px">⚠ Esta orden tiene movimientos asociados</b>Usá "Cancelar orden" para revertir pagos y repuestos de stock.</div>`
        : `<div style="background:var(--green-light);border:1px solid #97C459;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:11.5px;color:var(--green-dark)"><b style="display:block;margin-bottom:3px">✓ Sin movimientos asociados</b>Equipo marcado automáticamente como devuelto al cliente.</div>`;
    }

    detail.innerHTML = `
      <div class="rep-detail-header" style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <h2 style="font-size:15px;font-weight:600;flex:1;min-width:0">${o.id} — ${o.equipo}<br><span style="font-size:12px;color:var(--text-secondary);font-weight:400">${o.cliente}</span></h2>
        <span class="badge ${this.ESTADO_CLASS[o.estado]}" style="flex-shrink:0">${this.ESTADO_LABEL[o.estado]}</span>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px">
        ${this.ESTADOS.map(s => `<span onclick="Reparaciones.setEstado('${s}')" style="font-size:11px;padding:5px 11px;border-radius:20px;border:1.5px solid ${o.estado===s?'var(--blue)':'var(--border-strong)'};background:${o.estado===s?'var(--blue-light)':'var(--bg)'};color:${o.estado===s?'var(--blue-dark)':'var(--text-secondary)'};cursor:pointer">${this.ESTADO_LABEL[s]}</span>`).join('')}
        <span onclick="Reparaciones.setEstado('rechazado')" style="font-size:11px;padding:5px 11px;border-radius:20px;border:1.5px solid #F09595;background:${o.estado==='rechazado'?'var(--red-light)':'var(--bg)'};color:${o.estado==='rechazado'?'var(--red)':'var(--text-secondary)'};cursor:pointer">Rechazado</span>
        <span onclick="Reparaciones.setEstado('no_reparable')" style="font-size:11px;padding:5px 11px;border-radius:20px;border:1.5px solid #F09595;background:${o.estado==='no_reparable'?'var(--red-light)':'var(--bg)'};color:${o.estado==='no_reparable'?'var(--red)':'var(--text-secondary)'};cursor:pointer">No reparable</span>
      </div>
      ${movInfo}
      <div style="background:var(--red-light);border:1px solid #F09595;border-radius:8px;padding:10px 12px;margin-bottom:14px;display:flex;align-items:center;gap:10px">
        <i class="ti ti-lock" style="font-size:18px;color:var(--red)"></i>
        <div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--red)">Clave de desbloqueo</div></div>
        <div style="font-family:monospace;font-size:14px;font-weight:600;background:#fff;padding:4px 10px;border-radius:6px;color:var(--red)">${o.clave||'—'}</div>
      </div>
      <div class="card"><div class="card-title"><i class="ti ti-stethoscope"></i> Diagnóstico</div>
        <p style="font-size:12.5px;background:var(--purple-light);padding:10px;border-radius:8px;color:var(--purple)">${o.diagnostico || 'Pendiente de diagnóstico'}</p>
      </div>
      <div class="card"><div class="card-title"><i class="ti ti-tool"></i> Repuestos utilizados</div>
        ${o.repuestos.length ? o.repuestos.map(r => `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span>${r.nombre} ${r.fromStock?'<span style="color:var(--text-secondary);font-size:10px">(de stock)</span>':'<span style="color:var(--text-secondary);font-size:10px">(compra externa)</span>'}</span><b>USD ${r.costo}</b></div>`).join('') : '<p style="font-size:12px;color:var(--text-secondary)">Sin repuestos cargados</p>'}
        <button class="btn btn-sm" style="margin-top:8px" onclick="Reparaciones.addRepuesto()"><i class="ti ti-plus"></i> Agregar repuesto</button>
      </div>
      <div class="card"><div class="card-title"><i class="ti ti-credit-card"></i> Pagos / señas</div>
        ${o.pagos.length ? o.pagos.map(p => `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">${p.caja}<b>${State.fmtARS(p.monto)}</b></div>`).join('') : '<p style="font-size:12px;color:var(--text-secondary)">Sin pagos registrados</p>'}
        <button class="btn btn-sm" style="margin-top:8px" onclick="Reparaciones.addPago()"><i class="ti ti-plus"></i> Registrar seña</button>
      </div>
      <div class="card"><div class="card-title"><i class="ti ti-currency-dollar"></i> Costos y precio</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div><label style="font-size:11px;color:var(--text-secondary)">Mano de obra</label><input type="number" id="rep-f-mo" value="${o.costoMO}" style="width:100%;font-size:12px;padding:6px 9px;border:1px solid var(--border-strong);border-radius:8px"></div>
          <div><label style="font-size:11px;color:var(--text-secondary)">Precio cobrado</label><input type="number" id="rep-f-precio" value="${o.precioFinal}" style="width:100%;font-size:12px;padding:6px 9px;border:1px solid var(--border-strong);border-radius:8px"></div>
        </div>
        <div style="background:var(--blue-light);border-radius:8px;padding:10px;display:flex;justify-content:space-around;text-align:center">
          <div><label style="font-size:10px;color:var(--blue-dark)">Costo</label><div style="font-weight:600;color:var(--blue-dark)">${State.fmtARS(totalCosto)}</div></div>
          <div><label style="font-size:10px;color:var(--blue-dark)">Precio</label><div style="font-weight:600;color:var(--blue-dark)">${State.fmtARS(o.precioFinal)}</div></div>
          <div><label style="font-size:10px;color:var(--blue-dark)">Margen</label><div style="font-weight:600;color:${margen>=0?'var(--green-dark)':'var(--red)'}">${margen>=0?'+':''}${State.fmtARS(margen)}</div></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
        ${isTerminal && tieneMov ? `<button class="btn btn-red" onclick="Reparaciones.cancelarConReversion()"><i class="ti ti-arrow-back-up"></i> Cancelar orden (revertir)</button>` : ''}
        ${o.estado === 'listo' ? `<button class="btn btn-green" onclick="Reparaciones.entregarYCobrar()"><i class="ti ti-check"></i> Entregar y cobrar</button>` : `<button class="btn btn-primary" onclick="Reparaciones.saveOrder()"><i class="ti ti-check"></i> Guardar cambios</button>`}
      </div>
    `;
  },

  async setEstado(estado) {
    const o = State.reparaciones.find(x => x.id === this.currentId);
    if (!o) return;
    o.estado = estado;
    if (['rechazado', 'no_reparable'].includes(estado) && !this.hasMovimientos(o)) {
      o.equipoDevuelto = true; o.custodio = '';
      toast('Equipo marcado como devuelto al cliente automáticamente (sin movimientos que revertir).');
    }
    await DB.actualizarReparacion(o);
    Sheets.reparacion(o);
    this.renderList(); this.renderDetail();
  },

  async addRepuesto() {
    const fromStockChoice = confirm('¿Es un repuesto que sale de tu stock? Aceptar = sí, de stock. Cancelar = compra externa.');
    const nombre = prompt('Nombre del repuesto:');
    if (!nombre) return;
    const costo = parseFloat(prompt('Costo en USD:', '0')) || 0;
    const o = State.reparaciones.find(x => x.id === this.currentId);
    const repuesto = { nombre, costo, fromStock: fromStockChoice };
    o.repuestos.push(repuesto);
    await DB.agregarRepuestoReparacion(o.id, repuesto);
    this.renderList(); this.renderDetail();
  },

  async addPago() {
    const monto = parseFloat(prompt('Monto de la seña (ARS):', '0')) || 0;
    if (!monto) return;
    const persona = prompt('¿Qué persona recibe el pago?', 'Valen') || 'Valen';
    const o = State.reparaciones.find(x => x.id === this.currentId);
    const pago = { caja: `${persona}-ARS cash`, monto, persona, bolsillo: 'ARS cash' };
    o.pagos.push(pago);
    State.acreditarCaja(persona, 'ARS cash', monto);
    await DB.agregarPagoReparacion(o.id, pago);
    this.renderList(); this.renderDetail();
    toast(`Seña de ${State.fmtARS(monto)} acreditada en la caja de ${persona}.`);
  },

  async cancelarConReversion() {
    const o = State.reparaciones.find(x => x.id === this.currentId);
    if (!confirm('¿Cancelar esta orden? Se revertirán los pagos en sus cajas y los repuestos de stock volverán al inventario.')) return;

    toast('Revirtiendo movimientos...');
    // Revertir pagos
    o.pagos.forEach(p => State.debitarCaja(p.persona, p.bolsillo, p.monto));
    // Revertir repuestos que salieron de stock (sumarlos de nuevo al inventario)
    for (const r of o.repuestos.filter(r => r.fromStock && r.stockId)) {
      const item = State.stock.find(s => s.id === r.stockId);
      if (item) {
        if (item.imeis) { /* repuestos no manejan IMEI individual en esta maqueta */ }
        else { item.cantidad = (item.cantidad || 0) + 1; await DB.actualizarCantidadStock(r.stockId, item.cantidad); }
      }
    }
    await DB.limpiarMovimientosReparacion(o.id);
    o.pagos = [];
    o.repuestos = o.repuestos.filter(r => !r.fromStock);
    o.equipoDevuelto = true; o.custodio = '';
    await DB.actualizarReparacion(o);
    this.renderList(); this.renderDetail();
    toast('Orden cancelada. Pagos revertidos a sus cajas de origen y repuestos de stock restaurados.');
  },

  async entregarYCobrar() {
    const o = State.reparaciones.find(x => x.id === this.currentId);
    const persona = o.custodio || prompt('¿En qué caja se acredita el cobro?', 'Valen') || 'Valen';
    State.acreditarCaja(persona, 'ARS cash', o.precioFinal);
    o.estado = 'entregado';
    await DB.actualizarReparacion(o);
    this.renderList(); this.renderDetail();
    toast(`Equipo entregado. ${State.fmtARS(o.precioFinal)} acreditado en la caja de ${persona}.`);
  },

  async saveOrder() {
    const o = State.reparaciones.find(x => x.id === this.currentId);
    o.costoMO = parseFloat(document.getElementById('rep-f-mo').value) || 0;
    o.precioFinal = parseFloat(document.getElementById('rep-f-precio').value) || 0;
    await DB.actualizarReparacion(o);
    Sheets.reparacion(o);
    this.renderDetail();
    toast('Cambios guardados.');
  },

  async newOrder() {
    const id = 'R0' + (20 + State.reparaciones.length);
    const o = { id, cliente: 'Nuevo cliente', tel: '', equipo: 'Sin especificar', falla: '', clave: '', estado: 'ingresado', fechaIngreso: 'Hoy', diagnostico: '', presupuestoAprobado: false, repuestos: [], pagos: [], costoMO: 0, precioFinal: 0, tecnico: 'Técnico ext.', custodio: '', notas: '', equipoDevuelto: false };
    await DB.crearReparacion(o);
    Sheets.reparacion(o);
    State.reparaciones.unshift(o);
    this.currentId = id;
    this.renderList(); this.renderDetail();
    this.syncMobileView(true);
  }
};

</script>
<script>
const Gastos = {
  activeCat: 'all',
  currentView: 'mes', // 'mes' | 'fijos' | 'cierre'
  mesActual: new Date().toISOString().slice(0, 7), // 'YYYY-MM'

  render() {
    const c = document.createElement('div');
    c.innerHTML = `
      <div style="padding:12px 22px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0" id="gastos-view-tabs"></div>
      <div id="gastos-view-host" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0"></div>
      <div id="gastos-modal-host"></div>
    `;
    setTimeout(() => this.renderView(), 0);
    return c;
  },

  renderView() {
    document.getElementById('gastos-view-tabs').innerHTML = `
      <button class="btn btn-sm ${this.currentView==='mes'?'btn-primary':''}" onclick="Gastos.setView('mes')"><i class="ti ti-receipt"></i> Gastos del mes</button>
      <button class="btn btn-sm ${this.currentView==='fijos'?'btn-primary':''}" onclick="Gastos.setView('fijos')"><i class="ti ti-repeat"></i> Gastos fijos</button>
      <button class="btn btn-sm ${this.currentView==='cierre'?'btn-primary':''}" onclick="Gastos.setView('cierre')"><i class="ti ti-calculator"></i> Cierre de mes</button>
    `;
    const host = document.getElementById('gastos-view-host');
    if (this.currentView === 'mes') { host.innerHTML = this.viewGastosMes(); setTimeout(() => { this.renderChips(); this.renderKpis(); this.renderTable(); }, 0); }
    else if (this.currentView === 'fijos') { host.innerHTML = this.viewGastosFijos(); setTimeout(() => this.renderFijosList(), 0); }
    else { host.innerHTML = this.viewCierre(); setTimeout(() => this.renderCierre(), 0); }
  },
  setView(v) { this.currentView = v; this.renderView(); },

  viewGastosMes() {
    return `
      <div class="kpi-row" style="grid-template-columns:repeat(4,1fr)">
        <div class="kpi"><label>Gastos ARS</label><div class="val" id="g-kpi-ars">—</div></div>
        <div class="kpi"><label>Gastos USD</label><div class="val" id="g-kpi-usd">—</div></div>
        <div class="kpi"><label>Pendientes</label><div class="val" id="g-kpi-pend">—</div></div>
        <div class="kpi"><label>Categoría top</label><div class="val" id="g-kpi-cat" style="font-size:13px">—</div></div>
      </div>
      <div style="padding:10px 22px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <div id="gastos-chips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        <button class="btn btn-sm" style="margin-left:auto" onclick="Gastos.manageCats()"><i class="ti ti-settings"></i> Categorías</button>
        <button class="btn btn-primary btn-sm" onclick="Gastos.openNew()"><i class="ti ti-plus"></i> Registrar gasto</button>
      </div>
      <div class="body-pad">
        <table><thead><tr><th>Fecha</th><th>Motivo</th><th>Categoría</th><th>Responsable</th><th>Caja</th><th>Monto</th><th>Estado</th><th></th></tr></thead>
        <tbody id="gastos-tbody"></tbody></table>
      </div>
    `;
  },

  catObj(id) { return State.categoriasGasto.find(c => c.id === id) || { nombre: id, color: '#888' }; },

  renderChips() {
    const html = [`<button class="btn btn-sm ${this.activeCat==='all'?'btn-primary':''}" onclick="Gastos.setCat('all')">Todos</button>`]
      .concat(State.categoriasGasto.map(c => `<button class="btn btn-sm ${this.activeCat===c.id?'btn-primary':''}" onclick="Gastos.setCat('${c.id}')" style="${this.activeCat!==c.id?`border-color:${c.color}55`:''}">${c.nombre}</button>`));
    const el = document.getElementById('gastos-chips');
    if (el) el.innerHTML = html.join('');
  },
  setCat(c) { this.activeCat = c; this.renderChips(); this.renderTable(); },

  renderKpis() {
    const delMes = State.gastos.filter(g => !g.mesCierre || g.mesCierre === this.mesActual);
    const ars = delMes.filter(g => g.moneda === 'ARS').reduce((a, g) => a + g.monto, 0);
    const usd = delMes.filter(g => g.moneda === 'USD').reduce((a, g) => a + g.monto, 0);
    const pend = delMes.filter(g => g.estado === 'pendiente').length;
    const counts = {};
    delMes.forEach(g => counts[g.cat] = (counts[g.cat]||0)+1);
    const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
    const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
    set('g-kpi-ars', State.fmtARS(ars));
    set('g-kpi-usd', State.fmtUSD(usd));
    set('g-kpi-pend', pend);
    set('g-kpi-cat', top ? this.catObj(top[0]).nombre : '—');
  },

  renderTable() {
    const rows = (this.activeCat === 'all' ? State.gastos : State.gastos.filter(g => g.cat === this.activeCat));
    const tbody = document.getElementById('gastos-tbody');
    if (!tbody) return;
    tbody.innerHTML = rows.map(g => {
      const c = this.catObj(g.cat);
      const pagado = g.estado === 'pagado';
      return `<tr>
        <td>${g.fecha}${g.esFijo?' <span class="badge b-blue" style="font-size:9px">Fijo</span>':''}${g.esSueldoSocio?` <span class="badge b-purple" style="font-size:9px">Sueldo ${g.socioNombre||''}</span>`:''}</td>
        <td>${g.motivo}</td>
        <td><span class="badge" style="background:${c.color}22;color:${c.color}">${c.nombre}</span></td>
        <td>${g.responsable}</td><td style="font-size:11px;color:var(--text-secondary)">${g.caja}</td>
        <td><b>${g.moneda==='USD'?State.fmtUSD(g.monto):State.fmtARS(g.monto)}</b></td>
        <td><span class="badge ${pagado?'b-gray':'b-amber'}" style="opacity:${pagado?'0.45':'1'}">Pendiente</span> <span class="badge ${pagado?'b-green':'b-gray'}" style="opacity:${pagado?'1':'0.45'}">Pagado</span></td>
        <td><button class="btn btn-sm" onclick="Gastos.openEdit('${g.id}')"><i class="ti ti-edit"></i> Editar</button></td>
      </tr>`;
    }).join('');
  },

  openNew() {
    const host = document.getElementById('gastos-modal-host');
    host.innerHTML = `
      <div style="position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200" onclick="if(event.target===this) Gastos.close()">
        <div style="width:380px;max-width:92vw;background:var(--bg);border-radius:14px;padding:18px" onclick="event.stopPropagation()">
          <h3 style="font-size:15px;font-weight:600;margin-bottom:14px">Registrar gasto</h3>
          <div style="margin-bottom:10px"><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Motivo</label><input type="text" id="gf-motivo" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px">
            <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Categoría</label>
              <select id="gf-cat" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">${State.categoriasGasto.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}</select></div>
            <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Responsable</label>
              <select id="gf-resp" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">${State.personas.map(p=>`<option>${p}</option>`).join('')}</select></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px">
            <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Moneda</label>
              <select id="gf-moneda" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px"><option value="ARS">ARS</option><option value="USD">USD</option></select></div>
            <div><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Monto</label>
              <input type="number" id="gf-monto" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px"></div>
          </div>
          <div style="margin-bottom:14px"><label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Caja que paga</label>
            <select id="gf-caja-persona" style="width:48%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">${State.personas.map(p=>`<option>${p}</option>`).join('')}</select>
            <select id="gf-caja-bolsillo" style="width:48%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px;margin-left:4%"><option>ARS cash</option><option>ARS transferencia</option><option>USD cash</option><option>USD transferencia</option></select>
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn" onclick="Gastos.close()">Cancelar</button>
            <button class="btn btn-primary" onclick="Gastos.save()"><i class="ti ti-check"></i> Guardar</button>
          </div>
        </div>
      </div>
    `;
  },
  close() { document.getElementById('gastos-modal-host').innerHTML = ''; },

  async save() {
    const motivo = document.getElementById('gf-motivo').value.trim();
    const monto = parseFloat(document.getElementById('gf-monto').value) || 0;
    if (!motivo || !monto) { toast('Completá motivo y monto.'); return; }
    const persona = document.getElementById('gf-caja-persona').value;
    const bolsillo = document.getElementById('gf-caja-bolsillo').value;
    const moneda = document.getElementById('gf-moneda').value;
    const cat = document.getElementById('gf-cat').value;
    const responsable = document.getElementById('gf-resp').value;

    toast('Guardando gasto...');
    const mesCierre = this.mesActual;
    const cotizacionUsada = moneda === 'ARS' ? State.refBlue : null;
    const newId = await DB.crearGasto({ motivo, cat, responsable, persona, bolsillo, moneda, monto, estado: 'pagado', mesCierre, cotizacionUsada });

    State.gastos.unshift({ id: newId || Date.now(), fecha: 'Hoy', motivo, cat, responsable, caja: `${persona}-${bolsillo}`, moneda, monto, estado: 'pagado', mesCierre, esFijo: false, esSueldoSocio: false, cotizacionUsada });
    State.debitarCaja(persona, bolsillo, monto);
    Sheets.gasto({ fecha: 'Hoy', motivo, responsable, caja: `${persona}-${bolsillo}`, moneda, monto, estado: 'pagado' }, this.catObj(cat).nombre);
    this.close(); this.renderChips(); this.renderKpis(); this.renderTable();
    toast('Gasto registrado y debitado de la caja correspondiente.');
  },

  openEdit(id) {
    const g = State.gastos.find(x => x.id === id);
    if (!g) return;
    const c = this.catObj(g.cat);
    const host = document.getElementById('gastos-modal-host');
    host.innerHTML = `
      <div style="position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200" onclick="if(event.target===this) Gastos.close()">
        <div style="width:380px;max-width:92vw;background:var(--bg);border-radius:14px;padding:18px" onclick="event.stopPropagation()">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <h3 style="font-size:15px;font-weight:600">${g.motivo}</h3>
            <span class="badge" style="background:${c.color}22;color:${c.color}">${c.nombre}</span>
          </div>
          <p style="font-size:12px;color:var(--text-secondary);margin-bottom:14px">${g.fecha} · ${g.responsable} · ${g.caja}</p>
          <div style="display:flex;justify-content:space-between;padding:8px 0;font-weight:600;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:14px">
            Monto<span>${g.moneda==='USD'?State.fmtUSD(g.monto):State.fmtARS(g.monto)}</span>
          </div>
          <div style="margin-bottom:14px">
            <label style="font-size:11px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:4px">Estado</label>
            <select id="ef-estado" style="width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-strong);border-radius:8px">
              <option value="pagado" ${g.estado==='pagado'?'selected':''}>Pagado</option>
              <option value="pendiente" ${g.estado==='pendiente'?'selected':''}>Pendiente</option>
            </select>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:6px">
            <button class="btn" style="color:var(--red)" onclick="Gastos.deleteGasto('${g.id}')"><i class="ti ti-trash"></i> Eliminar</button>
            <div style="display:flex;gap:8px">
              <button class="btn" onclick="Gastos.close()">Cancelar</button>
              <button class="btn btn-primary" onclick="Gastos.saveEdit('${g.id}')"><i class="ti ti-check"></i> Guardar</button>
            </div>
          </div>
        </div>
      </div>
    `;
  },

  async saveEdit(id) {
    const g = State.gastos.find(x => x.id === id);
    if (!g) return;
    const nuevoEstado = document.getElementById('ef-estado').value;
    g.estado = nuevoEstado;
    await DB.actualizarEstadoGasto(id, nuevoEstado);
    this.close();
    this.renderTable();
    toast('Gasto actualizado.');
  },

  async deleteGasto(id) {
    if (!confirm('¿Eliminar este gasto? Esta acción no revierte el monto en la caja automáticamente.')) return;
    await DB.eliminarGasto(id);
    State.gastos = State.gastos.filter(x => x.id !== id);
    this.close();
    this.renderChips();
    this.renderKpis();
    this.renderTable();
    toast('Gasto eliminado.');
  },

  manageCats() {
    const host = document.getElementById('gastos-modal-host');
    host.innerHTML = `
      <div style="position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200" onclick="if(event.target===this) Gastos.close()">
        <div style="width:340px;max-width:92vw;background:var(--bg);border-radius:14px;padding:18px" onclick="event.stopPropagation()">
          <h3 style="font-size:15px;font-weight:600;margin-bottom:14px">Editar categorías</h3>
          <div id="cat-manage-list"></div>
          <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" onclick="Gastos.addCat()"><i class="ti ti-plus"></i> Nueva categoría</button>
          <div style="text-align:right;margin-top:14px"><button class="btn" onclick="Gastos.close();Gastos.renderChips();Gastos.renderTable()">Listo</button></div>
        </div>
      </div>
    `;
    this.renderCatList();
  },
  renderCatList() {
    document.getElementById('cat-manage-list').innerHTML = State.categoriasGasto.map((c, i) => `
      <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
        <input type="color" value="${c.color}" onchange="Gastos.updateCatColor(${i}, this.value)">
        <input type="text" value="${c.nombre}" onchange="Gastos.updateCatNombre(${i}, this.value)" style="flex:1;font-size:12px;padding:5px 8px;border:1px solid var(--border-strong);border-radius:8px">
        <button onclick="Gastos.delCat(${i})" style="background:none;border:none;cursor:pointer;color:var(--red)"><i class="ti ti-trash"></i></button>
      </div>`).join('');
  },
  async updateCatColor(i, color) {
    State.categoriasGasto[i].color = color;
    await DB.editarCategoriaGasto(State.categoriasGasto[i].id, { color });
  },
  async updateCatNombre(i, nombre) {
    State.categoriasGasto[i].nombre = nombre;
    await DB.editarCategoriaGasto(State.categoriasGasto[i].id, { nombre });
  },
  async addCat() {
    const nombre = prompt('Nombre de la categoría:');
    if (!nombre) return;
    const nueva = await DB.agregarCategoriaGasto(nombre, '#185FA5');
    State.categoriasGasto.push({ id: nueva?.id || ('cat-' + Date.now()), nombre, color: '#185FA5' });
    this.renderCatList();
  },
  async delCat(i) {
    if (!confirm('¿Eliminar esta categoría?')) return;
    await DB.borrarCategoriaGasto(State.categoriasGasto[i].id);
    State.categoriasGasto.splice(i, 1);
    this.renderCatList();
  },

  viewGastosFijos() {
    return `
      <div style="padding:12px 22px;background:var(--blue-light);font-size:12px;color:var(--blue-dark)">
        <i class="ti ti-info-circle"></i> Esta es tu plantilla de gastos fijos (Alquiler, Monotributos, CRM, etc). Editá los conceptos y montos sugeridos acá una vez, y cada mes los "cargás" con un clic en Cierre de mes — sin tener que escribirlos de nuevo.
      </div>
      <div style="padding:12px 22px;display:flex;justify-content:flex-end">
        <button class="btn btn-primary btn-sm" onclick="Gastos.addFijo()"><i class="ti ti-plus"></i> Agregar gasto fijo</button>
      </div>
      <div class="body-pad" style="padding-top:0" id="fijos-list"></div>
    `;
  },

  renderFijosList() {
    const host = document.getElementById('fijos-list');
    if (!host) return;
    if (!State.gastosFijosPlantilla.length) { host.innerHTML = `<div class="empty-state"><i class="ti ti-repeat"></i>Todavía no tenés gastos fijos cargados</div>`; return; }
    host.innerHTML = `
      <table><thead><tr><th>Concepto</th><th>Categoría</th><th>Monto sugerido</th><th>Moneda</th><th></th></tr></thead>
      <tbody>
        ${State.gastosFijosPlantilla.map((g,i) => `
          <tr>
            <td><input type="text" value="${g.motivo}" onchange="Gastos.editarFijoMotivo(${i}, this.value)" style="font-size:12px;padding:5px 8px;border:1px solid var(--border-strong);border-radius:6px;width:100%"></td>
            <td>
              <select onchange="Gastos.editarFijoCat(${i}, this.value)" style="font-size:12px;padding:5px 8px;border:1px solid var(--border-strong);border-radius:6px">
                <option value="">Sin categoría</option>
                ${State.categoriasGasto.map(c=>`<option value="${c.id}" ${g.cat===c.id?'selected':''}>${c.nombre}</option>`).join('')}
              </select>
            </td>
            <td><input type="number" value="${g.montoSugerido}" onchange="Gastos.editarFijoMonto(${i}, this.value)" style="font-size:12px;padding:5px 8px;border:1px solid var(--border-strong);border-radius:6px;width:110px"></td>
            <td>
              <select onchange="Gastos.editarFijoMoneda(${i}, this.value)" style="font-size:12px;padding:5px 8px;border:1px solid var(--border-strong);border-radius:6px">
                <option value="ARS" ${g.moneda==='ARS'?'selected':''}>ARS</option>
                <option value="USD" ${g.moneda==='USD'?'selected':''}>USD</option>
              </select>
            </td>
            <td><button class="btn btn-sm" style="color:var(--red)" onclick="Gastos.delFijo(${i})"><i class="ti ti-trash"></i></button></td>
          </tr>
        `).join('')}
      </tbody></table>
    `;
  },

  async addFijo() {
    const motivo = prompt('Nombre del gasto fijo (ej: Alquiler, Seguro, etc):');
    if (!motivo) return;
    const nuevo = await DB.agregarGastoFijo(motivo, null, 0, 'ARS');
    State.gastosFijosPlantilla.push({ id: nuevo?.id || ('fijo-'+Date.now()), motivo, cat: null, montoSugerido: 0, moneda: 'ARS', orden: State.gastosFijosPlantilla.length+1, activo: true });
    this.renderFijosList();
  },
  async editarFijoMotivo(i, val) { State.gastosFijosPlantilla[i].motivo = val; await DB.editarGastoFijo(State.gastosFijosPlantilla[i].id, { motivo: val }); },
  async editarFijoCat(i, val) { State.gastosFijosPlantilla[i].cat = val || null; },
  async editarFijoMonto(i, val) { State.gastosFijosPlantilla[i].montoSugerido = parseFloat(val)||0; await DB.editarGastoFijo(State.gastosFijosPlantilla[i].id, { montoSugerido: parseFloat(val)||0 }); },
  async editarFijoMoneda(i, val) { State.gastosFijosPlantilla[i].moneda = val; await DB.editarGastoFijo(State.gastosFijosPlantilla[i].id, { moneda: val }); },
  async delFijo(i) {
    if (!confirm(`¿Eliminar "${State.gastosFijosPlantilla[i].motivo}" de la plantilla?`)) return;
    await DB.borrarGastoFijo(State.gastosFijosPlantilla[i].id);
    State.gastosFijosPlantilla.splice(i, 1);
    this.renderFijosList();
  },

  viewCierre() {
    const meses = this.ultimosMeses(6);
    return `
      <div style="padding:14px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <div style="display:flex;align-items:center;gap:8px">
          <label style="font-size:12px;color:var(--text-secondary);font-weight:600">Mes:</label>
          <select id="cierre-mes-selector" onchange="Gastos.cambiarMes(this.value)" style="font-size:12px;padding:6px 10px;border:1px solid var(--border-strong);border-radius:8px">
            ${meses.map(m => `<option value="${m.value}" ${m.value===this.mesActual?'selected':''}>${m.label}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-sm" onclick="Gastos.clonarFijos()"><i class="ti ti-copy"></i> Cargar gastos fijos del mes</button>
      </div>
      <div class="body-pad" id="cierre-body"></div>
    `;
  },

  ultimosMeses(n) {
    const arr = [];
    const hoy = new Date();
    for (let i = 0; i < n; i++) {
      const d = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
      const value = d.toISOString().slice(0, 7);
      const label = d.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
      arr.push({ value, label: label.charAt(0).toUpperCase() + label.slice(1) });
    }
    return arr;
  },

  cambiarMes(m) { this.mesActual = m; this.renderCierre(); },

  gastosDelMes(mes) { return State.gastos.filter(g => g.mesCierre === mes); },

  ventasDelMes(mes) {
    // En esta maqueta las ventas no tienen mes_cierre explícito; se contemplan
    // todas las ventas registradas hasta que el volumen de datos requiera
    // un filtro de fecha más granular.
    return State.ventas;
  },

  renderCierre() {
    const host = document.getElementById('cierre-body');
    if (!host) return;
    const mes = this.mesActual;
    const gastosMes = this.gastosDelMes(mes);
    // Cada gasto se convierte a USD usando SU PROPIA cotización (la del día que se pagó),
    // y de ahí pasamos a ARS con la cotización actual solo para mostrar el equivalente.
    const totalGastosUSD = gastosMes.reduce((a, g) => a + State.gastoEnUSD(g), 0);
    const totalGastosARS = totalGastosUSD * State.refBlue;
    const totalVentasARS = this.ventasDelMes(mes).reduce((a, v) => a + v.items.reduce((s, i) => s + i.precio, 0), 0) * State.refBlue;
    const spreadCueva = State.resultadoFinancieroMes();
    const diferencialTarjetaARS = State.resultadoDiferencialTarjetaMes() * State.refBlue;
    const totalIngresos = totalVentasARS + spreadCueva + diferencialTarjetaARS;
    const balance = totalIngresos - totalGastosARS;

    const cierreExistente = State.cierresMensuales.find(c => c.mes === mes);
    const yaCerrado = !!cierreExistente;
    const repartoGuardado = cierreExistente?.reparto || {};
    const socios = ['Franco', 'Angel', 'Lautaro', 'iPhoneMood'];

    host.innerHTML = `
      ${yaCerrado ? `<div style="background:var(--green-light);color:var(--green-dark);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12.5px"><i class="ti ti-circle-check"></i> Este mes ya fue cerrado el ${new Date(cierreExistente.cerradoEn).toLocaleDateString('es-AR')}${cierreExistente.cerradoPor?` por ${cierreExistente.cerradoPor}`:''}.</div>` : ''}

      <div class="kpi-row" style="grid-template-columns:repeat(4,1fr);padding:0 0 14px 0;border:none">
        <div class="kpi"><label>Ingresos del mes</label><div class="val" style="color:var(--green-dark)">${State.fmtARS(totalIngresos)}</div><div class="sub">ventas + spread cueva</div></div>
        <div class="kpi"><label>Gastos del mes</label><div class="val" style="color:var(--red)">${State.fmtARS(totalGastosARS)}</div><div class="sub">${gastosMes.length} gasto(s) cargados</div></div>
        <div class="kpi"><label>Balance</label><div class="val" style="color:var(--blue-dark)">${State.fmtARS(balance)}</div><div class="sub">antes de repartir</div></div>
        <div class="kpi"><label>Balance en USD</label><div class="val">${State.fmtUSD(balance / State.refBlue)}</div><div class="sub">a cotización blue actual</div></div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-chart-line"></i> Variación de gastos — últimos 6 meses (en USD)</div>
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
          <select id="grafico-concepto-selector" onchange="Gastos.renderGraficoVariacion()" style="font-size:12px;padding:6px 10px;border:1px solid var(--border-strong);border-radius:8px">
            <option value="__categorias__">Ver por categoría</option>
            ${this.conceptosUnicos().map(m => `<option value="${m}">${m}</option>`).join('')}
          </select>
        </div>
        <div style="position:relative;height:240px"><canvas id="chart-gastos-variacion"></canvas></div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-list"></i> Gastos cargados este mes</div>
        ${gastosMes.length ? `
          <table><thead><tr><th>Motivo</th><th>Categoría</th><th>Monto</th></tr></thead>
          <tbody>${gastosMes.map(g => `<tr><td>${g.motivo}${g.esSueldoSocio?` <span class="badge b-purple" style="font-size:9px">Sueldo</span>`:''}</td><td>${this.catObj(g.cat).nombre}</td><td>${g.moneda==='USD'?State.fmtUSD(g.monto):State.fmtARS(g.monto)}</td></tr>`).join('')}</tbody></table>
        ` : `<div class="empty-state"><i class="ti ti-receipt-off"></i>Todavía no cargaste gastos para este mes. Usá "Cargar gastos fijos del mes" o registrá uno nuevo desde la pestaña "Gastos del mes".</div>`}
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-users"></i> Reparto del balance — sueldos de socios</div>
        <p style="font-size:11.5px;color:var(--text-secondary);margin-bottom:12px">Asigná cuánto le corresponde a cada uno este mes. Al confirmar, cada monto se carga como un gasto (categoría "Sueldo socio"), y se descuenta del balance.</p>
        <div id="reparto-inputs">
          ${socios.map(s => `
            <div style="display:flex;align-items:center;gap:10px;padding:6px 0">
              <div style="width:90px;font-size:12.5px;font-weight:600">${s}</div>
              <input type="number" id="reparto-${s}" value="${repartoGuardado[s] ?? ''}" placeholder="0" oninput="Gastos.actualizarRepartoPreview()" style="flex:1;font-size:12px;padding:6px 10px;border:1px solid var(--border-strong);border-radius:8px" ${yaCerrado?'disabled':''}>
              <span style="font-size:11px;color:var(--text-secondary)">USD</span>
            </div>
          `).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid var(--border);margin-top:8px;font-size:12.5px">
          <span>Repartido</span><b id="reparto-total">USD 0.00</b>
        </div>
        <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12.5px;color:var(--text-secondary)">
          <span>Balance disponible</span><b>${State.fmtUSD(balance / State.refBlue)}</b>
        </div>
        ${!yaCerrado ? `<button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:12px" onclick="Gastos.confirmarCierre('${mes}')"><i class="ti ti-lock"></i> Confirmar y cerrar el mes</button>` : `<button class="btn" style="width:100%;justify-content:center;margin-top:12px" onclick="Gastos.reabrirMes('${mes}')"><i class="ti ti-lock-open"></i> Reabrir este mes</button>`}
      </div>

      <div class="card" id="analisis-optimizacion"></div>

      <div class="card">
        <div class="card-title"><i class="ti ti-history"></i> Historial de cierres</div>
        ${State.cierresMensuales.length ? `
          <table><thead><tr><th>Mes</th><th>Ingresos</th><th>Gastos</th><th>Balance</th><th>Franco</th><th>Angel</th><th>Lautaro</th><th>iPhoneMood</th></tr></thead>
          <tbody>${State.cierresMensuales.map(c => `<tr>
            <td>${c.mes}</td><td>${State.fmtARS(c.totalIngresos)}</td><td>${State.fmtARS(c.totalGastos)}</td><td><b>${State.fmtARS(c.balance)}</b></td>
            <td>USD ${(c.reparto?.Franco||0).toLocaleString('es-AR')}</td><td>USD ${(c.reparto?.Angel||0).toLocaleString('es-AR')}</td><td>USD ${(c.reparto?.Lautaro||0).toLocaleString('es-AR')}</td><td>USD ${(c.reparto?.iPhoneMood||0).toLocaleString('es-AR')}</td>
          </tr>`).join('')}</tbody></table>
        ` : `<div class="empty-state"><i class="ti ti-calendar-off"></i>Todavía no cerraste ningún mes</div>`}
      </div>
    `;
    this.actualizarRepartoPreview();
    this.renderGraficoVariacion();
    this.renderAnalisisOptimizacion();
  },

  actualizarRepartoPreview() {
    const socios = ['Franco', 'Angel', 'Lautaro', 'iPhoneMood'];
    let total = 0;
    socios.forEach(s => { const el = document.getElementById(`reparto-${s}`); if (el) total += parseFloat(el.value) || 0; });
    const el = document.getElementById('reparto-total');
    if (el) el.textContent = State.fmtUSD(total);
  },

  async clonarFijos() {
    if (!State.gastosFijosPlantilla.length) { toast('Todavía no tenés gastos fijos cargados en la plantilla. Andá a "Gastos fijos" para crearlos.'); return; }
    if (!confirm(`Se van a cargar ${State.gastosFijosPlantilla.length} gasto(s) fijo(s) para el mes ${this.mesActual}, usando los montos sugeridos de la plantilla. Podés editarlos después. ¿Continuar?`)) return;
    toast('Cargando gastos fijos...');
    for (const fijo of State.gastosFijosPlantilla.filter(f => f.activo !== false)) {
      const cotizacionUsada = fijo.moneda === 'ARS' ? State.refBlue : null;
      const newId = await DB.crearGasto({
        motivo: fijo.motivo, cat: fijo.cat, responsable: State.personas[0] || '', persona: State.personas[0] || '',
        bolsillo: 'ARS cash', moneda: fijo.moneda, monto: fijo.montoSugerido, estado: 'pendiente',
        esFijo: true, mesCierre: this.mesActual, cotizacionUsada
      });
      State.gastos.unshift({ id: newId || Date.now()+Math.random(), fecha: 'Hoy', motivo: fijo.motivo, cat: fijo.cat, responsable: State.personas[0]||'', caja: `${State.personas[0]||''}-ARS cash`, moneda: fijo.moneda, monto: fijo.montoSugerido, estado: 'pendiente', esFijo: true, mesCierre: this.mesActual, esSueldoSocio: false, cotizacionUsada });
    }
    this.renderCierre();
    toast('Gastos fijos cargados para este mes. Ajustá los montos y marcalos como pagados desde "Gastos del mes" a medida que los abonás.');
  },

  async confirmarCierre(mes) {
    const socios = ['Franco', 'Angel', 'Lautaro', 'iPhoneMood'];
    const reparto = {};
    socios.forEach(s => { const el = document.getElementById(`reparto-${s}`); reparto[s] = parseFloat(el?.value) || 0; });

    const gastosMes = this.gastosDelMes(mes);
    const totalGastosUSD = gastosMes.reduce((a, g) => a + State.gastoEnUSD(g), 0);
    const totalGastosARS = totalGastosUSD * State.refBlue;
    const totalVentasARS = this.ventasDelMes(mes).reduce((a, v) => a + v.items.reduce((s, i) => s + i.precio, 0), 0) * State.refBlue;
    const spreadCueva = State.resultadoFinancieroMes();
    const diferencialTarjetaARS = State.resultadoDiferencialTarjetaMes() * State.refBlue;
    const totalIngresos = totalVentasARS + spreadCueva + diferencialTarjetaARS;
    const balanceAntes = totalIngresos - totalGastosARS;

    if (!confirm(`¿Confirmar el cierre de ${mes}? Se va a registrar un gasto "Sueldo socio" por cada persona con monto asignado, y el mes va a quedar cerrado.`)) return;

    toast('Cerrando el mes...');
    const catSueldo = State.categoriasGasto.find(c => c.nombre === 'Sueldo socio');
    for (const socio of socios) {
      const monto = reparto[socio];
      if (!monto) continue;
      const newId = await DB.crearGasto({
        motivo: `Sueldo / reparto — ${socio}`, cat: catSueldo?.id || null, responsable: socio === 'iPhoneMood' ? (State.personas[0]||'') : socio,
        persona: State.personas[0] || '', bolsillo: 'USD cash', moneda: 'USD', monto, estado: 'pagado',
        esFijo: false, mesCierre: mes, esSueldoSocio: true, socioNombre: socio
      });
      State.gastos.unshift({ id: newId || Date.now()+Math.random(), fecha: 'Hoy', motivo: `Sueldo / reparto — ${socio}`, cat: catSueldo?.id||null, responsable: socio, caja: '', moneda: 'USD', monto, estado: 'pagado', esFijo: false, mesCierre: mes, esSueldoSocio: true, socioNombre: socio });
    }

    const balanceFinal = balanceAntes - (Object.values(reparto).reduce((a,v)=>a+v,0) * State.refBlue);
    const { error } = await DB.guardarCierreMensual(mes, totalIngresos, totalGastosARS, balanceFinal, reparto);
    if (error) { toast('Hubo un problema guardando el cierre.'); console.error(error); return; }

    const idx = State.cierresMensuales.findIndex(c => c.mes === mes);
    const nuevoCierre = { id: Date.now(), mes, totalIngresos, totalGastos: totalGastosARS, balance: balanceFinal, reparto, cerradoEn: new Date().toISOString(), cerradoPor: Auth.usuario?.nombre || '' };
    if (idx >= 0) State.cierresMensuales[idx] = nuevoCierre; else State.cierresMensuales.unshift(nuevoCierre);

    this.renderCierre();
    toast(`Mes ${mes} cerrado correctamente.`);
  },

  reabrirMes(mes) {
    if (!confirm('¿Reabrir este mes? Vas a poder editar el reparto de nuevo. Los gastos de sueldo ya cargados no se eliminan automáticamente — si necesitás corregirlos, hacelo desde "Gastos del mes".')) return;
    State.cierresMensuales = State.cierresMensuales.filter(c => c.mes !== mes);
    this.renderCierre();
  },

  // ============================================================
  // GRÁFICO DE VARIACIÓN — por concepto individual o por categoría
  // ============================================================
  conceptosUnicos() {
    // Conceptos que vienen de la plantilla de fijos (los más relevantes para comparar mes a mes),
    // más cualquier otro motivo que se repita en al menos 2 meses distintos.
    const motivos = new Set(State.gastosFijosPlantilla.map(f => f.motivo));
    const porMotivo = {};
    State.gastos.forEach(g => {
      if (!g.mesCierre) return;
      if (!porMotivo[g.motivo]) porMotivo[g.motivo] = new Set();
      porMotivo[g.motivo].add(g.mesCierre);
    });
    Object.entries(porMotivo).forEach(([motivo, meses]) => { if (meses.size >= 2) motivos.add(motivo); });
    return Array.from(motivos).sort();
  },

  _chartVariacion: null,

  renderGraficoVariacion() {
    const ctx = document.getElementById('chart-gastos-variacion');
    if (!ctx) return;
    if (this._chartVariacion) { this._chartVariacion.destroy(); this._chartVariacion = null; }

    const meses = this.ultimosMeses(6).reverse(); // orden cronológico para el gráfico
    const selector = document.getElementById('grafico-concepto-selector');
    const modo = selector ? selector.value : '__categorias__';

    let datasets = [];
    const colores = ['#185FA5', '#3B6D11', '#854F0B', '#3C3489', '#085041', '#791F1F'];

    if (modo === '__categorias__') {
      State.categoriasGasto.forEach((cat, i) => {
        const data = meses.map(m => {
          const gastosDelMesYCat = State.gastos.filter(g => g.mesCierre === m.value && g.cat === cat.id);
          return +gastosDelMesYCat.reduce((a, g) => a + State.gastoEnUSD(g), 0).toFixed(2);
        });
        if (data.some(v => v > 0)) datasets.push({ label: cat.nombre, data, borderColor: cat.color, backgroundColor: cat.color + '22', tension: 0.3 });
      });
    } else {
      const data = meses.map(m => {
        const gastosDelMesYConcepto = State.gastos.filter(g => g.mesCierre === m.value && g.motivo === modo);
        return +gastosDelMesYConcepto.reduce((a, g) => a + State.gastoEnUSD(g), 0).toFixed(2);
      });
      datasets.push({ label: modo, data, borderColor: colores[0], backgroundColor: colores[0] + '22', fill: true, tension: 0.3 });
    }

    if (!datasets.length) {
      ctx.parentElement.innerHTML = `<div class="empty-state"><i class="ti ti-chart-line"></i>Todavía no hay suficientes datos cargados para graficar esta serie</div>`;
      return;
    }

    this._chartVariacion = new Chart(ctx, {
      type: 'line',
      data: { labels: meses.map(m => m.label.split(' ')[0].substring(0,3)), datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10.5 } } } },
        scales: {
          y: { ticks: { callback: v => 'USD ' + v, font: { size: 10 } }, grid: { color: '#EFEDE6' } },
          x: { grid: { display: false }, ticks: { font: { size: 10.5 } } }
        }
      }
    });
  },

  // ============================================================
  // ANÁLISIS DE OPTIMIZACIÓN — compara el mes actual contra el promedio histórico
  // ============================================================
  renderAnalisisOptimizacion() {
    const host = document.getElementById('analisis-optimizacion');
    if (!host) return;

    const meses = this.ultimosMeses(6);
    const mesActualData = this.gastosDelMes(this.mesActual);
    const mesesAnteriores = meses.filter(m => m.value !== this.mesActual);

    if (mesActualData.length === 0 || mesesAnteriores.length === 0) {
      host.innerHTML = `
        <div class="card-title"><i class="ti ti-bulb"></i> Análisis de optimización</div>
        <div class="empty-state"><i class="ti ti-chart-bar-off"></i>Necesitamos al menos 2 meses con gastos cargados para poder comparar tendencias.</div>
      `;
      return;
    }

    const hallazgos = [];

    // 1. Comparar cada concepto del mes actual contra su promedio en meses anteriores
    const conceptosDelMes = [...new Set(mesActualData.map(g => g.motivo))];
    conceptosDelMes.forEach(motivo => {
      const montoActual = mesActualData.filter(g => g.motivo === motivo).reduce((a, g) => a + State.gastoEnUSD(g), 0);
      const historico = [];
      mesesAnteriores.forEach(m => {
        const monto = State.gastos.filter(g => g.mesCierre === m.value && g.motivo === motivo).reduce((a, g) => a + State.gastoEnUSD(g), 0);
        if (monto > 0) historico.push(monto);
      });
      if (historico.length === 0) return;
      const promedio = historico.reduce((a, v) => a + v, 0) / historico.length;
      if (promedio === 0) return;
      const variacion = ((montoActual - promedio) / promedio) * 100;
      if (variacion >= 20) {
        hallazgos.push({ tipo: 'alerta', texto: `"${motivo}" subió ${variacion.toFixed(0)}% respecto a su promedio de los últimos meses (USD ${promedio.toFixed(0)} → USD ${montoActual.toFixed(0)}). Vale la pena revisar si hay forma de bajarlo.` });
      } else if (variacion <= -20) {
        hallazgos.push({ tipo: 'positivo', texto: `"${motivo}" bajó ${Math.abs(variacion).toFixed(0)}% respecto a su promedio (USD ${promedio.toFixed(0)} → USD ${montoActual.toFixed(0)}). Buena señal.` });
      }
    });

    // 2. Identificar el gasto más grande del mes (fuera de sueldos)
    const sinSueldos = mesActualData.filter(g => !g.esSueldoSocio);
    if (sinSueldos.length) {
      const mayor = sinSueldos.reduce((max, g) => State.gastoEnUSD(g) > State.gastoEnUSD(max) ? g : max);
      const montoMayor = State.gastoEnUSD(mayor);
      const totalSinSueldos = sinSueldos.reduce((a, g) => a + State.gastoEnUSD(g), 0);
      const pctDelTotal = totalSinSueldos ? (montoMayor / totalSinSueldos) * 100 : 0;
      if (pctDelTotal >= 30) {
        hallazgos.push({ tipo: 'info', texto: `"${mayor.motivo}" representa el ${pctDelTotal.toFixed(0)}% de los gastos operativos del mes (USD ${montoMayor.toFixed(0)} de USD ${totalSinSueldos.toFixed(0)}). Es tu gasto más concentrado — cualquier ajuste ahí tiene impacto grande.`});
      }
    }

    // 3. Gastos fijos pendientes de pago acumulados (riesgo de mora)
    const fijosPendientes = mesActualData.filter(g => g.esFijo && g.estado === 'pendiente');
    if (fijosPendientes.length > 0) {
      const totalPendiente = fijosPendientes.reduce((a, g) => a + State.gastoEnUSD(g), 0);
      hallazgos.push({ tipo: 'alerta', texto: `Tenés ${fijosPendientes.length} gasto(s) fijo(s) de este mes todavía sin marcar como pagados, por USD ${totalPendiente.toFixed(0)} en total (${fijosPendientes.map(g=>g.motivo).join(', ')}). Convendría regularizarlos antes de fin de mes.` });
    }

    // 4. Tendencia general de gastos totales (excluyendo sueldos) en los últimos meses
    const totalesPorMes = meses.map(m => {
      const total = State.gastos.filter(g => g.mesCierre === m.value && !g.esSueldoSocio).reduce((a, g) => a + State.gastoEnUSD(g), 0);
      return { mes: m.label, total };
    }).filter(x => x.total > 0).reverse();
    if (totalesPorMes.length >= 3) {
      const primero = totalesPorMes[0].total;
      const ultimo = totalesPorMes[totalesPorMes.length - 1].total;
      if (primero > 0) {
        const variacionGeneral = ((ultimo - primero) / primero) * 100;
        if (variacionGeneral >= 15) {
          hallazgos.push({ tipo: 'alerta', texto: `Los gastos operativos totales vienen en alza: subieron ${variacionGeneral.toFixed(0)}% desde ${totalesPorMes[0].mes} hasta ahora. Conviene revisar la estructura de costos general.` });
        } else if (variacionGeneral <= -15) {
          hallazgos.push({ tipo: 'positivo', texto: `Los gastos operativos totales vienen bajando: ${Math.abs(variacionGeneral).toFixed(0)}% menos desde ${totalesPorMes[0].mes}. Buen control de costos.` });
        }
      }
    }

    if (hallazgos.length === 0) {
      hallazgos.push({ tipo: 'info', texto: 'No se detectaron variaciones significativas este mes. Los gastos se mantuvieron dentro de los rangos habituales.' });
    }

    const iconPorTipo = { alerta: 'ti-alert-triangle', positivo: 'ti-trending-down', info: 'ti-info-circle' };
    const colorPorTipo = { alerta: 'var(--amber-dark)', positivo: 'var(--green-dark)', info: 'var(--blue-dark)' };
    const bgPorTipo = { alerta: 'var(--amber-light)', positivo: 'var(--green-light)', info: 'var(--blue-light)' };

    host.innerHTML = `
      <div class="card-title"><i class="ti ti-bulb"></i> Análisis de optimización — a tener en cuenta para el próximo mes</div>
      ${hallazgos.map(h => `
        <div style="display:flex;gap:10px;align-items:flex-start;background:${bgPorTipo[h.tipo]};border-radius:8px;padding:10px 12px;margin-bottom:8px">
          <i class="ti ${iconPorTipo[h.tipo]}" style="color:${colorPorTipo[h.tipo]};font-size:16px;flex-shrink:0;margin-top:1px"></i>
          <span style="font-size:12px;color:${colorPorTipo[h.tipo]};line-height:1.5">${h.texto}</span>
        </div>
      `).join('')}
    `;
  }
};

</script>
<script>
const Cueva = {
  opType: 'ars-usd',
  OP_TYPES: [
    { id: 'ars-usd', label: 'ARS → USD', monedaO: 'ARS', monedaD: 'USD' },
    { id: 'usd-usdt', label: 'USD → USDT', monedaO: 'USD', monedaD: 'USDT' },
    { id: 'usdt-ars', label: 'USDT → ARS', monedaO: 'USDT', monedaD: 'ARS' },
    { id: 'usd-ars', label: 'USD → ARS', monedaO: 'USD', monedaD: 'ARS' },
  ],
  BOLSILLOS: { ARS: ['ARS cash', 'ARS transferencia'], USD: ['USD cash', 'USD transferencia'], USDT: ['USDT'] },

  render() {
    const c = document.createElement('div');
    c.innerHTML = `
      <div style="padding:10px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:12px;color:var(--text-secondary)">${State.cambios.length} operaciones registradas</div>
        <button class="btn btn-primary" onclick="Cueva.openNew()"><i class="ti ti-plus"></i> Nueva operación</button>
      </div>
      <div style="background:var(--purple-light);padding:10px 22px;font-size:12px;color:var(--purple);display:flex;gap:16px;align-items:center;flex-wrap:wrap">
        <i class="ti ti-info-circle"></i>
        <div><b id="cueva-resultado-financiero">—</b> resultado financiero del mes (spread de cambios — separado de las ventas)</div>
      </div>
      <div class="body-pad">
        <table><thead><tr><th>Fecha</th><th>Operación</th><th>Sale (origen)</th><th>Entra (destino)</th><th>Cotización</th><th>Spread</th><th></th></tr></thead>
        <tbody id="cueva-tbody"></tbody></table>
      </div>
      <div id="cueva-modal-host"></div>
    `;
    setTimeout(() => this.renderTable(), 0);
    return c;
  },

  typeObj(id) { return this.OP_TYPES.find(t => t.id === id); },
  fmtByMoneda(v, m) { return m === 'ARS' ? State.fmtARS(v) : m === 'USDT' ? v.toLocaleString('es-AR') + ' USDT' : State.fmtUSD(v); },

  renderTable() {
    const spreadTotal = State.resultadoFinancieroMes();
